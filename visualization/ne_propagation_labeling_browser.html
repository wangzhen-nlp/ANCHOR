<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>微波群障根因标注总览</title>
    <!-- 同目录 data.js（由 data/ 下的 jsonl 转换而来）会注入 window.FAULT_GROUPS_DATA，
         以便 file:// 下双击打开即自动加载，省去手动选 jsonl；文件不存在时此行无害地 404。 -->
    <script src="data.js"></script>
    <style>

        .card {

</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>微波群障根因标注总览</h1>
            <div class="sub">加载 `jsonl` 文件后，页面会展示所有故障组摘要；点击任意故障组可打开「微波群障根因标注」页进行标注。</div>
            <div class="toolbar">
                <input id="fileInput" type="file" accept=".jsonl,.txt,.json">
                <button class="btn" onclick="openFaultGroupFile()">选择 JSONL 文件</button>
                <button class="btn" onclick="exportLabelingResult()">⬇ 导出结果文件</button>
                <div class="hint">每行一个故障组对象</div>
            </div>
            <div class="filter-row">
                <span class="site-filter-label">标注状态</span>
                <div class="filters" id="labelFilters" style="margin:0;">
                    <button class="filter-chip active" data-label-filter="all">全部</button>
                    <button class="filter-chip" data-label-filter="labeled">已标注</button>
                    <button class="filter-chip" data-label-filter="unlabeled">未标注</button>
                </div>
                <span id="labelCounts" class="label-counts">已标注 0 ｜ 未标注 0</span>
            </div>
            <div class="filter-row">
                <span class="site-filter-label">备注过滤</span>
                <input id="noteFilterInput" class="site-filter-input" type="text" placeholder="输入备注关键词，支持包含匹配">
            </div>
            <div class="status" id="status">尚未加载文件</div>
            <div class="file-path" id="filePath">文件路径：-</div>
            <div class="filter-summary" id="filterSummary">过滤后 0 条</div>
        </div>

        <div class="list" id="groupList"></div>
        <div class="empty" id="emptyState">请选择一个 `jsonl` 文件</div>
    </div>

    <script>
        let faultGroups = [];
        let activeFilters = new Set(['all']);
        let ruleFilterQueries = [];
        let siteFilterQuery = '';
        let ticketFilterQuery = '';
        let noteFilterQuery = '';  // 备注过滤查询
        let labelFilter = 'all';   // 标注状态过滤：all / labeled / unlabeled
        let detailBlobUrls = [];
        let currentFaultGroupFileHandle = null;
        let currentFaultGroupFileName = '';
        let durationFilterSeconds = 0;
        let referenceData = null;
        let referenceIndex = {
            ticket: new Map(),
            'alarm-group': new Map()
        };

        window.getLoadedReferenceData = function() {
            return referenceData;
        };

        window.getLoadedFaultGroupFileContext = function() {
            return {
                hasWritableHandle: !!(currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable),
                fileName: currentFaultGroupFileName || ''
            };
        };

        async function queryFaultGroupHandlePermission(handle, mode) {
            if (!handle) {
                return 'prompt';
            }
            if (typeof handle.queryPermission === 'function') {
                try {
                    return await handle.queryPermission({ mode });
                } catch (error) {
                    console.warn('queryPermission 失败:', error);
                }
            }
            return 'prompt';
        }

        async function ensureFaultGroupHandlePermission(handle, mode) {
            const currentPermission = await queryFaultGroupHandlePermission(handle, mode);
            if (currentPermission === 'granted') {
                return true;
            }
            if (typeof handle.requestPermission === 'function') {
                try {
                    const nextPermission = await handle.requestPermission({ mode });
                    return nextPermission === 'granted';
                } catch (error) {
                    if (error && error.name === 'AbortError') {
                        throw error;
                    }
                    console.warn('requestPermission 失败:', error);
                }
            }
            return false;
        }

        function buildFaultGroupJsonlContent(groups) {
            return groups.map(group => JSON.stringify(group)).join('\n') + '\n';
        }

        function updateFaultGroupFileStatus(inputPath, writableMode) {
            const pathText = inputPath || currentFaultGroupFileName || '-';
            const writableText = writableMode ? '已绑定原文件，可尝试回写备注' : '未获得原文件写入权限';
            document.getElementById('filePath').textContent = `文件路径：${pathText}（${writableText}）`;
        }

        function loadFaultGroupText(content, inputPath, fileHandle) {
            try {
                faultGroups = parseJsonl(content);
                currentFaultGroupFileHandle = fileHandle || null;
                currentFaultGroupFileName = inputPath || currentFaultGroupFileName || '';
                document.getElementById('status').textContent = `已加载 ${faultGroups.length} 个故障组`;
                updateFaultGroupFileStatus(inputPath, !!(currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable));
                renderGroups();
            } catch (error) {
                faultGroups = [];
                currentFaultGroupFileHandle = fileHandle || null;
                currentFaultGroupFileName = inputPath || currentFaultGroupFileName || '';
                document.getElementById('status').textContent = error.message;
                updateFaultGroupFileStatus(inputPath, !!(currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable));
                renderGroups();
            }
        }

        function openFaultGroupFile() {
            document.getElementById('fileInput').click();
        }

        async function writeUpdatedFaultGroups(groups, suggestedFileName) {
            const content = buildFaultGroupJsonlContent(groups);
            if (currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable) {
                const granted = await ensureFaultGroupHandlePermission(currentFaultGroupFileHandle, 'readwrite');
                if (granted) {
                    const writable = await currentFaultGroupFileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return { mode: 'overwrite' };
                }
            }
            if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: suggestedFileName || currentFaultGroupFileName || 'fault_groups_with_note.jsonl',
                    types: [{
                        description: 'Fault Group JSONL',
                        accept: {
                            'application/json': ['.jsonl', '.json'],
                            'text/plain': ['.jsonl', '.txt']
                        }
                    }]
                });
                if (!handle) {
                    throw new Error('未选择保存文件');
                }
                const writable = await handle.createWritable();
                await writable.write(content);
                await writable.close();
                currentFaultGroupFileHandle = handle;
                currentFaultGroupFileName = handle.name || currentFaultGroupFileName;
                updateFaultGroupFileStatus(currentFaultGroupFileName, true);
                return { mode: 'save-as' };
            }
            throw new Error('当前浏览器未提供可写文件句柄，请重新通过“选择 JSONL 文件”加载，或使用支持 File System Access API 的环境');
        }

        window.prepareFaultGroupNoteSave = function(groupUuid, noteText, extraFields) {
            const normalizedUuid = String(groupUuid || '').trim();
            if (!normalizedUuid) {
                throw new Error('缺少故障组 UUID，无法准备备注保存');
            }
            const safeExtraFields = (extraFields && typeof extraFields === 'object' && !Array.isArray(extraFields)) ? extraFields : {};
            const noteUpdatedAt = new Date().toISOString();
            let found = false;
            const content = faultGroups.map(group => {
                const currentUuid = group.uuid || group.match_info?.uuid || '';
                if (currentUuid !== normalizedUuid) {
                    return JSON.stringify(group);
                }
                found = true;
                const updatedGroup = {
                    ...group,
                    ...safeExtraFields,
                    note: noteText || '',
                    note_updated_at: noteUpdatedAt,
                };
                return JSON.stringify(updatedGroup);
            }).join('\n') + '\n';

            if (!found) {
                throw new Error(`未在当前总览中找到故障组：${normalizedUuid}`);
            }

            return {
                content,
                note: noteText || '',
                noteUpdatedAt,
                extraFields: safeExtraFields,
                suggestedFileName: currentFaultGroupFileName || `${normalizedUuid}.jsonl`,
                hasBoundWritableHandle: !!(currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable),
            };
        };

        window.applySavedFaultGroupNote = function(groupUuid, noteText, noteUpdatedAt, extraFields) {
            const normalizedUuid = String(groupUuid || '').trim();
            if (!normalizedUuid) {
                return;
            }
            const index = faultGroups.findIndex(group => (group.uuid || group.match_info?.uuid || '') === normalizedUuid);
            if (index < 0) {
                return;
            }
            faultGroups[index].note = noteText || '';
            if (noteUpdatedAt) {
                faultGroups[index].note_updated_at = noteUpdatedAt;
            }
            if (extraFields && typeof extraFields === 'object' && !Array.isArray(extraFields)) {
                Object.assign(faultGroups[index], extraFields);
            }
            renderGroups();
        };

        window.tryOverwriteFaultGroupSource = async function(content) {
            if (!(currentFaultGroupFileHandle && currentFaultGroupFileHandle.createWritable)) {
                return { ok: false, reason: 'no-bound-handle' };
            }
            const granted = await ensureFaultGroupHandlePermission(currentFaultGroupFileHandle, 'readwrite');
            if (!granted) {
                return { ok: false, reason: 'permission-denied' };
            }
            const writable = await currentFaultGroupFileHandle.createWritable();
            await writable.write(content);
            await writable.close();
            return { ok: true, mode: 'overwrite' };
        };

        window.saveFaultGroupNoteToSource = async function(groupUuid, noteText) {
            const normalizedUuid = String(groupUuid || '').trim();
            if (!normalizedUuid) {
                throw new Error('缺少故障组 UUID，无法保存备注');
            }
            const index = faultGroups.findIndex(group => (group.uuid || group.match_info?.uuid || '') === normalizedUuid);
            if (index < 0) {
                throw new Error(`未在当前总览中找到故障组：${normalizedUuid}`);
            }
            const group = faultGroups[index];
            const previousNote = group.note || '';
            const previousUpdatedAt = group.note_updated_at || '';
            group.note = noteText || '';
            group.note_updated_at = new Date().toISOString();
            try {
                const result = await writeUpdatedFaultGroups(faultGroups, currentFaultGroupFileName || `${normalizedUuid}.jsonl`);
                renderGroups();
                return {
                    ok: true,
                    mode: result.mode,
                    note: group.note
                };
            } catch (error) {
                group.note = previousNote;
                if (previousUpdatedAt) {
                    group.note_updated_at = previousUpdatedAt;
                } else {
                    delete group.note_updated_at;
                }
                throw error;
            }
        };

        function resetReferenceIndex() {
            referenceIndex = {
                ticket: new Map(),
                'alarm-group': new Map()
            };
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeReferenceRecord(record, idFieldName, recordId) {
            if (record && typeof record === 'object' && !Array.isArray(record)) {
                return record;
            }
            return {
                [idFieldName]: recordId,
                value: record
            };
        }

        function getReferenceConfig(recordType) {
            return recordType === 'ticket'
                ? {
                    bucketNames: ['工单号', '工单', 'tickets', 'ticket'],
                    idFieldCandidates: ['工单号', 'ticket_id', 'ticketId', 'id']
                }
                : {
                    bucketNames: ['故障组ID', 'alarm_groups', 'fault_groups', 'groups'],
                    idFieldCandidates: ['故障组ID', 'group_id', 'groupId', 'id']
                };
        }

        function addReferenceIndexRecord(recordType, recordId, record, idFieldName) {
            const normalizedId = String(recordId ?? '').trim();
            if (!normalizedId) {
                return;
            }
            const targetMap = referenceIndex[recordType];
            if (!targetMap.has(normalizedId)) {
                targetMap.set(normalizedId, normalizeReferenceRecord(record, idFieldName, normalizedId));
            }
        }

        function indexReferenceBucket(recordType, bucket, idFieldCandidates, allowDirectKeys) {
            if (!bucket || typeof bucket !== 'object') {
                return;
            }

            const primaryIdField = idFieldCandidates[0];
            if (Array.isArray(bucket)) {
                bucket.forEach(item => {
                    if (!item || typeof item !== 'object') {
                        return;
                    }
                    idFieldCandidates.forEach(fieldName => {
                        const fieldValue = item[fieldName];
                        if (fieldValue !== null && fieldValue !== undefined) {
                            addReferenceIndexRecord(recordType, fieldValue, item, primaryIdField);
                        }
                    });
                });
                return;
            }

            Object.entries(bucket).forEach(([key, value]) => {
                if (allowDirectKeys) {
                    addReferenceIndexRecord(recordType, key, value, primaryIdField);
                }
                if (!value || typeof value !== 'object') {
                    return;
                }
                idFieldCandidates.forEach(fieldName => {
                    const fieldValue = value[fieldName];
                    if (fieldValue !== null && fieldValue !== undefined) {
                        addReferenceIndexRecord(recordType, fieldValue, value, primaryIdField);
                    }
                });
            });
        }

        function rebuildReferenceIndex() {
            resetReferenceIndex();
            if (!referenceData || typeof referenceData !== 'object') {
                return;
            }

            ['ticket', 'alarm-group'].forEach(recordType => {
                const config = getReferenceConfig(recordType);
                const preferredBuckets = new Set(config.bucketNames);
                let usedPreferredBucket = false;

                config.bucketNames.forEach(bucketName => {
                    if (referenceData[bucketName] !== undefined) {
                        usedPreferredBucket = true;
                        indexReferenceBucket(recordType, referenceData[bucketName], config.idFieldCandidates, true);
                    }
                });

                if (!usedPreferredBucket) {
                    indexReferenceBucket(recordType, referenceData, config.idFieldCandidates, true);
                }

                Object.entries(referenceData).forEach(([bucketName, bucketValue]) => {
                    if (preferredBuckets.has(bucketName)) {
                        return;
                    }
                    indexReferenceBucket(recordType, bucketValue, config.idFieldCandidates, true);
                });
            });
        }

        function findReferenceRecordInBucket(bucket, recordId, idFieldCandidates) {
            if (!bucket || typeof bucket !== 'object') {
                return null;
            }

            if (!Array.isArray(bucket) && Object.prototype.hasOwnProperty.call(bucket, recordId)) {
                return normalizeReferenceRecord(bucket[recordId], idFieldCandidates[0], recordId);
            }

            const entries = Array.isArray(bucket) ? bucket.entries() : Object.entries(bucket);
            for (const [key, value] of entries) {
                if (String(key).trim() === recordId) {
                    return normalizeReferenceRecord(value, idFieldCandidates[0], recordId);
                }
                if (!value || typeof value !== 'object') {
                    continue;
                }
                const matched = idFieldCandidates.some(fieldName => {
                    const fieldValue = value[fieldName];
                    return fieldValue !== null && fieldValue !== undefined && String(fieldValue).trim() === recordId;
                });
                if (matched) {
                    return normalizeReferenceRecord(value, idFieldCandidates[0], recordId);
                }
            }
            return null;
        }

        function resolveReferenceRecord(recordType, recordId) {
            if (!referenceData || !recordId) {
                return null;
            }
            const normalizedId = String(recordId).trim();
            if (!normalizedId) {
                return null;
            }
            return referenceIndex[recordType]?.get(normalizedId) || null;
        }

        function openReferenceRecord(recordType, recordId) {
            if (!recordId) {
                return;
            }
            if (!referenceData) {
                window.alert('请先加载关联明细 JSON');
                return;
            }

            const record = resolveReferenceRecord(recordType, recordId);
            if (!record) {
                window.alert(`未在关联明细 JSON 中找到${recordType === 'ticket' ? '工单号' : '告警故障组'}：${recordId}`);
                return;
            }

            const sessionKey = `reference-record-${Date.now()}-${Math.random().toString(36).slice(2)}`;
            localStorage.setItem(sessionKey, JSON.stringify({
                recordType,
                recordId,
                record
            }));
            window.open(`reference_record_viewer.html?session_key=${encodeURIComponent(sessionKey)}`, '_blank');
        }

        function openReferenceRecordByEncoded(recordType, encodedRecordId) {
            openReferenceRecord(recordType, decodeURIComponent(encodedRecordId));
        }

        function canOpenReferenceRecord(recordType, recordId) {
            if (!referenceData || !recordId) {
                return false;
            }
            return !!resolveReferenceRecord(recordType, recordId);
        }

        function getGroupTimeRange(group) {
            const symptoms = group.symptoms || [];
            const timestamps = symptoms
                .map(symptom => symptom && symptom.ts)
                .filter(ts => ts !== null && ts !== undefined)
                .sort((a, b) => a - b);

            if (timestamps.length === 0) {
                return group.group_anchor_time || group.match_info?.group_anchor_time || '-';
            }

            const formatTs = (ts) => {
                const date = new Date(ts * 1000);
                const pad = (value) => String(value).padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            };

            return `${formatTs(timestamps[0])} ~ ${formatTs(timestamps[timestamps.length - 1])}`;
        }

        function getGroupDurationSeconds(group) {
            const symptoms = group.symptoms || [];
            const timestamps = symptoms
                .map(symptom => symptom && symptom.ts)
                .filter(ts => ts !== null && ts !== undefined)
                .sort((a, b) => a - b);

            if (timestamps.length < 2) {
                return 0;
            }
            return timestamps[timestamps.length - 1] - timestamps[0];
        }

        function mergeStringLists(...lists) {
            const values = [];
            const seen = new Set();
            lists.forEach(list => {
                const items = Array.isArray(list) ? list : (list ? [list] : []);
                items.forEach(item => {
                    const text = String(item || '').trim();
                    if (!text || seen.has(text)) {
                        return;
                    }
                    seen.add(text);
                    values.push(text);
                });
            });
            return values;
        }

        function getGroupMergedRules(group) {
            const mergedRules = mergeStringLists(group.merged_rules, group.match_info?.merged_rules);
            if (Array.isArray(group._merged_alarm_groups) && group._merged_alarm_groups.length > 0) {
                const alarmGroupRules = group._merged_alarm_groups.map(item => {
                    const groupId = String(item?.group_id || 'unknown').trim() || 'unknown';
                    return `alarm_group_${groupId}_rule`;
                });
                return mergeStringLists(mergedRules, alarmGroupRules);
            }
            return mergedRules;
        }

        function getGroupRuleText(group) {
            const mergedRules = getGroupMergedRules(group);
            if (mergedRules.length > 0) {
                return mergedRules.join(' + ');
            }
            return group.rule || group.match_info?.rule || '-';
        }

        function getRelatedGroupText(group) {
            const related = getRelatedGroups(group);
            return related.length > 0 ? related.join(', ') : '无';
        }

        function getRelatedGroups(group) {
            return mergeStringLists(group.related_group_uuids, group.match_info?.related_group_uuids);
        }

        function getGroupUuid(group) {
            return group.uuid || group.match_info?.uuid || '';
        }

        function getReferencedGroupUuidSet(groups) {
            const referenced = new Set();
            groups.forEach(group => {
                getRelatedGroups(group).forEach(uuid => {
                    if (uuid) {
                        referenced.add(String(uuid));
                    }
                });
            });
            return referenced;
        }

        function getPrimaryGroupInfo(group) {
            const groupInfo = group.group_info || {};
            const groupUuid = getGroupUuid(group);
            if (groupUuid && groupInfo[groupUuid]) {
                return groupInfo[groupUuid];
            }
            return Object.values(groupInfo)[0] || {};
        }

        function getSiteCount(group) {
            const primaryGroup = getPrimaryGroupInfo(group);
            const neInfo = group.ne_info || {};
            const siteIdsFromNodes = new Set();
            (primaryGroup.ne_list || []).forEach(neId => {
                const siteId = String(neInfo[neId]?.site_id || '').trim();
                if (siteId) {
                    siteIdsFromNodes.add(siteId);
                }
            });
            if (siteIdsFromNodes.size > 0) {
                return siteIdsFromNodes.size;
            }
            return (primaryGroup.site_list || []).length;
        }

        function getNodeCount(group) {
            const primaryGroup = getPrimaryGroupInfo(group);
            return (primaryGroup.ne_list || []).length;
        }

        function getSymptomCount(group) {
            return (group.symptoms || []).length;
        }

        function getSymptomFieldValues(group, fieldNames) {
            const symptoms = group.symptoms || [];
            const seen = new Set();
            const values = [];

            symptoms.forEach(symptom => {
                fieldNames.forEach(fieldName => {
                    const rawValue = symptom?.[fieldName];
                    if (rawValue === null || rawValue === undefined) {
                        return;
                    }
                    const text = String(rawValue).trim();
                    if (!text || text === 'null' || text === 'undefined' || seen.has(text)) {
                        return;
                    }
                    seen.add(text);
                    values.push(text);
                });
            });

            return values;
        }

        function getGroupTicketText(group) {
            const ticketIds = getSymptomFieldValues(group, ['工单号']);
            return ticketIds.length > 0 ? ticketIds.join('，') : '无';
        }

        function getGroupAlarmFaultText(group) {
            const alarmGroups = getSymptomFieldValues(group, ['故障组ID']);
            return alarmGroups.length > 0 ? alarmGroups.join('，') : '无';
        }

        function renderStackedFieldValues(group, fieldNames, recordType) {
            const values = getSymptomFieldValues(group, fieldNames);
            if (values.length === 0) {
                return '无';
            }
            return `<div class="stacked-values">${
                values.map(value => {
                    if (!recordType || !canOpenReferenceRecord(recordType, value)) {
                        return `<div class="stacked-value">${escapeHtml(value)}</div>`;
                    }
                    return `<button type="button" class="stacked-value-link" onclick="openReferenceRecordByEncoded('${recordType}', '${encodeURIComponent(value)}')" title="点击查看详情">${escapeHtml(value)}</button>`;
                }).join('')
            }</div>`;
        }

        function openGroupDetail(index) {
            const group = faultGroups[index];
            // 以当前可见（过滤后）的顺序作为上一组/下一组的导航列表
            const visibleGroups = filterGroups(faultGroups);
            let navIndex = visibleGroups.indexOf(group);
            if (navIndex < 0) navIndex = 0;
            const payload = { group, groups: visibleGroups, index: navIndex };
            const sessionKey = `fault-group-${Date.now()}-${index}`;
            try {
                localStorage.setItem(sessionKey, JSON.stringify(payload));
                window.open(`ne_propagation_labeling.html?session_key=${encodeURIComponent(sessionKey)}`, '_blank');
            } catch (error) {
                console.warn('localStorage 写入故障组详情失败，改用 Blob URL 打开:', error);
                const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                const blobUrl = URL.createObjectURL(blob);
                detailBlobUrls.push(blobUrl);
                window.open(`ne_propagation_labeling.html?file=${encodeURIComponent(blobUrl)}`, '_blank');
                setTimeout(() => {
                    URL.revokeObjectURL(blobUrl);
                    detailBlobUrls = detailBlobUrls.filter(url => url !== blobUrl);
                }, 10 * 60 * 1000);
            }
        }

        function openGroupDetailByUuid(uuid) {
            const index = faultGroups.findIndex(group => (group.uuid || group.match_info?.uuid) === uuid);
            if (index >= 0) {
                openGroupDetail(index);
            }
        }

        function matchesRuleFilter(group, ruleName) {
            const normalizedRuleName = String(ruleName || '').trim().toLowerCase();
            if (!normalizedRuleName) {
                return true;
            }
            const mergedRules = getGroupMergedRules(group);
            const ruleValues = [
                ...mergedRules,
                group.rule,
                group.match_info?.rule
            ]
                .filter(value => value !== null && value !== undefined)
                .map(value => String(value).trim().toLowerCase())
                .filter(Boolean);
            return ruleValues.some(value => value === normalizedRuleName || value.includes(normalizedRuleName));
        }

        function matchesAnyRuleFilter(group) {
            if (ruleFilterQueries.length === 0) {
                return true;
            }
            return ruleFilterQueries.some(ruleName => matchesRuleFilter(group, ruleName));
        }

        function filterGroups(groups) {
            const referencedGroupUuids = getReferencedGroupUuidSet(groups);
            return groups.filter(group => {
                if (!activeFilters.has('all') && activeFilters.size > 0) {
                    for (const filter of activeFilters) {
                        if (filter === 'with-related' && getRelatedGroups(group).length === 0) {
                            return false;
                        }
                        if (filter === 'without-related' && getRelatedGroups(group).length > 0) {
                            return false;
                        }
                        if (filter === 'ultimate') {
                            const uuid = getGroupUuid(group);
                            if (!uuid || referencedGroupUuids.has(String(uuid))) {
                                return false;
                            }
                        }
                        if (filter === 'multi-site' && getSiteCount(group) <= 1) {
                            return false;
                        }
                    }
                }

                if (!matchesAnyRuleFilter(group)) {
                    return false;
                }

                if (siteFilterQuery) {
                    const groupInfo = group.group_info || {};
                    const firstGroup = Object.values(groupInfo)[0] || {};
                    const siteList = firstGroup.site_list || [];
                    const query = siteFilterQuery.toLowerCase();
                    if (!siteList.some(site => String(site).toLowerCase().includes(query))) {
                        return false;
                    }
                }

                if (ticketFilterQuery) {
                    const ticketIds = getSymptomFieldValues(group, ['工单号']);
                    const query = ticketFilterQuery.toLowerCase();
                    if (!ticketIds.some(ticketId => String(ticketId).toLowerCase().includes(query))) {
                        return false;
                    }
                }

                if (durationFilterSeconds > 0 && getGroupDurationSeconds(group) <= durationFilterSeconds) {
                    return false;
                }

                // 备注过滤（本地保存优先，与卡片显示一致）
                if (noteFilterQuery) {
                    const note = getEffectiveNote(group);
                    const query = noteFilterQuery.toLowerCase();
                    if (!note.toLowerCase().includes(query)) {
                        return false;
                    }
                }

                // 标注状态过滤
                if (labelFilter === 'labeled' && !isGroupLabeled(group)) {
                    return false;
                }
                if (labelFilter === 'unlabeled' && isGroupLabeled(group)) {
                    return false;
                }
                return true;
            });
        }

        // 读取标注页写入浏览器本地的根因标注（同源共享 localStorage）。
        // 标注页已改为“每个故障组一个独立 key”(mw_rc_annotations:<uuid>)，
        // 这里合并旧版单一 blob(mw_rc_annotations) 与新版独立 key，统一成 { uuid: entry }。
        function getLocalRootCauseStore() {
            const store = {};
            try {
                const legacy = JSON.parse(localStorage.getItem('mw_rc_annotations') || '{}') || {};
                Object.keys(legacy).forEach(function(uuid) { store[uuid] = legacy[uuid]; });
            } catch (e) { /* ignore */ }
            const prefix = 'mw_rc_annotations:';
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.indexOf(prefix) === 0) {
                        try { store[key.slice(prefix.length)] = JSON.parse(localStorage.getItem(key)); }
                        catch (e) { /* 跳过损坏条目 */ }
                    }
                }
            } catch (e) { /* ignore */ }
            return store;
        }

        // 取某组的有效根因标注：本地保存优先，其次组对象自身
        function getEffectiveRootCause(group) {
            const uuid = group && (group.uuid || (group.match_info && group.match_info.uuid)) || '';
            if (uuid) {
                const entry = getLocalRootCauseStore()[uuid];
                if (entry && entry.root_cause_annotations) return entry.root_cause_annotations;
            }
            return group && group.root_cause_annotations;
        }

        // 取某组的有效备注：本地保存优先，其次组对象自身（与 getEffectiveRootCause 一致）。
        // 这样重新选择 JSONL 文件后，标注页里写入本地但尚未导出回文件的备注仍能显示。
        function getEffectiveNote(group) {
            const uuid = group && (group.uuid || (group.match_info && group.match_info.uuid)) || '';
            if (uuid) {
                const entry = getLocalRootCauseStore()[uuid];
                if (entry && entry.note !== undefined && entry.note !== null) return entry.note;
            }
            return (group && group.note) || (group && group.match_info && group.match_info.note) || '';
        }

        // 仅导出“已标注根因”的故障组（合并浏览器本地保存的根因标注/备注）
        function exportLabelingResult() {
            if (!faultGroups.length) {
                document.getElementById('status').textContent = '请先加载 JSONL 文件再导出';
                return;
            }
            const store = getLocalRootCauseStore();
            const labeledGroups = faultGroups.filter(isGroupLabeled);
            if (!labeledGroups.length) {
                document.getElementById('status').textContent = '当前没有已标注的故障组，无需导出';
                return;
            }
            const content = labeledGroups.map(function(g) {
                const uuid = g.uuid || (g.match_info && g.match_info.uuid) || '';
                const entry = store[uuid];
                const merged = Object.assign({}, g);
                if (entry) {
                    merged.root_cause_annotations = entry.root_cause_annotations || g.root_cause_annotations || {};
                    if (entry.note !== undefined) merged.note = entry.note;
                }
                return JSON.stringify(merged);
            }).join('\n') + '\n';
            const blob = new Blob([content], { type: 'application/jsonl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'labeling_result.jsonl';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            document.getElementById('status').textContent = '已导出 labeling_result.jsonl（已标注 ' + labeledGroups.length + ' 组）';
        }

        // 是否已标注根因（任一根因设备 或 任一根因告警）
        function isGroupLabeled(group) {
            const rc = getEffectiveRootCause(group);
            if (!rc || typeof rc !== 'object') return false;
            return Object.keys(rc).some(function(neId) {
                const entry = rc[neId];
                if (!entry) return false;
                if (entry.device === true) return true;
                if (entry.alarms && typeof entry.alarms === 'object') {
                    return Object.keys(entry.alarms).some(function(k) { return !!entry.alarms[k]; });
                }
                return false;
            });
        }

        function renderRelatedGroupLinks(group) {
            const relatedGroups = getRelatedGroups(group);
            if (relatedGroups.length === 0) {
                return '无';
            }
            return `<div class="inline-links">${
                relatedGroups.map(uuid => `<button class="inline-link" onclick='openGroupDetailByUuid(${JSON.stringify(uuid)})'>${escapeHtml(uuid)}</button>`).join('')
            }</div>`;
        }

        function renderGroups() {
            const list = document.getElementById('groupList');
            const emptyState = document.getElementById('emptyState');
            const filterSummary = document.getElementById('filterSummary');
            const visibleGroups = filterGroups(faultGroups);

            if (filterSummary) filterSummary.textContent = `过滤后 ${visibleGroups.length} 条`;

            const labeledTotal = faultGroups.filter(isGroupLabeled).length;
            const labelCountsEl = document.getElementById('labelCounts');
            if (labelCountsEl) labelCountsEl.textContent = `已标注 ${labeledTotal} ｜ 未标注 ${faultGroups.length - labeledTotal}`;

            if (visibleGroups.length === 0) {
                list.innerHTML = '';
                emptyState.textContent = faultGroups.length === 0 ? '请选择一个 `jsonl` 文件' : '当前筛选条件下没有故障组';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            list.innerHTML = visibleGroups.map((group) => {
                const index = faultGroups.indexOf(group);
                const labeled = isGroupLabeled(group);
                const badge = labeled
                    ? '<span class="label-badge labeled">已标注根因</span>'
                    : '<span class="label-badge unlabeled">未标注根因</span>';
                const note = getEffectiveNote(group);
                return `
                <div class="card">
                    <div class="card-row">
                        <span class="group-id-link" onclick="openGroupDetail(${index})" title="点击查看详情">${escapeHtml(group.uuid || group.match_info?.uuid || `故障组 ${index + 1}`)}</span>
                        ${badge}
                        <span class="card-stats">站点 ${getSiteCount(group)} · 设备 ${getNodeCount(group)} · 告警 ${getSymptomCount(group)}</span>
                    </div>
                    <div class="time">时间范围：${escapeHtml(getGroupTimeRange(group))}</div>
                    ${note ? `<div class="card-note">📝 ${escapeHtml(note)}</div>` : ''}
                </div>
            `;
            }).join('');
        }

        function parseRuleFilterInput(value) {
            return String(value || '')
                .split(/[,，\n]+/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function addRuleFiltersFromInput() {
            const input = document.getElementById('ruleFilterInput');
            const newRules = parseRuleFilterInput(input.value);
            if (newRules.length === 0) {
                return;
            }
            const seen = new Set(ruleFilterQueries.map(ruleName => ruleName.toLowerCase()));
            newRules.forEach(ruleName => {
                const key = ruleName.toLowerCase();
                if (!seen.has(key)) {
                    seen.add(key);
                    ruleFilterQueries.push(ruleName);
                }
            });
            input.value = '';
            renderRuleFilterTokens();
            renderGroups();
        }

        function removeRuleFilter(index) {
            ruleFilterQueries.splice(index, 1);
            renderRuleFilterTokens();
            renderGroups();
        }

        function clearRuleFilters() {
            ruleFilterQueries = [];
            document.getElementById('ruleFilterInput').value = '';
            renderRuleFilterTokens();
            renderGroups();
        }

        function renderRuleFilterTokens() {
            const tokenList = document.getElementById('ruleFilterTokens');
            if (!tokenList) return;
            if (ruleFilterQueries.length === 0) {
                tokenList.innerHTML = '<span class="hint">未限制规则</span>';
                return;
            }
            tokenList.innerHTML = ruleFilterQueries.map((ruleName, index) => `
                <span class="rule-filter-token" title="${escapeHtml(ruleName)}">
                    <span class="rule-filter-token-text">${escapeHtml(ruleName)}</span>
                    <button class="rule-filter-remove" type="button" onclick="removeRuleFilter(${index})" title="移除规则过滤">×</button>
                </span>
            `).join('');
        }

        function parseJsonl(text) {
            return text
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .map((line, index) => {
                    try {
                        return JSON.parse(line);
                    } catch (error) {
                        throw new Error(`第 ${index + 1} 行解析失败: ${error.message}`);
                    }
                });
        }

        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const inputPath = event.target.value || file.webkitRelativePath || file.name || '-';
            const reader = new FileReader();
            reader.onload = function(e) {
                loadFaultGroupText(e.target.result, inputPath, null);
            };
            reader.readAsText(file, 'utf-8');
        });

        document.getElementById('noteFilterInput').addEventListener('input', function(event) {
            noteFilterQuery = event.target.value.trim();
            renderGroups();
        });

        document.getElementById('labelFilters').addEventListener('click', function(event) {
            const btn = event.target.closest('.filter-chip');
            if (!btn) return;
            labelFilter = btn.dataset.labelFilter || 'all';
            this.querySelectorAll('.filter-chip').forEach(function(chip) {
                chip.classList.toggle('active', (chip.dataset.labelFilter || 'all') === labelFilter);
            });
            renderGroups();
        });

        // 由标注页通过 window.opener 调用：回写某故障组的根因标注，实时刷新状态/计数/筛选
        window.applyFaultGroupRootCause = function(groupUuid, annotations, note) {
            const normalizedUuid = String(groupUuid || '').trim();
            if (!normalizedUuid) return;
            const index = faultGroups.findIndex(group => (group.uuid || group.match_info?.uuid || '') === normalizedUuid);
            if (index < 0) return;
            faultGroups[index].root_cause_annotations = (annotations && typeof annotations === 'object') ? annotations : {};
            if (note !== undefined) {
                faultGroups[index].note = note || '';
            }
            renderGroups();
        };

        // 默认数据：若同目录 data.js 注入了 window.FAULT_GROUPS_DATA 则自动加载，省去手动选 jsonl。
        // 没有 data.js（未运行转换工具）时跳过，手动选择文件的入口仍可用。
        (function autoLoadDefaultData() {
            const data = window.FAULT_GROUPS_DATA;
            if (!Array.isArray(data) || data.length === 0) return;
            faultGroups = data;
            currentFaultGroupFileName = 'data/';
            document.getElementById('status').textContent = '已自动加载 ' + faultGroups.length + ' 个故障组（来自 data/）';
            updateFaultGroupFileStatus('data/', false);
            renderGroups();
        })();
    </script>
</body>
</html>
