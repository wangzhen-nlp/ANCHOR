        function exportData() {
            const data = {
                nodes: currentNodes,
                links: currentLinks,
                multiSelectLinks: multiSelectLinks,
                activeGroups: Array.from(activeGroups),
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'current_view.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function sanitizeFileNamePart(value) {
            const text = String(value || '').trim();
            if (!text) return 'current';
            return text
                .replace(/[\\/:*?"<>|]+/g, '_')
                .replace(/\s+/g, '_')
                .slice(0, 80);
        }

        function formatExportTimestamp(date) {
            const pad = function(value) { return String(value).padStart(2, '0'); };
            return date.getFullYear() + '-' +
                pad(date.getMonth() + 1) + '-' +
                pad(date.getDate()) + ' ' +
                pad(date.getHours()) + ':' +
                pad(date.getMinutes()) + ':' +
                pad(date.getSeconds());
        }

        function normalizeLinkEndpoint(endpoint) {
            if (endpoint && typeof endpoint === 'object') {
                return endpoint.id || endpoint.ne_id || endpoint.name || '';
            }
            return endpoint === null || endpoint === undefined ? '' : String(endpoint);
        }

        function normalizeLinkForExport(link) {
            const normalized = {};
            Object.keys(link || {}).forEach(function(key) {
                if (key === 'source' || key === 'target') return;
                const value = link[key];
                if (typeof value !== 'function') {
                    normalized[key] = value;
                }
            });
            normalized.source = normalizeLinkEndpoint(link && link.source);
            normalized.target = normalizeLinkEndpoint(link && link.target);
            return normalized;
        }

        function normalizeNodeForExport(node) {
            const normalized = {};
            Object.keys(node || {}).forEach(function(key) {
                if (key === 'domainStyle') return;
                const value = node[key];
                if (typeof value !== 'function') {
                    normalized[key] = value;
                }
            });
            return normalized;
        }

        function collectCurrentAlarmRowsForExport(nodes) {
            const rows = [];
            (nodes || []).forEach(function(node) {
                const alarms = Array.isArray(node.alarm) ? node.alarm : [];
                alarms.forEach(function(alarm) {
                    rows.push({
                        ne_id: getRawNodeId(node),
                        site_id: node.site_id || '',
                        domain: node.domain || '',
                        fault_group_id: getAlarmFaultGroupId(alarm),
                        alarm_id: alarm.alarm_id || alarm.eid || alarm.id || '',
                        alarm_id_list: alarm.alarm_id_list || alarm.eid_list || [],
                        alarm_type: alarm.alarm_type || alarm.alarm || alarm.title || '',
                        severity: alarm.severity || alarm.alarm_level || '',
                        time: getAlarmDisplayTime(alarm),
                        clear_time: alarm['告警清除时间'] || alarm.alarm_clear_time || '',
                        ticket_id: alarm['工单号'] || alarm.ticket_id || alarm.ticketId || '',
                        raw_alarm: alarm
                    });
                });
            });
            return rows;
        }

        function collectCurrentSiteRowsForExport(nodes) {
            const siteMap = new Map();
            (nodes || []).forEach(function(node) {
                const siteId = String(node.site_id || node.site_name || '未知站点');
                if (!siteMap.has(siteId)) {
                    siteMap.set(siteId, {
                        site_id: siteId,
                        site_name: node.site_name || '',
                        ne_count: 0,
                        alarm_count: 0,
                        domains: new Set(),
                        ne_ids: []
                    });
                }
                const entry = siteMap.get(siteId);
                entry.ne_count += 1;
                entry.alarm_count += Array.isArray(node.alarm) ? node.alarm.length : 0;
                if (node.domain) entry.domains.add(String(node.domain));
                entry.ne_ids.push(getRawNodeId(node));
            });
            return Array.from(siteMap.values()).map(function(entry) {
                return {
                    site_id: entry.site_id,
                    site_name: entry.site_name,
                    ne_count: entry.ne_count,
                    alarm_count: entry.alarm_count,
                    domains: Array.from(entry.domains),
                    ne_ids: entry.ne_ids
                };
            }).sort(function(a, b) {
                return String(a.site_id).localeCompare(String(b.site_id), 'zh-CN', { numeric: true, sensitivity: 'base' });
            });
        }

        // 为每个锚点单独计算它带来的扩展 NE（按站点 N 跳）。
        // 导出时 ne_graph 还在，把这份映射存进快照后，离线页面就能按选中的锚点
        // 动态地增删邻居，而不是一把全部恢复。
        function buildAnchorContributionsForExport() {
            const contributions = {};
            if (!neGraphData || typeof neGraphData !== 'object') return contributions;
            const neEntries = Object.entries(neGraphData);
            siteNeighborAnchorNodes.forEach(function(anchorId) {
                const anchorNode = resolveNodeInfoForNeighborExpansion(anchorId);
                const anchorSiteId = anchorNode && anchorNode.site_id ? String(anchorNode.site_id) : '';
                if (!anchorSiteId) {
                    contributions[anchorId] = [];
                    return;
                }
                const expandedSites = getNthOrderNeighborSites(anchorSiteId, siteNeighborHopCount);
                const neIds = [];
                neEntries.forEach(function(entry) {
                    const neId = entry[0];
                    const info = entry[1] || {};
                    const siteId = info && info.site_id ? String(info.site_id) : '';
                    if (siteId && expandedSites.has(siteId)) {
                        neIds.push(neId);
                    }
                });
                contributions[anchorId] = neIds;
            });
            return contributions;
        }

        function buildCurrentGroupsExportPayload() {
            const exportTime = new Date();
            const activeGroupIds = Array.from(activeGroups).sort(function(a, b) {
                return String(a).localeCompare(String(b), 'zh-CN', { numeric: true, sensitivity: 'base' });
            });
            const nodes = currentNodes.map(normalizeNodeForExport);
            const links = currentLinks.map(normalizeLinkForExport);
            const alarms = collectCurrentAlarmRowsForExport(currentNodes);
            const sites = collectCurrentSiteRowsForExport(currentNodes);
            const missingTopologyLinks = links.filter(function(link) {
                return !!(link && link.missing_topology_prediction);
            });
            const groupDetails = activeGroupIds.map(function(groupId) {
                return {
                    group_id: groupId,
                    group_info: graphData && graphData.group_info ? (graphData.group_info[groupId] || null) : null
                };
            });
            const noteTextarea = document.getElementById('noteTextarea');
            return {
                exported_at: exportTime.toISOString(),
                exported_at_local: formatExportTimestamp(exportTime),
                active_groups: activeGroupIds,
                summary: {
                    active_group_count: activeGroupIds.length,
                    node_count: nodes.length,
                    site_count: sites.length,
                    link_count: links.length,
                    alarm_count: alarms.length,
                    missing_topology_link_count: missingTopologyLinks.length
                },
                note: noteTextarea ? noteTextarea.value : '',
                groups: groupDetails,
                sites: sites,
                nodes: nodes,
                links: links,
                alarms: alarms,
                missing_topology_links: missingTopologyLinks,
                alarm_group_partition: buildAlarmGroupPartition(currentNodes)
                    .map(function(group) {
                        return {
                            group_id: group.groupId,
                            alarm_count: group.alarmCount,
                            ne_ids: Array.from(group.neIds),
                            site_ids: Array.from(group.siteIds),
                            alarm_types: Array.from(group.alarmTypes)
                        };
                    }),
                edge_details: (window.edgeDetails && typeof window.edgeDetails === 'object') ? window.edgeDetails : {},
                neighbor_expansion: (function() {
                    const hasExpansion = currentNodes.some(function(n) { return n && n.isNeighborExpanded; });
                    const state = {
                        mode_enabled: !!siteNeighborModeEnabled,
                        hop_count: siteNeighborHopCount,
                        anchor_node_ids: Array.from(siteNeighborAnchorNodes)
                    };
                    // 只有真正存在邻居扩展时才额外保存扩展前的基础图，避免普通导出体积翻倍
                    if (hasExpansion) {
                        state.base_nodes = baseCurrentNodes.map(normalizeNodeForExport);
                        state.base_links = baseCurrentLinks.map(normalizeLinkForExport);
                        // 每个锚点各自带来的扩展 NE，离线时据此按锚点动态增删
                        state.anchor_contributions = buildAnchorContributionsForExport();
                    }
                    return state;
                })(),
                graph_meta: {
                    match_info: graphData ? (graphData.match_info || null) : null,
                    role_mapping: graphData ? (graphData.role_mapping || null) : null,
                    topology_completion: graphData ? (graphData.topology_completion || null) : null,
                    fault_pattern_managed_sites: graphData ? (graphData.fault_pattern_managed_sites || null) : null,
                    fault_pattern_analysis: graphData ? (graphData.fault_pattern_analysis || null) : null,
                    fault_patterns: graphData ? (graphData.fault_patterns || null) : null
                }
            };
        }

        function exportCurrentGroupsHtml() {
            if (!currentNodes || currentNodes.length === 0) {
                showError('当前没有渲染的故障组/设备，无法导出');
                return;
            }
            const payload = buildCurrentGroupsExportPayload();
            const snapshotScript = [
                '(function(){',
                '  const SNAPSHOT = JSON.parse(decodeURIComponent(' + JSON.stringify(encodeURIComponent(JSON.stringify(payload))) + '));',
                '  function restoreSnapshot(){',
                '    try {',
                '      const meta = SNAPSHOT.graph_meta || {};',
                '      graphData = {',
                '        group_info: {},',
                '        match_info: meta.match_info || null,',
                '        role_mapping: meta.role_mapping || null,',
                '        topology_completion: meta.topology_completion || null,',
                '        fault_pattern_managed_sites: meta.fault_pattern_managed_sites || null,',
                '        fault_pattern_analysis: meta.fault_pattern_analysis || null,',
                '        fault_patterns: meta.fault_patterns || null',
                '      };',
                '      (SNAPSHOT.groups || []).forEach(function(group){ graphData.group_info[group.group_id] = group.group_info || {}; });',
                '      graphData.nodes = SNAPSHOT.nodes || [];',
                '      window.edgeDetails = (SNAPSHOT.edge_details && typeof SNAPSHOT.edge_details === "object") ? SNAPSHOT.edge_details : {};',
                '      if (typeof updateRoleSiteSets === "function") updateRoleSiteSets(graphData);',
                '      if (typeof updateFaultPatternManagedSites === "function") updateFaultPatternManagedSites(graphData);',
                '      if (typeof updateTopologyHighlightSites === "function") updateTopologyHighlightSites(graphData);',
                '      allNodes = (SNAPSHOT.nodes || []).map(function(n){ const style = getDomainStyle(n.domain || ""); return Object.assign({}, n, { domainStyle: style }); });',
                '      allLinks = (SNAPSHOT.links || []).map(function(l){ return Object.assign({}, l); });',
                '      currentNodes = allNodes.map(function(n){ return Object.assign({}, n); });',
                '      currentLinks = allLinks.map(function(l){ return Object.assign({}, l); });',
                '      filteredLinks = currentLinks.slice();',
                '      const neState = SNAPSHOT.neighbor_expansion || null;',
                '      if (neState && Array.isArray(neState.base_nodes) && neState.base_nodes.length) {',
                '        baseCurrentNodes = neState.base_nodes.map(function(n){ return Object.assign({}, n, { domainStyle: getDomainStyle(n.domain || "") }); });',
                '        baseCurrentLinks = (neState.base_links || []).map(function(l){ return Object.assign({}, l); });',
                '        // 离线快照保存了扩展前(base)、扩展后(current)两份图，',
                '        // 以及每个锚点各自的扩展 NE；没有 ne_graph.json 时也能按锚点动态增删邻居',
                '        window.__offlineNeighborExpansion = {',
                '          hasExpansion: true,',
                '          expandedNodes: currentNodes.map(function(n){ return Object.assign({}, n); }),',
                '          expandedLinks: currentLinks.map(function(l){ return Object.assign({}, l); }),',
                '          baseNodeIds: baseCurrentNodes.map(function(n){ return n.id; }),',
                '          contributions: (neState.anchor_contributions && typeof neState.anchor_contributions === "object") ? neState.anchor_contributions : {}',
                '        };',
                '      } else {',
                '        baseCurrentNodes = currentNodes.map(function(n){ return Object.assign({}, n); });',
                '        baseCurrentLinks = currentLinks.map(function(l){ return Object.assign({}, l); });',
                '        window.__offlineNeighborExpansion = null;',
                '      }',
                '      if (neState) {',
                '        siteNeighborHopCount = Math.max(1, Number(neState.hop_count) || 1);',
                '        siteNeighborAnchorNodes = new Set(Array.isArray(neState.anchor_node_ids) ? neState.anchor_node_ids : []);',
                '        siteNeighborModeEnabled = !!neState.mode_enabled;',
                '        const hopInput = document.getElementById("siteNeighborHopInput");',
                '        if (hopInput) hopInput.value = siteNeighborHopCount;',
                '        const modeCheckbox = document.getElementById("siteNeighborModeCheckbox");',
                '        if (modeCheckbox) modeCheckbox.checked = siteNeighborModeEnabled;',
                '        const neMapBtn = document.getElementById("mapSiteNeighborBtn");',
                '        if (neMapBtn) { neMapBtn.classList.toggle("active", siteNeighborModeEnabled); neMapBtn.classList.toggle("warning", !siteNeighborModeEnabled); }',
                '        if (typeof updateSiteNeighborSelectionUI === "function") updateSiteNeighborSelectionUI();',
                '        if (typeof updateMapModeIndicator === "function") updateMapModeIndicator();',
                '      }',
                '      activeGroups = new Set(SNAPSHOT.active_groups || []);',
                '      currentNote = SNAPSHOT.note || "";',
                '      const fileStatus = document.getElementById("fileStatus");',
                '      if (fileStatus) fileStatus.textContent = "已加载导出的当前传播图快照";',
                '      document.getElementById("groupInput").disabled = false;',
                '      document.getElementById("addGroupBtn").disabled = false;',
                '      document.getElementById("searchInput").disabled = false;',
                '      document.getElementById("searchAddBtn").disabled = false;',
                '      updateActiveGroupsUI();',
                '      renderAlarmMetaSummary();',
                '      updateStats();',
                '      document.getElementById("currentNodes").textContent = currentNodes.length;',
                '      renderAlarmGroupPartitionSummary();',
                '      renderMap();',
                '      renderNodeList();',
                '      enableNotePanel();',
                '      loadNoteToPanel();',
                '      showLoading(false);',
                '    } catch (error) {',
                '      console.error("恢复导出传播图失败:", error);',
                '      if (typeof showError === "function") showError("恢复导出传播图失败: " + (error.message || error));',
                '    }',
                '  }',
                '  document.addEventListener("DOMContentLoaded", function(){ setTimeout(restoreSnapshot, 0); });',
                '})();'
            ].join('\n');
            let html = pristineDocumentHtml || ('<!DOCTYPE html>\n' + document.documentElement.outerHTML);
            html = html.replace(/<\/body>\s*<\/html>\s*$/i, '<scr' + 'ipt>' + snapshotScript + '</scr' + 'ipt></body></html>');
            const nameBase = payload.active_groups.length
                ? payload.active_groups.slice(0, 3).join('_') + (payload.active_groups.length > 3 ? '_等' + payload.active_groups.length + '组' : '')
                : 'current_view';
            const timestampPart = payload.exported_at_local.replace(/[-:\s]/g, '');
            const filename = 'fault_group_propagation_' + sanitizeFileNamePart(nameBase) + '_' + timestampPart + '.html';
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==========================================
        // 备注功能相关函数
        // ==========================================

        // 启用备注面板
        function enableNotePanel() {
            document.getElementById('noteTextarea').disabled = false;
        }

        // 禁用备注面板
        function disableNotePanel() {
            const noteTextarea = document.getElementById('noteTextarea');
            noteTextarea.disabled = true;
            noteTextarea.value = '';
            currentNote = '';
        }

        // 加载备注到编辑区
        function loadNoteToPanel() {
            document.getElementById('noteTextarea').value = currentNote || '';
        }

        // 更新备注状态显示
        function updateNoteStatus(message, isError) {
            const statusEl = document.getElementById('noteStatus');
            statusEl.textContent = message || '';
            statusEl.className = 'note-status' + (isError ? ' error' : ' success');
            if (message) {
                setTimeout(function() {
                    statusEl.textContent = '';
                    statusEl.className = 'note-status';
                }, 3000);
            }
        }

        // 获取带备注的数据对象
        function getDataWithNote() {
            if (!graphData) return null;
            const noteText = document.getElementById('noteTextarea').value.trim();
            // 更新原始数据对象
            graphData.note = noteText;
            graphData.note_updated_at = new Date().toISOString();
            // 创建数据副本用于保存
            const dataWithNote = JSON.parse(JSON.stringify(graphData));
            return dataWithNote;
        }

        async function saveTextAsJsonlFile(content, suggestedName) {
            if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: suggestedName || 'fault_groups_with_note.jsonl',
                    types: [{
                        description: 'Fault Group JSONL',
                        accept: {
                            'application/json': ['.jsonl', '.json'],
                            'text/plain': ['.jsonl', '.txt']
                        }
                    }]
                });
                if (!handle) {
                    throw new Error('未选择保存文件');
                }
                const writable = await handle.createWritable();
                await writable.write(content);
                await writable.close();
                return { mode: 'save-as', fileName: handle.name || suggestedName || '' };
            }

            const filename = suggestedName || 'fault_groups_with_note.jsonl';
            const blob = new Blob([content], { type: 'application/jsonl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            return { mode: 'download', fileName: filename };
        }

        // 保存备注到原始文件（使用 File System Access API）
        async function saveNoteToFile() {
            if (!graphData) {
                updateNoteStatus('请先加载数据文件', true);
                return;
            }

            const dataWithNote = getDataWithNote();
            if (!dataWithNote) return;

            try {
                const browserBridge = getFaultGroupBrowserBridge();
                if (browserBridge && originalGroupUuid) {
                    try {
                        if (typeof browserBridge.prepareFaultGroupNoteSave === 'function') {
                            const extraFields = { root_cause_annotations: dataWithNote.root_cause_annotations || {} };
                            const prepared = browserBridge.prepareFaultGroupNoteSave(originalGroupUuid, dataWithNote.note || '', extraFields);
                            let saveResult = null;

                            // 没有绑定原文件句柄时，直接在当前点击事件里弹保存窗口，
                            // 避免经过额外 await 后丢失 user activation。
                            if (!prepared.hasBoundWritableHandle) {
                                saveResult = await saveTextAsJsonlFile(prepared.content, prepared.suggestedFileName);
                            } else if (typeof browserBridge.tryOverwriteFaultGroupSource === 'function') {
                                saveResult = await browserBridge.tryOverwriteFaultGroupSource(prepared.content);
                                if (!saveResult || !saveResult.ok) {
                                    updateNoteStatus('写回原始 JSONL 失败，请重新打开文件或改用另存方式', true);
                                    return;
                                }
                            }

                            if (typeof browserBridge.applySavedFaultGroupNote === 'function') {
                                browserBridge.applySavedFaultGroupNote(originalGroupUuid, prepared.note, prepared.noteUpdatedAt, prepared.extraFields);
                            }
                            currentNote = prepared.note || '';
                            if (saveResult && saveResult.mode === 'overwrite') {
                                updateNoteStatus('✓ 备注已写回原始 JSONL 文件', false);
                            } else if (saveResult && saveResult.mode === 'download') {
                                updateNoteStatus(`✓ 备注已下载到 ${saveResult.fileName || 'JSONL 文件'}`, false);
                            } else {
                                updateNoteStatus('✓ 备注已写入更新后的 JSONL 文件', false);
                            }
                            return;
                        }
                    } catch (bridgeError) {
                        if (bridgeError && bridgeError.name === 'AbortError') {
                            updateNoteStatus('已取消保存', true);
                            return;
                        }
                        console.error('写回原始 JSONL 失败:', bridgeError);
                        updateNoteStatus(`写回原始 JSONL 失败：${bridgeError.message || bridgeError}`, true);
                        return;
                    }
                }

                // 尝试使用 File System Access API
                if (currentFileHandle && currentFileHandle.createWritable) {
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(JSON.stringify(dataWithNote, null, 2));
                    await writable.close();
                    currentNote = dataWithNote.note || '';
                    updateNoteStatus('✓ 备注已保存到原始文件', false);
                } else {
                    const uuid = dataWithNote.uuid || dataWithNote.match_info?.uuid || 'fault-group';
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const filename = `${uuid}_${timestamp}_with_note.jsonl`;
                    const saveResult = await saveTextAsJsonlFile(JSON.stringify(dataWithNote) + '\n', filename);
                    currentNote = dataWithNote.note || '';
                    if (saveResult && saveResult.mode === 'download') {
                        updateNoteStatus(`✓ 备注已下载到 ${saveResult.fileName || 'JSONL 文件'}`, false);
                    } else {
                        updateNoteStatus('✓ 备注已写入更新后的 JSONL 文件', false);
                    }
                }
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    updateNoteStatus('已取消保存', true);
                    return;
                }
                console.error('保存失败:', error);
                updateNoteStatus(`保存失败：${error.message || error}`, true);
            }
        }

        // 监听备注输入变化
        document.getElementById('noteTextarea').addEventListener('input', function(e) {
            if (!graphData) return;
            graphData.note = e.target.value.trim();
            graphData.note_updated_at = new Date().toISOString();
            autoSaveResults();
            pushStatusToOverview();
        });

        // 文件处理
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.json')) {
                showError('请选择 JSON 文件');
                return;
            }

            // 尝试获取文件句柄（用于后续保存）
            try {
                if (event.target.files && event.target.files[0]) {
                    // 存储文件引用，注意：File System Access API 需要特殊方式获取 handle
                    // 这里我们尝试通过 showSaveFilePicker 获取，但首次加载时只能通过下载方式保存
                    currentFileHandle = null;
                }
            } catch (e) {
                console.log('File System Access API 不可用');
            }

            showLoading(true);
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const payload = extractGroupPayload(JSON.parse(e.target.result));
                    groupNavList = payload.groups;
                    groupNavIndex = payload.index;
                    renderSingleGroup(payload.current);
                    updateGroupNavUI();
                } catch (error) {
                    showError('解析文件失败: ' + error.message);
                    showLoading(false);
                    disableNotePanel();
                }
            };
            reader.readAsText(file);
        }

        function handleNeGraphFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.json')) {
                showError('请选择 ne_graph.json 文件');
                return;
            }

            const neGraphStatus = document.getElementById('neGraphStatus');
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data || typeof data !== 'object' || Array.isArray(data)) {
                        throw new Error('ne_graph.json 顶层必须是对象');
                    }
                    neGraphData = data;
                    neGraphStatus.textContent = 'ne_graph：已加载 ' + file.name + '，NE 数 ' + Object.keys(neGraphData).length;
                } catch (error) {
                    neGraphData = null;
                    neGraphStatus.textContent = 'ne_graph：加载失败 - ' + error.message;
                    showError('解析 ne_graph.json 失败: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        // 拖放支持
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
            document.body.style.boxShadow = 'inset 0 0 0 3px #0969da';
        });
        document.addEventListener('dragleave', function(e) {
            e.preventDefault();
            document.body.style.boxShadow = 'none';
        });
        document.addEventListener('drop', function(e) {
            e.preventDefault();
            document.body.style.boxShadow = 'none';
            const file = e.dataTransfer.files[0];
            if (file) {
                document.getElementById('fileInput').files = e.dataTransfer.files;
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            }
        });

        // 心跳：服务模式下用 pageId 注册页面存活；关闭时尽量通知服务端，失败则由服务端超时兜底。
        if (location.protocol === 'http:' || location.protocol === 'https:') {
            const _pageId = 'page-' + Date.now() + '-' + Math.random().toString(36).slice(2);
            const _heartbeatUrl = '/ping?pageId=' + encodeURIComponent(_pageId);
            const _leaveUrl = '/leave?pageId=' + encodeURIComponent(_pageId);
            const _heartbeat = function() {
                fetch(_heartbeatUrl, { cache: 'no-store' }).catch(function() {});
            };
            const _leave = function() {
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(_leaveUrl);
                    return;
                }
                fetch(_leaveUrl, { method: 'POST', keepalive: true }).catch(function() {});
            };
            _heartbeat();
            setInterval(_heartbeat, 10000);
            window.addEventListener('pagehide', _leave);
        }
    </script>
