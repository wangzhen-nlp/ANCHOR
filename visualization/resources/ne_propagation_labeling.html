                    deviceCount: site.count,
                    isExpandedSite: !!site.hasExpandedNode && !site.hasBaseNode,
                    hasExpandedNode: !!site.hasExpandedNode,
                    hasBaseNode: !!site.hasBaseNode,
                    isFaultPatternSite: !!site.isFaultPatternSite,
                    isTopologyHighlightSite: !!site.isTopologyHighlightSite
                };
            });
        }

        function buildSitePositionLookup(renderCoords) {
            const nodesWithRenderedCoords = currentNodes.filter(function(node) {
                return renderCoords && renderCoords[node.id];
            });
            const siteLocations = getCurrentSiteLocations(nodesWithRenderedCoords, renderCoords);
            const lookup = new Map();
            siteLocations.forEach(function(site) {
                const pos = [site.latitude, site.longitude];
                [site.siteId, site.siteName, site.label].forEach(function(siteKey) {
                    const normalized = String(siteKey || '').trim();
                    if (normalized && !lookup.has(normalized)) {
                        lookup.set(normalized, pos);
                    }
                });
            });
            return lookup;
        }

        function getMissingTopologyEndpointPosition(link, endpoint, fallbackNodeId, renderCoords, sitePositionLookup) {
            const siteKey = endpoint === 'source'
                ? (link.source_site || link.sourceSite)
                : (link.target_site || link.targetSite);
            const normalizedSiteKey = String(siteKey || '').trim();
            if (normalizedSiteKey && sitePositionLookup && sitePositionLookup.has(normalizedSiteKey)) {
                return sitePositionLookup.get(normalizedSiteKey);
            }
            return renderCoords[fallbackNodeId];
        }

        function getMissingTopologyDirectionalPositions(link, sourcePos, targetPos) {
            const relationKey = normalizeMissingTopologyRelation(link);
            if (relationKey === 'upstream') {
                return {
                    upstreamPos: targetPos,
                    downstreamPos: sourcePos
                };
            }
            return {
                upstreamPos: sourcePos,
                downstreamPos: targetPos
            };
        }

        function getNodeSiteTitle(node) {
            return node.site_id || node.site_name || '未知站点';
        }

        function getRawNodeId(nodeOrId) {
            const fullId = typeof nodeOrId === 'string' ? nodeOrId : ((nodeOrId && nodeOrId.id) || '');
            if (!fullId) return '-';
            const parts = String(fullId).split('::');
            return parts[parts.length - 1] || fullId;
        }

        function formatTimestampSeconds(ts) {
            if (ts === null || ts === undefined || ts === '') return '';
            const numberTs = Number(ts);
            if (!Number.isFinite(numberTs)) return '';
            const date = new Date(numberTs * 1000);
            if (isNaN(date.getTime())) return '';
            const pad = function(value) { return String(value).padStart(2, '0'); };
            return date.getFullYear() + '-' +
                pad(date.getMonth() + 1) + '-' +
                pad(date.getDate()) + ' ' +
                pad(date.getHours()) + ':' +
                pad(date.getMinutes()) + ':' +
                pad(date.getSeconds());
        }

        function getAlarmDisplayTime(alarm) {
            if (!alarm || typeof alarm !== 'object') return '-';
            return alarm.time || alarm.alarm_time || alarm.time_str || formatTimestampSeconds(alarm.ts) || '-';
        }

        function getAlarmFaultGroupId(alarm) {
            if (!alarm || typeof alarm !== 'object') return '';
            const candidates = [
                alarm['故障组ID'],
                alarm.fault_group_id,
                alarm.faultGroupId,
                alarm.alarm_group_id,
                alarm.alarmGroupId,
                alarm.group_id,
                alarm.groupId
            ];
            for (let i = 0; i < candidates.length; i++) {
                const text = String(candidates[i] ?? '').trim();
                if (text && text !== '0' && text !== '-' && text !== 'null' && text !== 'undefined') {
                    return text;
                }
            }
            return '';
        }

        const ALARM_GROUP_COLORS = [
            '#0969da', '#cf222e', '#1f883d', '#9a6700', '#8250df',
            '#bf3989', '#0891b2', '#bc4c00', '#57606a', '#0f766e'
        ];

        const ALARM_GROUP_MARKER_SHAPES = [
            'circle', 'square', 'diamond', 'triangle', 'hexagon', 'star'
        ];

        function getAlarmGroupHash(groupId) {
            const text = String(groupId || '未分组');
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
            }
            return Math.abs(hash);
        }

        function getAlarmGroupColor(groupId) {
            return ALARM_GROUP_COLORS[getAlarmGroupHash(groupId) % ALARM_GROUP_COLORS.length];
        }

        function getAlarmGroupShortLabel(groupId) {
            const text = String(groupId || '未分组');
            if (text === '未分组') return '?';
            const compact = text.replace(/^group[_:-]*/i, '').replace(/^fault[_:-]*/i, '');
            return compact.length <= 3 ? compact : compact.slice(-3);
        }

        function getAlarmGroupMarkerSpec(groupId) {
            const hash = getAlarmGroupHash(groupId);
            return {
                groupId: String(groupId || '未分组'),
                color: getAlarmGroupColor(groupId),
                shape: ALARM_GROUP_MARKER_SHAPES[
                    Math.floor(hash / ALARM_GROUP_COLORS.length) % ALARM_GROUP_MARKER_SHAPES.length
                ],
                label: getAlarmGroupShortLabel(groupId)
            };
        }

        function getAlarmGroupShapeSvg(shape, color) {
            const fill = escapeHtml(color);
            const stroke = '#ffffff';
            if (shape === 'square') {
                return '<rect x="17" y="17" width="66" height="66" rx="13" fill="' + fill + '" stroke="' + stroke + '" stroke-width="8"></rect>';
            }
            if (shape === 'diamond') {
                return '<polygon points="50,7 93,50 50,93 7,50" fill="' + fill + '" stroke="' + stroke + '" stroke-width="8" stroke-linejoin="round"></polygon>';
            }
            if (shape === 'triangle') {
                return '<polygon points="50,8 94,90 6,90" fill="' + fill + '" stroke="' + stroke + '" stroke-width="8" stroke-linejoin="round"></polygon>';
            }
            if (shape === 'hexagon') {
                return '<polygon points="50,6 88,28 88,72 50,94 12,72 12,28" fill="' + fill + '" stroke="' + stroke + '" stroke-width="8" stroke-linejoin="round"></polygon>';
            }
            if (shape === 'star') {
                return '<polygon points="50,5 61,36 94,36 67,56 78,89 50,70 22,89 33,56 6,36 39,36" fill="' + fill + '" stroke="' + stroke + '" stroke-width="7" stroke-linejoin="round"></polygon>';
            }
            return '<circle cx="50" cy="50" r="42" fill="' + fill + '" stroke="' + stroke + '" stroke-width="8"></circle>';
        }

        function renderAlarmGroupMarker(groupId, options) {
            if (!String(groupId || '').trim()) return '';
            const opts = options || {};
            const spec = getAlarmGroupMarkerSpec(groupId);
            const size = opts.size || 22;
            const label = String(spec.label || '?').slice(-3);
            const fontSize = label.length >= 3 ? 28 : (label.length === 2 ? 32 : 38);
            const title = opts.title === false ? '' : ' title="故障组 ' + escapeHtml(spec.groupId) + '"';
            return '<span class="alarm-group-marker"' + title + ' style="--alarm-group-marker-size: ' + size + 'px;">' +
                '<svg viewBox="0 0 100 100" aria-hidden="true">' +
                    getAlarmGroupShapeSvg(spec.shape, spec.color) +
                    '<text x="50" y="55" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="' + fontSize + '">' + escapeHtml(label) + '</text>' +
                '</svg>' +
            '</span>';
        }

        function getNodeAlarmGroupIds(node) {
            const groups = [];
            const seen = new Set();
            (node && Array.isArray(node.alarm) ? node.alarm : []).forEach(function(alarm) {
                const groupId = getAlarmFaultGroupId(alarm);
                if (!groupId) return;
                if (!seen.has(groupId)) {
                    seen.add(groupId);
                    groups.push(groupId);
                }
            });
            return groups;
        }

        function buildAlarmGroupPartition(nodes) {
            const groupMap = new Map();
            (nodes || []).forEach(function(node) {
                const alarms = Array.isArray(node.alarm) ? node.alarm : [];
                alarms.forEach(function(alarm) {
                    const groupId = getAlarmFaultGroupId(alarm);
                    if (!groupId) return;
                    if (!groupMap.has(groupId)) {
                        groupMap.set(groupId, {
                            groupId: groupId,
                            alarmCount: 0,
                            neIds: new Set(),
                            siteIds: new Set(),
                            alarmTypes: new Set()
                        });
                    }
                    const entry = groupMap.get(groupId);
                    entry.alarmCount += 1;
                    entry.neIds.add(getRawNodeId(node));
                    if (node.site_id) entry.siteIds.add(String(node.site_id));
                    const alarmType = alarm.alarm_type || alarm.alarm || alarm.title || '';
                    if (alarmType) entry.alarmTypes.add(String(alarmType));
                });
            });
            return Array.from(groupMap.values()).sort(function(a, b) {
                if (b.alarmCount !== a.alarmCount) return b.alarmCount - a.alarmCount;
                return String(a.groupId).localeCompare(String(b.groupId), 'zh-CN', { numeric: true, sensitivity: 'base' });
            });
        }

        function renderAlarmGroupPartitionSummary() {
            const container = document.getElementById('alarmGroupPartitionValues');
            if (!container) return;
            const groups = buildAlarmGroupPartition(currentNodes);
            if (!groups.length) {
                container.innerHTML = '<div class="alarm-meta-value alarm-meta-empty">当前渲染范围内无带故障组ID的告警</div>';
                return;
            }
            container.innerHTML = groups.map(function(group) {
                const color = getAlarmGroupColor(group.groupId);
                const sites = Array.from(group.siteIds).slice(0, 4);
                const nes = Array.from(group.neIds).slice(0, 4);
                const alarmTypes = Array.from(group.alarmTypes).slice(0, 3);
                const siteSuffix = group.siteIds.size > sites.length ? ' 等' + group.siteIds.size + '站点' : '';
                const neSuffix = group.neIds.size > nes.length ? ' 等' + group.neIds.size + '设备' : '';
                return '<div class="alarm-group-card" style="--alarm-group-color: ' + color + ';">' +
                    '<div class="alarm-group-card-header">' +
                        '<div class="alarm-group-card-id">' + renderAlarmGroupMarker(group.groupId, { size: 22, title: false }) + '<span class="alarm-group-id-text">' + escapeHtml(group.groupId) + '</span></div>' +
                        '<div class="alarm-group-card-count">' + group.alarmCount + ' 告警</div>' +
                    '</div>' +
                    '<div class="alarm-group-card-meta">设备: ' + escapeHtml(nes.join(', ') + neSuffix) + '</div>' +
                    '<div class="alarm-group-card-meta">站点: ' + escapeHtml(sites.join(', ') + siteSuffix) + '</div>' +
                    (alarmTypes.length ? '<div class="alarm-group-card-alarms">类型: ' + escapeHtml(alarmTypes.join(' / ')) + '</div>' : '') +
                '</div>';
            }).join('');
        }

        function renderMarkerAlarmGroupBadges(node) {
            const groups = getNodeAlarmGroupIds(node);
            if (!groups.length) return '';
            const visibleGroups = groups.slice(0, 3);
            const badgeHtml = visibleGroups.map(function(groupId) {
                return renderAlarmGroupMarker(groupId, { size: 18 });
            }).join('');
            const moreHtml = groups.length > visibleGroups.length
                ? '<span class="alarm-group-more-marker">+' + (groups.length - visibleGroups.length) + '</span>'
                : '';
            return '<div class="marker-alarm-groups">' + badgeHtml + moreHtml + '</div>';
        }

        function isVirtualAlarm(alarm) {
            return !!(alarm && (alarm.virtual || alarm.__virtual__ || alarm.inferred_virtual));
        }

        function nodeHasVirtualAlarm(node) {
            return Array.isArray(node && node.alarm) && node.alarm.some(isVirtualAlarm);
        }

        function renderVirtualAlarmBadge(alarm) {
            if (!isVirtualAlarm(alarm)) return '';
            const label = alarm.latent ? 'latent' : 'virtual';
            const confidence = Number(alarm.confidence);
            const confidenceText = Number.isFinite(confidence)
                ? ' conf=' + confidence.toFixed(2)
                : '';
            const sourceText = alarm.virtual_source ? ' / ' + escapeHtml(alarm.virtual_source) : '';
            return '<span class="virtual-alarm-badge" title="插补事件' + confidenceText + sourceText + '">' + label + '</span>';
        }

        function renderMarkerVirtualBadge(node) {
            if (!nodeHasVirtualAlarm(node)) return '';
            const virtualCount = (node.alarm || []).filter(isVirtualAlarm).length;
            return '<span class="marker-virtual-badge" title="插补事件 ' + virtualCount + ' 条">V</span>';
        }

        function buildMarkerHtml(node, svgHtml, isSelected, isHighlighted) {
            return '<div class="marker-pin ' +
                (node.isNeighborExpanded ? 'neighbor-expanded ' : '') +
                (isRootCauseNode(node) ? 'rc-root ' : '') +
                (isSelected ? 'selected ' : '') +
                (isHighlighted ? 'highlighted' : '') +
                '">' + svgHtml + renderMarkerAlarmGroupBadges(node) + renderMarkerVirtualBadge(node) + '</div>';
        }

        // 构建设备标记气泡内容（每次打开都按当前根因标注重建，避免勾选痕迹丢失）
        function buildNodeMarkerPopup(node, lat, lng) {
            const style = getDomainStyle(node.domain || '');
            const isHighlighted = highlightedNodes.has(node.id);
            let popupContent = '<div class="popup-title">' + getRawNodeId(node) + '</div>' +
                '<div class="popup-row">站点: ' + getNodeSiteTitle(node) + '</div>' +
                '<div class="popup-row">名称: ' + (node.site_name || node.site_id || '-') + '</div>' +
                '<div class="popup-row">Group: ' + (node.group || '-') + '</div>' +
                '<div class="popup-row">类型: ' + (node.network_type || node.type || '-') + '</div>' +
                '<div class="popup-row">Domain: <span style="color:' + style.color + '; font-weight:bold;">' + style.label + '</span></div>' +
                '<div class="popup-row">厂商: ' + (node.manufacturer || '-') + '</div>';
            if (lat !== undefined && lat !== null && lng !== undefined && lng !== null) {
                popupContent += '<div class="popup-row">坐标: ' + Number(lat).toFixed(6) + ', ' + Number(lng).toFixed(6) + '</div>';
            }

            if (node.alarm && node.alarm.length > 0) {
                const alarmGroups = getNodeAlarmGroupIds(node);
                if (alarmGroups.length > 0) {
                    popupContent += '<div class="popup-row" style="margin-top: 8px; color: #24292f; font-weight: 600;">涉及故障组</div>' +
                        '<div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">' +
                        alarmGroups.map(function(groupId) {
                            return '<span style="display:inline-flex; align-items:center; gap:4px; padding:2px 6px; border-radius:999px; background:#f6f8fa; border:1px solid #d0d7de; color:#24292f; font-size:10px; font-weight:700;">' +
                                renderAlarmGroupMarker(groupId, { size: 18 }) + '<span>' + escapeHtml(groupId) + '</span>' +
                            '</span>';
                        }).join('') +
                        '</div>';
                }
                const alarmRows = node.alarm.map(function(alarm, alarmIndex) {
                    const alarmTime = getAlarmDisplayTime(alarm);
                    const alarmClearTime = alarm['告警清除时间'] || alarm.alarm_clear_time || '-';
                    const alarmTitle = alarm.alarm_type || alarm.title || '未知告警';
                    const ticketId = alarm['工单号'] || '-';
                    const faultGroup = getAlarmFaultGroupId(alarm);
                    const faultGroupHtml = faultGroup
                        ? renderAlarmGroupMarker(faultGroup, { size: 16 }) + '<span>' + escapeHtml(faultGroup) + '</span>'
                        : '<span>-</span>';
                    const virtualBadge = renderVirtualAlarmBadge(alarm);
                    return '<div style="margin-top: 6px; padding-top: 6px; border-top: 1px solid #d8dee4;">' +
                        '<div style="font-size: 12px; color: #cf222e; font-weight: 600; line-height: 1.4; display:flex; gap:6px; align-items:center; flex-wrap:wrap;">' +
                            '<span>' + alarmTitle + '</span>' + virtualBadge +
                        '</div>' +
                        '<div style="font-size: 10px; color: #57606a; margin-top: 2px;">工单号: ' + ticketId + '</div>' +
                        '<div style="font-size: 10px; color: #57606a; display:flex; align-items:center; gap:4px;">故障组ID: ' + faultGroupHtml + '</div>' +
                        '<div style="font-size: 10px; color: #57606a;">告警持续时间: ' + alarmTime + '～' + alarmClearTime + '</div>' +
                        buildAlarmRootCauseLabel(node, alarm, alarmIndex) +
                        '</div>';
                }).join('');
                popupContent += '<div class="popup-row" style="margin-top: 8px; color: #24292f; font-weight: 600;">告警列表 (' + node.alarm.length + ' 个)</div>' + alarmRows;
            } else {
                popupContent += '<div class="popup-row">告警: 0 个</div>';
            }

            // 根因标注（设备级）
            popupContent += buildDeviceRootCauseHtml(node);

            if (isHighlighted) {
                popupContent += '<div class="popup-row" style="color: #ffd700; font-weight: bold; font-size: 11px; margin-top: 4px;">⭐ 搜索匹配站点</div>';
            }

            popupContent += (multiSelectMode ? '<div class="popup-row" style="color: #cf222e; font-weight: bold; margin-top: 8px; border-top: 1px solid #d0d7de; padding-top: 8px;">' +
                (multiSelectedNodes.has(node.id) ? '✓ 已选中 (点击取消)' : '点击标记以选择') + '</div>' : '');

            return popupContent;
        }

        // 当前组中该设备是否被标为根因（告警根因 或 设备根因）
        function isRootCauseNode(node) {
            if (!node) return false;
            const entry = getNodeRootCauseEntry(node.id, false);
            if (!entry) return false;
            if (entry.device === true) return true;
            if (entry.alarms && typeof entry.alarms === 'object') {
                return Object.keys(entry.alarms).some(function(k) { return !!entry.alarms[k]; });
            }
            return false;
        }

        // 返回当前组的根因设备列表：{ id, type:'alarm'|'device' }
        function getRootCauseDeviceList() {
            const store = (graphData && graphData.root_cause_annotations) || {};
            const list = [];
            Object.keys(store).forEach(function(neId) {
                const entry = store[neId];
                if (!entry) return;
                const hasAlarmRc = entry.alarms && typeof entry.alarms === 'object' &&
                    Object.keys(entry.alarms).some(function(k) { return !!entry.alarms[k]; });
                if (hasAlarmRc) {
                    list.push({ id: neId, type: 'alarm' });
                } else if (entry.device === true) {
                    list.push({ id: neId, type: 'device' });
                }
            });
            return list;
        }

        // 渲染侧栏“根因设备”可点击列表
        function renderRootCausePanel() {
            const panel = document.getElementById('rcLocatePanel');
            if (!panel) return;
            const list = getRootCauseDeviceList();
            const listEl = document.getElementById('rcLocateList');
            const countEl = document.getElementById('rcLocateCount');
            if (countEl) countEl.textContent = String(list.length);
            if (list.length === 0) {
                panel.style.display = 'none';
                if (listEl) listEl.innerHTML = '';
                return;
            }
            panel.style.display = 'block';
            if (!listEl) return;
            listEl.innerHTML = list.map(function(item) {
                const node = allNodes.find(function(n) { return n.id === item.id; });
                const site = (node && (node.site_id || node.site_name)) || '-';
                const tag = item.type === 'alarm'
                    ? '<span class="rc-loc-tag alarm">告警根因</span>'
                    : '<span class="rc-loc-tag device">设备根因</span>';
                return '<div class="rc-locate-item" onclick="locateRootCauseDevice(' + rcJsLiteral(item.id) + ')">' +
                    '<span class="rc-loc-id">' + escapeHtml(String(item.id)) + '</span>' +
                    '<span class="rc-loc-site">' + escapeHtml(String(site)) + '</span>' +
                    tag +
                    '</div>';
            }).join('');
        }

        // 定位到单个根因设备：平移/缩放并弹出详情
        function locateRootCauseDevice(neId) {
            if (!map) return;
            const marker = mapMarkers[neId];
            if (!marker) {
                updateAutoSaveStatus('该根因设备当前未在地图显示（可能被设备类型筛选隐藏）', true);
                return;
            }
            const latlng = marker.getLatLng();
            map.setView(latlng, Math.max(map.getZoom(), 14), { animate: true });
            closeAlarmPopup();
            selectNodeWithoutMapRefresh(neId);
            if (selectedNode === neId) {
                showNodeAlarms(neId);
            }
        }

        // 定位到所有根因设备：自动框选视野
        function locateAllRootCauseDevices() {
            if (!map) return;
            const latlngs = [];
            getRootCauseDeviceList().forEach(function(item) {
                const m = mapMarkers[item.id];
                if (m) latlngs.push(m.getLatLng());
            });
            if (!latlngs.length) {
                updateAutoSaveStatus('没有可定位的根因设备', true);
                return;
            }
            if (latlngs.length === 1) {
                map.setView(latlngs[0], Math.max(map.getZoom(), 14), { animate: true });
            } else {
                map.fitBounds(L.latLngBounds(latlngs).pad(0.3));
            }
        }

        // 清除当前故障组的全部根因标注（设备根因 + 告警根因），并同步刷新/落盘/回写
        function clearAllRootCause() {
            if (!graphData) return;
            const count = getRootCauseDeviceList().length;
            if (count === 0) {
                updateAutoSaveStatus('当前没有根因标注');
                return;
            }
            if (!confirm('确定清除当前故障组的全部根因标注（共 ' + count + ' 项）吗？')) return;
            // 先把因标根因而并入的扩展设备移除（否则会留下“无根因的孤儿设备”被一起保存）
            const addedIds = Object.keys((graphData.ne_info) || {}).filter(function(id) {
                return graphData.ne_info[id] && graphData.ne_info[id].added_via_neighbor_expansion;
            });
            addedIds.forEach(function(id) { removeAddedNeighbor(id); });
            graphData.root_cause_annotations = {};
            if (addedIds.length) setBaseCurrentGraph(currentNodes, currentLinks);   // 同步基础图，避免再开关邻居模式复活已删设备
            // 关闭可能打开的弹窗，避免里面残留已勾选的根因复选框
            closeAllMapPopups();
            closeAlarmPopup();
            if (addedIds.length) renderMap({ preserveViewport: true });   // 有设备被移除，重绘地图
            onRootCauseChanged();   // 刷新地图高亮 + 侧栏列表（清空后面板会自动隐藏）+ 自动保存 + 回写
            updateAutoSaveStatus('已清除当前故障组的全部根因标注');
        }

        function getSymptomAlarmSource(symptom) {
            if (!symptom || typeof symptom !== 'object') return '';
            return symptom.alarm_source || symptom.alarmSource || symptom.ne_id || symptom.neId || symptom.source || '';
        }

        function convertSymptomToNodeAlarm(symptom) {
            const alarmIdList = Array.isArray(symptom?.eid_list)
                ? symptom.eid_list.filter(value => value !== null && value !== undefined && String(value).trim() !== '')
                : [];
            return {
                alarm_id: symptom.eid || alarmIdList[0] || symptom.alarm_id || '',
                alarm_id_list: alarmIdList,
                alarm_type: symptom.alarm || symptom.alarm_type || symptom.title || '',
                alarm_time: symptom.alarm_time || formatTimestampSeconds(symptom.ts),
                alarm_clear_time: symptom['告警清除时间'] || symptom.alarm_clear_time || '',
                domain: symptom.domain || '',
                site_id: symptom.node || symptom.site_id || '',
                matched_role: symptom.matched_role || '',
                '工单号': symptom['工单号'] || '',
                '故障组ID': symptom['故障组ID'] || symptom.fault_group_id || symptom.alarm_group_id || symptom.group_id || '',
                virtual: !!symptom.virtual,
                latent: !!symptom.latent,
                confidence: symptom.confidence,
                virtual_source: symptom.virtual_source || '',
                ts: symptom.ts
            };
        }

        function buildNeAlarmIndexFromSymptoms(data) {
            const index = new Map();
            const symptoms = Array.isArray(data && data.symptoms)
                ? data.symptoms
                : (Array.isArray(data && data.match_info && data.match_info.symptoms) ? data.match_info.symptoms : []);

            symptoms.forEach(function(symptom) {
                const neId = getSymptomAlarmSource(symptom);
                if (!neId) return;
                if (!index.has(neId)) {
                    index.set(neId, []);
                }
                index.get(neId).push(convertSymptomToNodeAlarm(symptom));
            });

            return index;
        }

        function getNeAlarmsFromInfo(neId, neInfo, symptomAlarmIndex) {
            const symptomAlarms = symptomAlarmIndex.get(neId) || [];
            if (!Array.isArray(neInfo && neInfo.alarm)) {
                return symptomAlarms;
            }
            if (symptomAlarms.length === 0) {
                return neInfo.alarm;
            }
            const symptomByAlarmId = new Map();
            symptomAlarms.forEach(function(alarm) {
                const alarmId = String(alarm.alarm_id || '');
                if (alarmId) {
                    symptomByAlarmId.set(alarmId, alarm);
                }
            });
            return neInfo.alarm.map(function(alarm) {
                const alarmId = String(alarm && alarm.alarm_id || '');
                const symptomAlarm = symptomByAlarmId.get(alarmId);
                if (!symptomAlarm) return alarm;
                return Object.assign({}, alarm, {
                    virtual: !!(alarm.virtual || symptomAlarm.virtual),
                    __virtual__: !!(alarm.__virtual__ || symptomAlarm.virtual),
                    inferred_virtual: !!(alarm.inferred_virtual || symptomAlarm.virtual),
                    latent: !!(alarm.latent || symptomAlarm.latent),
                    confidence: alarm.confidence !== undefined ? alarm.confidence : symptomAlarm.confidence,
                    virtual_source: alarm.virtual_source || symptomAlarm.virtual_source || ''
                });
            });
        }

        function handleSiteNeighborModeToggle(enabled) {
            siteNeighborModeEnabled = !!enabled;
            const checkbox = document.getElementById('siteNeighborModeCheckbox');
            const mapBtn = document.getElementById('mapSiteNeighborBtn');
            if (checkbox && checkbox.checked !== siteNeighborModeEnabled) {
                checkbox.checked = siteNeighborModeEnabled;
            }
            if (mapBtn) {
                mapBtn.classList.toggle('active', siteNeighborModeEnabled);
                mapBtn.classList.toggle('warning', !siteNeighborModeEnabled);
            }
            updateMapModeIndicator();
            updateSiteNeighborSelectionUI();

            if (siteNeighborModeEnabled) {
                if (multiSelectMode) {
                    exitMultiSelect();
                }
                selectedNode = null;
                clearEdgeSelection();
                clearHighlight();
                // 进入邻居扩展模式：关闭全部已打开的 NE/边页签
                closeAllMapPopups();
            } else {
                siteNeighborAnchorNodes.clear();
                selectedNode = null;
                restoreBaseCurrentGraph();
                renderMap({ preserveViewport: true });
                renderNodeList();
            }
        }

        function toggleSiteNeighborMode() {
            handleSiteNeighborModeToggle(!siteNeighborModeEnabled);
        }

        // 「固化邻居」按钮：仅在邻居模式且已扩展出邻居时显示
        function updateSolidifyBtn() {
            const btn = document.getElementById('solidifyNeighborsBtn');
            if (!btn) return;
            const hasExpanded = siteNeighborModeEnabled && (currentNodes || []).some(function(n) { return n.isNeighborExpanded; });
            btn.style.display = hasExpanded ? '' : 'none';
        }

        // 固化：退出邻居模式但保留已扩展的邻居为候选（不还原基础图），之后可点击它们标根因
        function solidifyNeighbors() {
            if (!siteNeighborModeEnabled || !(currentNodes || []).some(function(n) { return n.isNeighborExpanded; })) {
                updateAutoSaveStatus('当前没有可固化的扩展邻居', true);
                return;
            }
            // 把扩展候选登记进 allNodes，使其可被选中/弹窗/标注（暂不进 ne_info；勾根因时才并入）
            (currentNodes || []).forEach(function(n) {
                if (n.isNeighborExpanded && !allNodes.find(function(a) { return a.id === n.id; })) {
                    allNodes.push(Object.assign({}, n, { alarm: [], alarm_count: 0 }));
                }
            });
            siteNeighborModeEnabled = false;
            siteNeighborAnchorNodes.clear();
            const checkbox = document.getElementById('siteNeighborModeCheckbox');
            if (checkbox) checkbox.checked = false;
            const mapBtn = document.getElementById('mapSiteNeighborBtn');
            if (mapBtn) { mapBtn.classList.remove('active'); mapBtn.classList.add('warning'); }
            updateMapModeIndicator();
            updateSiteNeighborSelectionUI();
            setBaseCurrentGraph(currentNodes, currentLinks);   // 固化态作为新基础图，再开关邻居模式不会冲掉它
            renderMap({ preserveViewport: true });
            renderNodeList();   // 同步侧栏设备列表/徽标，避免固化后状态滞后
            updateAutoSaveStatus('已固化邻居为候选：点击邻居设备并勾选「根因设备」即可并入故障组');
        }

        function updateSiteNeighborSelectionUI() {
            const countEl = document.getElementById('siteNeighborSelectedCount');
            if (countEl) {
                countEl.textContent = String(siteNeighborAnchorNodes.size);
            }
            updateSolidifyBtn();
        }

        function clearSiteNeighborSelection() {
            if (!siteNeighborAnchorNodes.size) return;
            siteNeighborAnchorNodes.clear();
            selectedNode = null;
            restoreBaseCurrentGraph();
            renderMap({ preserveViewport: true });
            renderNodeList();
            updateMapModeIndicator();
            updateSiteNeighborSelectionUI();
        }

        function nodeHasAlarm(node) {
            if (!node || typeof node !== 'object') return false;
            if (Array.isArray(node.alarm)) {
                return node.alarm.length > 0;
            }
            return Number(node.alarm_count || 0) > 0;
        }

        function getNodeStrokeStyle(node, isSelected, isHighlighted) {
            // 根因设备：直接用设备自身的红色粗边框表示（不再用外圈红圆）
            if (isRootCauseNode(node)) {
                return { strokeWidth: 5, strokeColor: '#cf222e' };
            }
            if (isHighlighted) {
                return { strokeWidth: 5, strokeColor: '#ffd700' };
            }
            if (isSelected) {
                return { strokeWidth: 4, strokeColor: '#cf222e' };
            }
            if (node && node.supplemental_fault_pattern_context) {
                return { strokeWidth: 3.5, strokeColor: '#8c959f' };
            }
            const alarmRole = getNodeAlarmRole(node);
            if (alarmRole) {
                const roleStyle = NODE_ROLE_BORDER_STYLE[alarmRole] || NODE_ROLE_BORDER_STYLE.alarm_other;
                return { strokeWidth: roleStyle.width, strokeColor: roleStyle.color };
            }
            return { strokeWidth: 2, strokeColor: '#ffffff' };
        }

        function renderSiteOverlays(nodes, renderCoords) {
            mapSiteOverlays.forEach(function(layer) { map.removeLayer(layer); });
            mapSiteOverlays = [];

            if (!map) return;

            const sites = getCurrentSiteLocations(nodes, renderCoords);
            sites.forEach(function(site) {
                const latlng = [site.latitude, site.longitude];
                const radius = Math.min(36, 18 + Math.max(0, site.deviceCount - 1) * 2);
                const isExpandedSite = !!site.isExpandedSite;
                const isFaultPatternSite = !!site.isFaultPatternSite;
                const isTopologyHighlightSite = !!site.isTopologyHighlightSite;
                const isRedSite = isFaultPatternSite || isTopologyHighlightSite;
                const overlayColor = isRedSite ? '#cf222e' : (isExpandedSite ? '#f59e0b' : '#0969da');
                const fillOpacity = isExpandedSite ? 0.12 : 0.07;
                const haloOpacity = isRedSite ? 0.5 : (isExpandedSite ? 0.4 : 0.28);

                const halo = L.circleMarker(latlng, {
                    pane: 'siteOverlayPane',
                    radius: radius,
                    stroke: true,
                    color: overlayColor,
                    weight: 1.5,
                    opacity: haloOpacity,
                    fillColor: overlayColor,
                    fillOpacity: fillOpacity,
                    interactive: false
                }).addTo(map);
                halo.siteKey = site.siteId || site.siteName || site.label;

                const core = L.circleMarker(latlng, {
                    pane: 'siteOverlayPane',
                    radius: 5,
                    stroke: false,
                    fillColor: overlayColor,
                    fillOpacity: isExpandedSite ? 0.32 : 0.22,
                    interactive: false
                }).addTo(map);
                core.siteKey = site.siteId || site.siteName || site.label;

                const label = L.marker(latlng, {
                    pane: 'siteLabelPane',
                    interactive: false,
                    keyboard: false,
                    zIndexOffset: -1000,
                    icon: L.divIcon({
                        className: 'site-label-container',
                        html: '<div class="site-label-map ' + (isExpandedSite ? 'expanded-site ' : '') + (isRedSite ? 'fault-pattern-site' : '') + '">' + escapeHtml(site.label || site.siteId || site.siteName || '未知站点') + '</div>',
                        iconSize: null,
                        iconAnchor: [-8, 14]
                    })
                }).addTo(map);
                label.siteKey = site.siteId || site.siteName || site.label;

                mapSiteOverlays.push(halo);
                mapSiteOverlays.push(core);
                mapSiteOverlays.push(label);
            });
        }

        // 获取 SVG 形状路径
        function getShapePath(shape, size) {
            const center = size / 2;
            const r = size / 2 - 2;
            
            switch(shape) {
                case 'square':
                    return 'M' + (center - r) + ',' + (center - r) + 
                           ' L' + (center + r) + ',' + (center - r) + 
                           ' L' + (center + r) + ',' + (center + r) + 
                           ' L' + (center - r) + ',' + (center + r) + ' Z';
                case 'triangle':
                    return 'M' + center + ',' + (center - r) + 
                           ' L' + (center + r) + ',' + (center + r) + 
                           ' L' + (center - r) + ',' + (center + r) + ' Z';
                case 'diamond':
                    return 'M' + center + ',' + (center - r) + 
                           ' L' + (center + r) + ',' + center + 
                           ' L' + center + ',' + (center + r) + 
                           ' L' + (center - r) + ',' + center + ' Z';
                case 'circle':
                default:
                    return 'M' + (center + r) + ',' + center + 
                           ' A' + r + ',' + r + ' 0 1,1 ' + (center - r) + ',' + center + 
                           ' A' + r + ',' + r + ' 0 1,1 ' + (center + r) + ',' + center;
            }
        }

        // 检查link是否为distance类型
        function isDistanceLink(link) {
            // 检查link的connection_type是否包含"distance"
            const connectionType = link.connection_type || '';
            return connectionType.toLowerCase().includes('distance');
        }

        // 渲染地图（使用扰动坐标，支持高亮，优化：点击时不重绘）
        function renderMap(options) {
            if (!map) return;
            options = options || {};
            const preserveViewport = !!options.preserveViewport;
            const previousCenter = preserveViewport ? map.getCenter() : null;
            const previousZoom = preserveViewport ? map.getZoom() : null;

            // 重绘会销毁所有 marker/popup：先记录当前已打开的页签，重建后在原位置恢复
            // （仅 preserveViewport，例如拖动/局部刷新时恢复；整体重载时不恢复）。
            const popupsToRestore = preserveViewport ? Array.from(pinnedNodePopups) : [];
            const edgePopupsToRestore = preserveViewport
                ? edgePopups.map(function(ep) { return { source: ep.source, target: ep.target, link: ep.link }; })
                : [];
            // 关闭旧边 popup 会触发其 remove 回调 clearEdgeSelection()，先记录以便重建后恢复高亮
            const selectedEdgeToRestore = preserveViewport ? selectedEdge : null;
            edgePopups.slice().forEach(function(ep) {
                if (map && ep.popup) { try { map.closePopup(ep.popup); } catch (e) {} }
            });
            pinnedNodePopups.clear();
            edgePopups = [];
            currentEdgePopup = null;

            // 清除旧标记
            Object.values(mapMarkers).forEach(function(marker) { map.removeLayer(marker); });
            mapMarkers = {};
            mapPolylines.forEach(function(line) { map.removeLayer(line); });
            mapPolylines = [];
            mapEdgeHitboxes.forEach(function(line) { map.removeLayer(line); });
            mapEdgeHitboxes = [];
            mapDistanceLines.forEach(function(line) { map.removeLayer(line); });
            mapDistanceLines = [];
            mapSiteOverlays.forEach(function(layer) { map.removeLayer(layer); });
            mapSiteOverlays = [];

            const geoNodes = getMapRenderableNodes();
            
            if (geoNodes.length === 0) {
                console.warn('没有带有有效经纬度的节点');
                return;
            }

            // 获取扰动后的坐标（距离相近的节点会被错开）
            const jitterResult = getJitteredCoords(geoNodes);
            const jitteredCoords = jitterResult.coords;

            // 应用站点拖动偏移（同站点设备整体平移；用于人工调整位置）
            geoNodes.forEach(function(node) {
                const off = siteDragOffsets[getNodeSiteKey(node)];
                if (off && jitteredCoords[node.id]) {
                    jitteredCoords[node.id] = [jitteredCoords[node.id][0] + off[0], jitteredCoords[node.id][1] + off[1]];
                }
            });

            renderSiteOverlays(geoNodes, jitteredCoords);
            
            // 扰动指示器不再显示（按需求隐藏“已自动错开 N 个相近节点”提示）
            const jitterIndicator = document.getElementById('jitterIndicator');
            if (jitterIndicator) {
                jitterIndicator.classList.remove('show');
            }

            // 创建标记
            geoNodes.forEach(function(node) {
                const pos = jitteredCoords[node.id];
                const lat = pos[0];
                const lng = pos[1];
                const isNeighborAnchorSelected = siteNeighborModeEnabled && siteNeighborAnchorNodes.has(node.id);
                const isSelected = multiSelectMode ? multiSelectedNodes.has(node.id) : (selectedNode === node.id || isNeighborAnchorSelected);
                const isHighlighted = highlightedNodes.has(node.id); // 检查是否高亮
                
                // 获取 domain 样式
                const domain = node.domain || '';
                const style = getDomainStyle(domain);
                
                // 创建 SVG 图标
                const svgSize = 28;
                const strokeStyle = getNodeStrokeStyle(node, isSelected, isHighlighted);
                const strokeWidth = strokeStyle.strokeWidth;
                const strokeColor = strokeStyle.strokeColor;
                
                const svgHtml = '<svg width="' + svgSize + '" height="' + svgSize + '" viewBox="0 0 ' + svgSize + ' ' + svgSize + '" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">' +
                    '<path d="' + getShapePath(style.shape, svgSize) + '" fill="' + style.color + '" stroke="' + strokeColor + '" stroke-width="' + strokeWidth + '"/>' +
                    '</svg>';
                
                // 移除NE ID标签 - 只保留图标
                const markerHtml = buildMarkerHtml(node, svgHtml, isSelected, isHighlighted);
                
                const customIcon = L.divIcon({
                    className: 'custom-marker',
                    html: markerHtml,
                    iconSize: [svgSize, svgSize],
                    iconAnchor: [svgSize/2, svgSize/2],
                    popupAnchor: [0, -svgSize/2]
                });

                const marker = L.marker([lat, lng], { icon: customIcon, draggable: true, autoPan: false }).addTo(map);

                // 拖动：按住站点内任一设备拖动 → 该站点所有设备整体平移
                marker.on('dragstart', function() {
                    _dragSiteKey = getNodeSiteKey(node);
                    const s = this.getLatLng();
                    _dragStartLatLng = [s.lat, s.lng];
                    _dragSiblings = [];
                    currentNodes.forEach(function(n) {
                        if (n.id !== node.id && getNodeSiteKey(n) === _dragSiteKey && mapMarkers[n.id]) {
                            const ll = mapMarkers[n.id].getLatLng();
                            _dragSiblings.push({ marker: mapMarkers[n.id], start: [ll.lat, ll.lng] });
                        }
                    });
                    // 不再在拖动开始时关闭页签：保留已打开页签，拖动结束重建后会恢复。
                    // （关闭会触发 popupclose → 清除选中，导致拖动后丢失选中状态。）
                });
                marker.on('drag', function() {
                    if (!_dragStartLatLng) return;
                    const cur = this.getLatLng();
                    const dLat = cur.lat - _dragStartLatLng[0];
                    const dLng = cur.lng - _dragStartLatLng[1];
                    _dragSiblings.forEach(function(s) {
                        s.marker.setLatLng([s.start[0] + dLat, s.start[1] + dLng]);
                    });
                    scheduleDragRedraw(); // 连接线/站点圈跟随平移
                });
                marker.on('dragend', function() {
                    if (!_dragStartLatLng) return;
                    const cur = this.getLatLng();
                    const dLat = cur.lat - _dragStartLatLng[0];
                    const dLng = cur.lng - _dragStartLatLng[1];
                    const key = _dragSiteKey;
                    const prev = siteDragOffsets[key] || [0, 0];
                    siteDragOffsets[key] = [prev[0] + dLat, prev[1] + dLng];
                    _dragSiteKey = null; _dragStartLatLng = null; _dragSiblings = [];
                    // 延迟到 Leaflet 完成拖动收尾后再重建：直接在 dragend 里 removeLayer 该 marker，
                    // 会让正在拖动的图标 DOM 脱离图层成为"无法清除的副本"。setTimeout(0) 规避该问题。
                    setTimeout(function() { renderMap({ preserveViewport: true }); }, 0);
                });

                // Popup 内容：绑定时仅放轻量占位（节点标题），完整内容在 popupopen 时懒构建。
                // 避免为当前组每个 marker 预先生成整张告警表 HTML 并常驻内存（该内容打开时会被重建）。
                marker.bindPopup('<div class="popup-title">' + getRawNodeId(node) + '</div>', {
                    autoClose: false,      // 点击其他 popup 时不自动关闭
                    closeOnClick: false,   // 点击地图空白处时不关闭 ← 关键
                    autoPan: false         // 悬浮打开 popup 时不自动平移地图
                });
                marker.on('popupopen', function() {
                    const ll = this.getLatLng();
                    this.setPopupContent(buildNodeMarkerPopup(node, ll.lat, ll.lng));
                    // 仅当用户明确点击 popup 的 × 关闭按钮时，才取消该 NE 的页签 + 选中红框/告警详情。
                    // pinnedNodePopups 代表"用户想要打开的页签"，只能被显式关闭操作修改，
                    // 不能被拖拽/重绘/程序化 closePopup 触发的 popupclose 误删（否则重绘后无法恢复页签）。
                    const popup = this.getPopup();
                    const closeBtn = popup && popup._closeButton;
                    if (closeBtn) {
                        L.DomEvent.on(closeBtn, 'click', function() {
                            pinnedNodePopups.delete(node.id);
                            if (selectedNode === node.id) clearNodeSelection();
                            if (currentAlarmNodeId === node.id) closeAlarmPopup();
                        });
                    }
                });

                // 站点邻居扩展模式下尽量保持轻交互，不弹 popup。
                marker.on('mouseover', function() {
                    if (siteNeighborModeEnabled) {
                        return;
                    }
                    // 修改：如果有选中的节点且不是当前这个，不要打开 popup（避免关闭选中的）
                    if (selectedNode && selectedNode !== node.id) {
                        return; // 不响应其他节点的悬浮
                    }
                    this.openPopup();
                });
                marker.on('mouseout', function() {
                    if (siteNeighborModeEnabled) {
                        return;
                    }
                    // 已"钉住"的页签（点击打开的）保持显示；仅悬浮预览的页签在移出时关闭
                    if (selectedNode !== node.id && !pinnedNodePopups.has(node.id)) {
                        this.closePopup();
                    }
                });

                // ==========================================
                // 修改地图标记点击事件中的多选处理逻辑
                // ==========================================

                // 关闭 Leaflet 绑定 popup 时自带的"点击 marker 自动开关 popup"行为：
                // 它会在我们的 click 处理之前先关掉已打开的 popup（触发 popupclose 改写页签跟踪），
                // 导致"再次点击已选中 NE"被误判为新选择而重新打开。改由下面的 click 处理统一管理开关。
                marker.off('click');

                marker.on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    
                    if (multiSelectMode) {
                        // 多选模式下使用无感刷新（不重新渲染地图）
                        toggleNodeSelection(node.id, true);
                        updateDistanceStats(); // 仅更新统计面板，不影响地图
                    } else {
                        // 普通模式下的无感选择（支持再次点击取消选中）
                        closeAlarmPopup();
                        selectNodeWithoutMapRefresh(node.id);
                        if (!siteNeighborModeEnabled && selectedNode === node.id) {
                            showNodeAlarms(node.id);
                        }
                    }
                });

                mapMarkers[node.id] = marker;
            });

            // 绘制连线（使用扰动后的坐标）
            if (showMapConnections && currentLinks.length > 0) {
                drawMapConnections(jitteredCoords);
            }

            renderMapDistanceLines();
            updateDistanceStats();

            // 适应边界
            if (preserveViewport && previousCenter !== null && previousZoom !== null) {
                map.setView(previousCenter, previousZoom, { animate: false });
            } else if (geoNodes.length > 0 && highlightedNodes.size === 0) { // 没有高亮时才自动适应
                const group = new L.featureGroup(Object.values(mapMarkers));
                map.fitBounds(group.getBounds().pad(0.1));
            }
            applyDeviceTypeFilterToMap();
            updateSolidifyBtn();

            // 恢复重建前已打开的页签（拖动/局部刷新后页签不丢失）
            if (popupsToRestore.length) {
                popupsToRestore.forEach(function(id) {
                    const m = mapMarkers[id];
                    if (m) {
                        pinnedNodePopups.add(id);
                        m.openPopup();
                    }
                });
            }
            if (edgePopupsToRestore.length) {
                edgePopupsToRestore.forEach(function(e) {
                    if (e.link && mapMarkers[e.source] && mapMarkers[e.target]) {
                        showEdgeDetailPanel(e.link, e.source, e.target, null);
                    }
                });
            }
            // 恢复选中边的高亮（重建时其 popup 的 remove 回调已清掉 selectedEdge 和样式）
            if (selectedEdgeToRestore) {
                selectedEdge = selectedEdgeToRestore;
                applySelectedEdgeStyle(selectedEdge.data);
            }
        }

        // 新增：仅更新地图上的选中状态，不重新渲染整个地图（需求2的核心实现）
        function updateMapSelection() {
            currentNodes.forEach(function(node) {
                const marker = mapMarkers[node.id];
                if (!marker) return;
                
                const isNeighborAnchorSelected = siteNeighborModeEnabled && siteNeighborAnchorNodes.has(node.id);
                const isSelected = multiSelectMode ? multiSelectedNodes.has(node.id) : (selectedNode === node.id || isNeighborAnchorSelected);
                const isHighlighted = highlightedNodes.has(node.id);
                const style = getDomainStyle(node.domain || '');
                
                // 直接修改现有标记的图标，不重新创建 marker
                const svgSize = 28;
                const strokeStyle = getNodeStrokeStyle(node, isSelected, isHighlighted);
                const strokeWidth = strokeStyle.strokeWidth;
                const strokeColor = strokeStyle.strokeColor;
                
                const svgHtml = '<svg width="' + svgSize + '" height="' + svgSize + '" viewBox="0 0 ' + svgSize + ' ' + svgSize + '" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">' +
                    '<path d="' + getShapePath(style.shape, svgSize) + '" fill="' + style.color + '" stroke="' + strokeColor + '" stroke-width="' + strokeWidth + '"/>' +
                    '</svg>';
                
                const markerHtml = buildMarkerHtml(node, svgHtml, isSelected, isHighlighted);
                
                marker.setIcon(L.divIcon({
                    className: 'custom-marker',
                    html: markerHtml,
                    iconSize: [svgSize, svgSize],
                    iconAnchor: [svgSize/2, svgSize/2],
                    popupAnchor: [0, -svgSize/2]
                }));
            });
        }

        // ==========================================
        // 选中状态管理函数（新增）
        // ==========================================

        // 清除节点选择状态，恢复地图标记样式
        function clearNodeSelection() {
            if (!selectedNode && !siteNeighborAnchorNodes.size) return;

            if (siteNeighborModeEnabled && siteNeighborAnchorNodes.size) {
                clearSiteNeighborSelection();
                return;
            }

            const shouldCollapseNeighborExpansion = siteNeighborModeEnabled && currentNodes.some(function(node) {
                return !!node.isNeighborExpanded;
            });
            const prevSelected = selectedNode;
            selectedNode = null;
            if (shouldCollapseNeighborExpansion) {
                restoreBaseCurrentGraph();
                renderMap({ preserveViewport: true });
            } else {
                updateMapSelection(); // 恢复所有标记为未选中样式
            }

            // 仅关闭被取消选中节点自身的页签（不影响其它已打开页签）
            if (prevSelected && pinnedNodePopups.has(prevSelected)) {
                pinnedNodePopups.delete(prevSelected);
                if (mapMarkers[prevSelected]) mapMarkers[prevSelected].closePopup();
            }

            // 如果是非多选模式，清空节点列表的高亮并隐藏详情面板
            if (!multiSelectMode) {
                renderNodeList();
                document.getElementById('detailPanel').classList.remove('show');
            }
        }

        // 清除边选择状态，恢复所有边的样式
        function clearEdgeSelection() {
            if (!selectedEdge) return;
            
            selectedEdge = null;
            
            // 重置所有边的样式
            mapPolylines.forEach(function(polyline) {
                const sourceNode = currentNodes.find(function(n) { return n.id === polyline.sourceId; });
                const targetNode = currentNodes.find(function(n) { return n.id === polyline.targetId; });
                polyline.setStyle({ 
                    color: polyline.segmentColor || getMapLinkColor(polyline.linkData, sourceNode, targetNode, false),
                    weight: polyline.segmentColor ? 3 : 2.5,
                    opacity: getMapLinkOpacity(polyline.linkData, false),
                    dashArray: polyline.segmentColor ? null : getMapLinkDashArray(polyline.linkData)
                });
            });
        }

        // ==========================================
        // 多页签：打开/关闭辅助
        // ==========================================
        function edgePairKey(a, b) {
            return [String(a), String(b)].sort().join('::');
        }

        function findEdgePopup(sourceId, targetId) {
            const key = edgePairKey(sourceId, targetId);
            return edgePopups.find(function(ep) { return ep.key === key; }) || null;
        }

        // 关闭单个边页签
        function closeEdgePopup(entry) {
            if (!entry) return;
            edgePopups = edgePopups.filter(function(ep) { return ep !== entry; });
            if (currentEdgePopup === entry.popup) currentEdgePopup = null;
            if (map && entry.popup) {
                try { map.closePopup(entry.popup); } catch (e) {}
            }
        }

        // 关闭全部已打开的 NE/边页签（点空白处、进入邻居/多选模式时使用）
        function closeAllMapPopups() {
            pinnedNodePopups.forEach(function(id) {
                if (mapMarkers[id] && mapMarkers[id].closePopup) mapMarkers[id].closePopup();
            });
            pinnedNodePopups.clear();
            edgePopups.slice().forEach(function(ep) {
                if (map && ep.popup) { try { map.closePopup(ep.popup); } catch (e) {} }
            });
            edgePopups = [];
            currentEdgePopup = null;
            if (map) map.closePopup();
        }

        function revealSidebarDetailPanel(panel) {
            if (!panel) return;
            panel.classList.add('show');
            const sidebar = panel.closest('.sidebar');
            if (sidebar) {
                sidebar.scrollTop = 0;
                return;
            }
            try { panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) { panel.scrollIntoView(); }
        }

        function attachEdgeClickHandler(layer) {
            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e);
                if (e && e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent);
                selectEdge(this.linkData, this.sourceId, this.targetId, e && e.latlng);
            });
        }

        function createEdgeHitbox(latlngs, link, sourceId, targetId, tooltipHtml) {
            // 把点击层两端各收进一段，空出端点处的节点标记区域，
            // 这样“点连线中段=选边”、“点节点图标=展开/拖动”互不抢夺。
            let hbLatlngs = latlngs;
            if (Array.isArray(latlngs) && latlngs.length === 2) {
                const a = latlngs[0], b = latlngs[1];
                const t = 0.18;
                hbLatlngs = [
                    [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t],
                    [a[0] + (b[0] - a[0]) * (1 - t), a[1] + (b[1] - a[1]) * (1 - t)]
                ];
            }
            const hitbox = L.polyline(hbLatlngs, {
                pane: 'edgeHitboxPane',
                color: '#000000',
                weight: 14,
                opacity: 0.001,
                interactive: true,
                bubblingMouseEvents: false,
                dashArray: null,
                className: 'map-edge-hitbox'
            }).addTo(map);
            hitbox.linkData = link;
            hitbox.sourceId = sourceId;
            hitbox.targetId = targetId;
            if (tooltipHtml) {
                hitbox.bindTooltip(tooltipHtml, {
                    permanent: false,
                    direction: 'center'
                });
            }
            attachEdgeClickHandler(hitbox);
            mapEdgeHitboxes.push(hitbox);
            return hitbox;
        }

        // 清除所有选择（节点和边）
        function clearAllSelection() {
            closeAllMapPopups();
            clearNodeSelection();
            clearEdgeSelection();
            closeAlarmPopup();
        }

        function hideDetailPanelOnOutsideClick(event) {
            const detailPanel = document.getElementById('detailPanel');
            if (!detailPanel || !detailPanel.classList.contains('show')) return;

            const target = event.target;
            if (detailPanel.contains(target)) return;

            if (target.closest('.alarm-popup') ||
                target.closest('.leaflet-popup-content') ||
                target.closest('.leaflet-interactive') ||
                target.closest('.custom-marker') ||
                target.closest('.leaflet-marker-icon') ||
                target.closest('.node-item')) {
                return;
            }

            // 邻居模式下不清节点选择（那会塌缩扩展）；仅取消边选择并隐藏详情面板。
            if (selectedNode && !siteNeighborModeEnabled) {
                clearNodeSelection();
            }
            if (selectedEdge) {
                clearEdgeSelection();
            }
            detailPanel.classList.remove('show');
        }

        // ==========================================
        // 修改后的节点选择函数（支持再次点击取消选中，自动清除边选择）
        // ==========================================

        function selectNodeWithoutMapRefresh(nodeId) {
            if (siteNeighborModeEnabled) {
                clearEdgeSelection();
                clearHighlight();
                expandSiteNeighborsForNode(nodeId);
                return;
            }

            // 再次点击已打开页签的同一 NE → 关闭该页签（开关），不影响其它已打开页签
            if (pinnedNodePopups.has(nodeId)) {
                pinnedNodePopups.delete(nodeId);
                if (mapMarkers[nodeId]) mapMarkers[nodeId].closePopup();
                if (currentAlarmNodeId === nodeId) closeAlarmPopup();
                if (selectedNode === nodeId) clearNodeSelection();
                return;
            }

            clearHighlight(); // 清除搜索高亮（保留其它已打开的 NE/边页签）

            // 设置新的节点选择（不关闭其它已打开页签）
            const expanded = expandSiteNeighborsForNode(nodeId);
            if (expanded) {
                renderMap({ preserveViewport: true });
            }
            selectedNode = nodeId;
            updateMapSelection();
            renderNodeList(nodeId);
            showDetailPanel(nodeId);

            // 邻居扩展模式下不弹 popup，尽量减少视觉打断。
            const marker = mapMarkers[nodeId];
            if (marker && !siteNeighborModeEnabled) {
                pinnedNodePopups.add(nodeId);
                marker.openPopup();
            }
        }

        // 显示节点告警详情
        function showNodeAlarms(nodeId) {
            const node = allNodes.find(function(n) { return n.id === nodeId; });
            if (!node) return;
            // 不论是否有告警都展示设备详情弹窗（用于根因标注）
            showAlarmPopup(node);
        }

        // ==========================================
        // 根因标注：状态读写
        // ==========================================
        function getRootCauseStore() {
            if (!graphData) return null;
            if (!graphData.root_cause_annotations || typeof graphData.root_cause_annotations !== 'object') {
                graphData.root_cause_annotations = {};
            }
            return graphData.root_cause_annotations;
        }

        function getNodeRootCauseEntry(neId, create) {
            const store = getRootCauseStore();
            if (!store) return null;
            if (!store[neId]) {
                if (!create) return null;
                store[neId] = { device: false, alarms: {} };
            }
            if (!store[neId].alarms || typeof store[neId].alarms !== 'object') {
                store[neId].alarms = {};
            }
            return store[neId];
        }

        // 每条告警在所属设备内的稳定标识
        function getAlarmRootCauseKey(alarm, index) {
            const id = alarm && (alarm.alarm_id || alarm.eid);
            if (id) return 'id:' + String(id);
            const type = (alarm && (alarm.alarm_type || alarm.title)) || '';
            const ticket = (alarm && alarm['工单号']) || '';
            const ts = (alarm && alarm.ts) || (alarm && alarm.alarm_time) || '';
            return 'k:' + type + '|' + ticket + '|' + ts + '|#' + index;
        }

        function deviceHasAlarms(node) {
            return !!(node && Array.isArray(node.alarm) && node.alarm.length > 0);
        }

        function isAlarmRootCause(neId, alarm, index) {
            const entry = getNodeRootCauseEntry(neId, false);
            if (!entry) return false;
            return !!entry.alarms[getAlarmRootCauseKey(alarm, index)];
        }

        // 设备级根因：有告警时由告警派生（任一告警是根因则设备是根因）；无告警时取手动值
        function computeDeviceRootCause(node) {
            const entry = getNodeRootCauseEntry(node.id, false);
            if (deviceHasAlarms(node)) {
                if (!entry) return false;
                return node.alarm.some(function(a, i) { return !!entry.alarms[getAlarmRootCauseKey(a, i)]; });
            }
            return !!(entry && entry.device);
        }

        // 在 JS 内联事件中安全嵌入字符串字面量
        function rcJsLiteral(value) {
            return "'" + String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
        }

        // 联动刷新所有已打开弹窗里该设备的设备级根因勾选框
        function refreshDeviceRootCauseCheckboxes(node) {
            const value = computeDeviceRootCause(node);
            document.querySelectorAll('.rc-device-checkbox').forEach(function(cb) {
                if (cb.getAttribute('data-ne') === node.id) {
                    cb.checked = value;
                }
            });
        }

        function onAlarmRootCauseToggle(neId, index, checked) {
            const node = allNodes.find(function(n) { return n.id === neId; });
            if (!node || !Array.isArray(node.alarm) || !node.alarm[index]) return;
            const entry = getNodeRootCauseEntry(node.id, true);
            if (!entry) return;
            const key = getAlarmRootCauseKey(node.alarm[index], index);
            if (checked) { entry.alarms[key] = true; } else { delete entry.alarms[key]; }
            // 设备级随之联动更新
            refreshDeviceRootCauseCheckboxes(node);
            onRootCauseChanged();
        }

        // 把一个扩展候选邻居并入故障组：写进 graphData.ne_info（带 added_via_neighbor_expansion 标记），
        // 只持久化它与“原生组设备”的直连边（与其它候选的边不保留，可能成为孤立设备——按设计允许）。
        function mergeNeighborIntoGroup(node) {
            if (!graphData || !graphData.ne_info || !node) return;
            const neId = node.id;
            if (graphData.ne_info[neId]) return; // 已在 ne_info（已是组成员）：单组流程下不会发生，直接返回，不污染原始设备
            // 正式成员 = 当前 active group 的 ne_list 成员（含已并入邻居）。
            // 不用 baseCurrentNodes（含未并入候选），也不用整个 graphData.ne_info（多组文件里可能含非当前组设备）；
            // 否则会把边持久化成指向“不属于当前故障组成员”的 link。
            const memberGids = (activeGroups && activeGroups.size) ? Array.from(activeGroups) : Object.keys(graphData.group_info || {});
            const nativeIds = new Set();
            memberGids.forEach(function(gid) {
                const gi = graphData.group_info && graphData.group_info[gid];
                if (gi && Array.isArray(gi.ne_list)) gi.ne_list.forEach(function(id) { if (id !== neId) nativeIds.add(id); });
            });
            const link = {};
            (currentLinks || []).forEach(function(l) {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                let other = null;
                if (s === neId) other = t; else if (t === neId) other = s;
                if (other && nativeIds.has(other)) {
                    link[other] = {
                        connection_type: l.connection_type || '',
                        topology: l.topology || '',
                        added_via_neighbor_expansion: true
                    };
                }
            });
            graphData.ne_info[neId] = {
                site_id: node.site_id || '', site_name: node.site_name || '',
                type: node.type || '', network_type: node.network_type || '',
                manufacturer: node.manufacturer || '', domain: node.domain || '',
                name: node.name || neId, alarm: [],
                latitude: node.latitude, longitude: node.longitude,
                link: link, added_via_neighbor_expansion: true
            };
            // 原生成员侧也补一条反向 link，便于回写后重新加载时双向一致
            Object.keys(link).forEach(function(member) {
                const mInfo = graphData.ne_info[member];
                if (mInfo) { if (!mInfo.link || typeof mInfo.link !== 'object') mInfo.link = {}; if (!mInfo.link[neId]) mInfo.link[neId] = link[member]; }
            });
            // 同步加入 allLinks：renderCurrentGroups 切换/重算时是从 allLinks 过滤边的，不加这里重渲染会丢边
            Object.keys(link).forEach(function(member) {
                const exists = allLinks.some(function(l) {
                    const s = typeof l.source === 'object' ? l.source.id : l.source;
                    const t = typeof l.target === 'object' ? l.target.id : l.target;
                    return (s === neId && t === member) || (s === member && t === neId);
                });
                if (!exists) {
                    allLinks.push({ source: neId, target: member, connection_type: link[member].connection_type || '', topology: link[member].topology || '', added_via_neighbor_expansion: true });
                }
            });
            if (!allNodes.find(function(n) { return n.id === neId; })) {
                allNodes.push(Object.assign({}, node, { alarm: [], alarm_count: 0, added_via_neighbor_expansion: true }));
            }
            node.added_via_neighbor_expansion = true;
            node.isNeighborExpanded = false; // 由候选转为正式成员
            // 同步 currentNodes 里的同一节点（渲染用的是 currentNodes，避免样式还停在“候选”）
            const curNode = (currentNodes || []).find(function(n) { return n.id === neId; });
            if (curNode && curNode !== node) { curNode.added_via_neighbor_expansion = true; curNode.isNeighborExpanded = false; }
            // 加入当前组的 group_info.ne_list：renderCurrentGroups 按 ne_list 取节点，否则重渲染/重载会丢失该设备
            const gids = (activeGroups && activeGroups.size) ? Array.from(activeGroups) : Object.keys(graphData.group_info || {});
            gids.forEach(function(gid) {
                const gi = graphData.group_info && graphData.group_info[gid];
                if (!gi) return;
                if (!Array.isArray(gi.ne_list)) gi.ne_list = [];
                if (gi.ne_list.indexOf(neId) === -1) gi.ne_list.push(neId);
                const site = node.site_id;
                if (site) {
                    if (!Array.isArray(gi.site_list)) gi.site_list = [];
                    if (gi.site_list.indexOf(site) === -1) gi.site_list.push(site);
                }
            });
        }

        // 清除某并入邻居的根因后，把它从故障组移除。单组流程下，带 added_via_neighbor_expansion 标记的
        // 都是本次扩展“新建进 ne_info”的合成设备（绝不会命中源数据里的原始设备），可安全彻底删除。
        function removeAddedNeighbor(neId) {
            if (!graphData || !graphData.ne_info) return;
            const info = graphData.ne_info[neId];
            if (!info || !info.added_via_neighbor_expansion) return;
            const removedSite = info.site_id;
            const touchesNe = function(l) {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return s === neId || t === neId;
            };
            delete graphData.ne_info[neId];
            Object.keys(graphData.ne_info).forEach(function(k) {
                const lk = graphData.ne_info[k].link;
                if (lk && typeof lk === 'object' && lk[neId]) delete lk[neId];
            });
            allNodes = allNodes.filter(function(n) { return n.id !== neId; });
            allLinks = allLinks.filter(function(l) { return !touchesNe(l); });
            currentNodes = currentNodes.filter(function(n) { return n.id !== neId; });
            currentLinks = currentLinks.filter(function(l) { return !touchesNe(l); });
            filteredLinks = filteredLinks.filter(function(l) { return !touchesNe(l); });
            if (graphData.root_cause_annotations) delete graphData.root_cause_annotations[neId];
            // 从所有 group_info.ne_list 移除；site_list 仅当组内已无其它设备属于该站点时才移除
            Object.keys(graphData.group_info || {}).forEach(function(gid) {
                const gi = graphData.group_info[gid];
                if (!gi) return;
                if (Array.isArray(gi.ne_list)) {
                    const i = gi.ne_list.indexOf(neId);
                    if (i !== -1) gi.ne_list.splice(i, 1);
                }
                if (removedSite && Array.isArray(gi.site_list)) {
                    const stillUsed = (gi.ne_list || []).some(function(id) {
                        return graphData.ne_info[id] && graphData.ne_info[id].site_id === removedSite;
                    });
                    if (!stillUsed) { const si = gi.site_list.indexOf(removedSite); if (si !== -1) gi.site_list.splice(si, 1); }
                }
            });
            // 该设备已被移除：清除可能指向它的选中状态与页签跟踪，避免重绘后 selectedNode 残留，
            // 导致悬浮处理误认为它仍选中而拦截其它节点的 popup。
            pinnedNodePopups.delete(neId);
            siteNeighborAnchorNodes.delete(neId);
            multiSelectedNodes.delete(neId);
            if (selectedNode === neId) {
                selectedNode = null;
                document.getElementById('detailPanel').classList.remove('show');
            }
        }

        function onDeviceRootCauseToggle(neId, checked) {
            const node = allNodes.find(function(n) { return n.id === neId; });
            if (!node) return;
            // 有告警时设备级不可手动设置
            if (deviceHasAlarms(node)) {
                refreshDeviceRootCauseCheckboxes(node);
                return;
            }
            const entry = getNodeRootCauseEntry(node.id, true);
            if (entry) entry.device = !!checked;
            // 候选邻居（还不在 ne_info 的真·新设备）被勾根因 → 并入故障组（单组流程：不在组⟺不在 ne_info）
            let membershipChanged = false;
            if (checked && graphData.ne_info && !graphData.ne_info[neId]) {
                mergeNeighborIntoGroup(node);
                membershipChanged = true;
            }
            // 取消并入邻居的根因且其再无任何根因 → 从故障组移除并重绘
            const info = graphData.ne_info && graphData.ne_info[neId];
            if (!checked && info && info.added_via_neighbor_expansion && !isRootCauseNode(node)) {
                removeAddedNeighbor(neId);
                closeAlarmPopup();
                renderMap({ preserveViewport: true });
                membershipChanged = true;
            }
            if (membershipChanged) {
                setBaseCurrentGraph(currentNodes, currentLinks);   // 同步基础图，避免后续开关邻居模式冲掉并入设备
                renderNodeList();   // 并入/移除改变了组成员，刷新侧栏列表
            }
            onRootCauseChanged();
        }

        // 根因标注变化后：刷新地图标记的根因高亮 + 侧栏根因设备列表
        function onRootCauseChanged() {
            updateMapSelection();
            renderRootCausePanel();
            updateGroupNavUI();
            autoSaveResults();   // 勾选即自动保存到本地
            pushStatusToOverview();
        }

        // 单条告警的“是否是根因”勾选
        function buildAlarmRootCauseLabel(node, alarm, index) {
            const checked = isAlarmRootCause(node.id, alarm, index) ? ' checked' : '';
            return '<label class="rc-row"><input type="checkbox" class="rc-alarm-checkbox"' + checked +
                ' onchange="onAlarmRootCauseToggle(' + rcJsLiteral(node.id) + ', ' + index + ', this.checked)"><span>根因告警</span></label>';

        function buildDeviceRootCauseHtml(node) {
            const hasAlarms = deviceHasAlarms(node);
            const checked = computeDeviceRootCause(node) ? ' checked' : '';

            if (hasAlarms) {
                return '<div class="rc-device disabled">' +
                    '<input type="checkbox" class="rc-device-checkbox" disabled' + checked + dataAttr + '>' +
                    '<span>根因设备</span>' +

                '<label style="display:flex; align-items:center; gap:8px; cursor:pointer; margin:0;">' +
                    '<input type="checkbox" class="rc-device-checkbox"' + checked + dataAttr + ' onchange="onDeviceRootCauseToggle(' + rcJsLiteral(node.id) + ', this.checked)">' +
                    '<span>根因设备</span>' +
                '</label>' +
                '</div>';

                    alarmGroupPartition.map(function(group) {

                                '<div class="alarm-group-card-id">' + renderAlarmGroupMarker(group.groupId, { size: 22, title: false }) + '<span class="alarm-group-id-text">' + escapeHtml(group.groupId) + '</span></div>' +

            }

            if (hasAlarms) {
            alarmHtml += '<div style="font-weight: bold; margin-bottom: 10px; color: #24292f;">告警列表 (' + node.alarm.length + ' 个):</div>' +

                const alarmType = alarm.alarm_type || '未知';
                const severity = alarm.severity || alarm.alarm_level || 'warning';
                const description = alarm.description || alarm.alarm_desc || '-';
                const time = getAlarmDisplayTime(alarm);
                const alarmClearTime = alarm['告警清除时间'] || alarm.alarm_clear_time || '-';
                const ticketId = alarm['工单号'] || '-';
                const faultGroup = getAlarmFaultGroupId(alarm);
                const faultGroupHtml = faultGroup
                    ? renderAlarmGroupMarker(faultGroup, { size: 16 }) + '<span>' + escapeHtml(faultGroup) + '</span>'
                    : '<span>-</span>';
                const virtualBadge = renderVirtualAlarmBadge(alarm);
                const virtualMeta = isVirtualAlarm(alarm)
                    ? '<div style="color: #6f42c1; font-size: 11px; margin-top: 3px;">插补来源: ' + escapeHtml(alarm.virtual_source || '-') +
                        (alarm.confidence !== undefined && alarm.confidence !== null && alarm.confidence !== '' ? '，confidence=' + escapeHtml(alarm.confidence) : '') +

                    : '';
                
                // 根据严重级别设置样式

                } else if (severity.toLowerCase().includes('minor') || severity.toLowerCase().includes('次要') || severity === '3') {
                    severityClass = 'minor';

                alarmHtml += '<div class="alarm-item ' + severityClass + (isVirtualAlarm(alarm) ? ' virtual' : '') + '">' +
                    '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">' +

                            '<span>' + alarmType + '</span>' + virtualBadge +
                        '</span>' +
