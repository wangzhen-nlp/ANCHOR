                    '</div>' +
                    '<div style="color: #57606a; font-size: 11px; margin-top: 4px;">工单号: ' + ticketId + '</div>' +
                    '<div style="color: #57606a; font-size: 11px; display:flex; align-items:center; gap:4px;">故障组ID: ' + faultGroupHtml + '</div>' +
                    virtualMeta +
                    '<div style="color: #57606a; font-size: 11px;">告警持续时间: ' + time + '～' + alarmClearTime + '</div>' +
                    buildAlarmRootCauseLabel(node, alarm, index) +
                    '</div>';
            });

            alarmHtml += '</div>';
            }

            // 设备级根因标注
            alarmHtml += buildDeviceRootCauseHtml(node);

            popupBody.innerHTML = alarmHtml;
            popup.classList.add('show');
        }

        // 关闭告警弹窗
        function closeAlarmPopup() {
            const popup = document.getElementById('alarmPopup');
            popup.classList.remove('show');
            currentAlarmNodeId = null;
        }

        function updateDistanceStats() {
            const statsPanel = document.getElementById('distanceStats');
            
            if (multiSelectLinks.length === 0) {
                statsPanel.classList.remove('show');
                return;
            }

            statsPanel.classList.add('show');

            const totalDistance = multiSelectLinks.reduce(function(sum, link) { return sum + link.distance; }, 0);
            const avgDistance = totalDistance / multiSelectLinks.length;
            const maxLink = multiSelectLinks.reduce(function(max, link) { return link.distance > max.distance ? link : max; }, multiSelectLinks[0]);
            const minLink = multiSelectLinks.reduce(function(min, link) { return link.distance < min.distance ? link : min; }, multiSelectLinks[0]);

            document.getElementById('statLineCount').textContent = multiSelectLinks.length;
            document.getElementById('statAvgDist').textContent = avgDistance.toFixed(2) + ' km';
            document.getElementById('statMaxDist').textContent = maxLink.distance.toFixed(2) + ' km';
            document.getElementById('statMinDist').textContent = minLink.distance.toFixed(2) + ' km';
            document.getElementById('statMaxPair').textContent = maxLink.source + ' ↔ ' + maxLink.target;
        }

        // 渲染距离连线（也使用扰动坐标）
        function renderMapDistanceLines() {
            mapDistanceLines.forEach(function(line) { map.removeLayer(line); });
            mapDistanceLines = [];

            if (multiSelectLinks.length === 0) return;

            const renderableNodes = getMapRenderableNodes();
            const renderableNodeIds = new Set(renderableNodes.map(function(node) { return node.id; }));
            const jitterResult = getJitteredCoords(renderableNodes);
            const jitteredCoords = jitterResult.coords;

            multiSelectLinks.forEach(function(link) {
                const sourceNode = allNodes.find(function(n) { return n.id === link.source; });
                const targetNode = allNodes.find(function(n) { return n.id === link.target; });

                if (sourceNode && targetNode &&
                    renderableNodeIds.has(sourceNode.id) && renderableNodeIds.has(targetNode.id)) {
                    
                    const sourcePos = jitteredCoords[link.source];
                    const targetPos = jitteredCoords[link.target];
                    
                    if (!sourcePos || !targetPos) return;
                    
                    const latlngs = [
                        [sourcePos[0], sourcePos[1]],
                        [targetPos[0], targetPos[1]]
                    ];

                    const polyline = L.polyline(latlngs, {
                        color: '#cf222e',
                        weight: 3,
                        opacity: 0.9,
                        smoothFactor: 1
                    }).addTo(map);
                    polyline.sourceId = link.source;
                    polyline.targetId = link.target;

                    const midLat = (sourcePos[0] + targetPos[0]) / 2;
                    const midLng = (sourcePos[1] + targetPos[1]) / 2;

                    const labelIcon = L.divIcon({
                        className: 'distance-label-container',
                        html: '<div class="distance-label-map">' + link.distance.toFixed(1) + ' km</div>',
                        iconSize: [60, 24],
                        iconAnchor: [30, 12]
                    });

                    const labelMarker = L.marker([midLat, midLng], {
                        icon: labelIcon,
                        interactive: false,
                        zIndexOffset: 1000
                    }).addTo(map);
                    labelMarker.sourceId = link.source;
                    labelMarker.targetId = link.target;

                    polyline.bindTooltip('<div style="font-weight: bold; color: #cf222e;">' + link.source + ' ↔ ' + link.target + '</div>' +
                        '<div>地理距离: ' + link.distance.toFixed(2) + ' km</div>', {
                        permanent: false,
                        direction: 'center'
                    });

                    mapDistanceLines.push(polyline);
                    mapDistanceLines.push(labelMarker);
                }
            });
        }

        // 绘制连线（使用扰动坐标）- 支持distance类型虚线和点击事件（需求3）
        function drawMapConnections(jitteredCoords) {
            const sitePositionLookup = buildSitePositionLookup(jitteredCoords);
            currentLinks.forEach(function(link) {
                const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;
                
                // 使用扰动后的坐标
                const sourcePos = isMissingTopologyLink(link)
                    ? getMissingTopologyEndpointPosition(link, 'source', sourceId, jitteredCoords, sitePositionLookup)
                    : jitteredCoords[sourceId];
                const targetPos = isMissingTopologyLink(link)
                    ? getMissingTopologyEndpointPosition(link, 'target', targetId, jitteredCoords, sitePositionLookup)
                    : jitteredCoords[targetId];
                
                if (!sourcePos || !targetPos) return;

                const sourceNode = currentNodes.find(function(n) { return n.id === sourceId; });
                
                const targetNode = currentNodes.find(function(n) { return n.id === targetId; });
                const isSupplementalContextEdge = isSupplementalContextLink(link);
                const edgeColor = getMapLinkColor(link, sourceNode, targetNode, false);
                
                const latlngs = [
                    [sourcePos[0], sourcePos[1]],
                    [targetPos[0], targetPos[1]]
                ];

                // 检查是否为distance类型连接
                const isDistance = isDistanceLink(link);
                const isNeighborExpandedEdge = !!link.isNeighborExpanded;

                if (isMissingTopologyLink(link) && isDirectedMissingTopologyLink(link)) {
                    const directedPositions = getMissingTopologyDirectionalPositions(link, sourcePos, targetPos);
                    const tooltipHtml = getMissingTopologyTooltip(link, sourceId, targetId);
                    for (let segmentIndex = 0; segmentIndex < MISSING_TOPOLOGY_DIRECTED_SEGMENTS; segmentIndex++) {
                        const startRatio = segmentIndex / MISSING_TOPOLOGY_DIRECTED_SEGMENTS;
                        const endRatio = (segmentIndex + 1) / MISSING_TOPOLOGY_DIRECTED_SEGMENTS;
                        const segmentStart = [
                            directedPositions.upstreamPos[0] + (directedPositions.downstreamPos[0] - directedPositions.upstreamPos[0]) * startRatio,
                            directedPositions.upstreamPos[1] + (directedPositions.downstreamPos[1] - directedPositions.upstreamPos[1]) * startRatio
                        ];
                        const segmentEnd = [
                            directedPositions.upstreamPos[0] + (directedPositions.downstreamPos[0] - directedPositions.upstreamPos[0]) * endRatio,
                            directedPositions.upstreamPos[1] + (directedPositions.downstreamPos[1] - directedPositions.upstreamPos[1]) * endRatio
                        ];
                        const segmentColor = interpolateHexColor(
                            MISSING_TOPOLOGY_DIRECTED_START_COLOR,
                            MISSING_TOPOLOGY_DIRECTED_END_COLOR,
                            (startRatio + endRatio) / 2
                        );
                        const segmentPolyline = L.polyline([segmentStart, segmentEnd], {
                            color: segmentColor,
                            weight: 3,
                            opacity: getMapLinkOpacity(link, false),
                            dashArray: null,
                            bubblingMouseEvents: false
                        }).addTo(map);

                        segmentPolyline.linkData = link;
                        segmentPolyline.sourceId = sourceId;
                        segmentPolyline.targetId = targetId;
                        segmentPolyline.segmentColor = segmentColor;
                        segmentPolyline.isDistance = isDistance;
                        segmentPolyline.isNeighborExpandedEdge = isNeighborExpandedEdge;
                        segmentPolyline.isSupplementalContextEdge = isSupplementalContextEdge;

                        segmentPolyline.bindTooltip(tooltipHtml, {
                            permanent: false,
                            direction: 'center'
                        });
                        attachEdgeClickHandler(segmentPolyline);
                        createEdgeHitbox([segmentStart, segmentEnd], link, sourceId, targetId, tooltipHtml);
                        segmentPolyline.on('mouseover', function(e) {
                            this.setStyle({
                                weight: 5,
                                opacity: 1,
                                dashArray: null
                            });
                        });
                        segmentPolyline.on('mouseout', function(e) {
                            const isSelected = selectedEdge &&
                                ((selectedEdge.source === this.sourceId && selectedEdge.target === this.targetId) ||
                                 (selectedEdge.source === this.targetId && selectedEdge.target === this.sourceId));
                            this.setStyle({
                                weight: 3,
                                opacity: getMapLinkOpacity(this.linkData, isSelected),
                                color: isSelected ? getMapLinkColor(this.linkData, sourceNode, targetNode, true) : this.segmentColor,
                                dashArray: null
                            });
                        });

                        mapPolylines.push(segmentPolyline);
                    }
                    return;
                }
                
                const polyline = L.polyline(latlngs, {
                    color: edgeColor,
                    weight: 2.5,
                    opacity: getMapLinkOpacity(link, false),
                    dashArray: getMapLinkDashArray(link),
                    bubblingMouseEvents: false
                }).addTo(map);

                // 存储边数据到polyline以便点击时使用
                polyline.linkData = link;
                polyline.sourceId = sourceId;
                polyline.targetId = targetId;
                polyline.isDistance = isDistance;
                polyline.isNeighborExpandedEdge = isNeighborExpandedEdge;
                polyline.isSupplementalContextEdge = isSupplementalContextEdge;

                const tooltipHtml = isMissingTopologyLink(link)
                    ? getMissingTopologyTooltip(link, sourceId, targetId)
                    : sourceId + ' → ' + targetId + (isDistance ? ' (Distance)' : '');
                polyline.bindTooltip(tooltipHtml, {
                    permanent: false,
                    direction: 'center'
                });

                // 新增：边点击事件（需求3）
                attachEdgeClickHandler(polyline);
                createEdgeHitbox(latlngs, link, sourceId, targetId, tooltipHtml);

                // 鼠标悬停效果
                polyline.on('mouseover', function(e) {
                    this.setStyle({
                        weight: 5,
                        opacity: 1,
                        dashArray: getMapLinkDashArray(this.linkData)
                    });
                });
                
                polyline.on('mouseout', function(e) {
                    const isSelected = selectedEdge && 
                        ((selectedEdge.source === this.sourceId && selectedEdge.target === this.targetId) ||
                         (selectedEdge.source === this.targetId && selectedEdge.target === this.sourceId));
                    this.setStyle({ 
                        weight: isDistance ? 2.5 : 2.5, 
                        opacity: getMapLinkOpacity(this.linkData, isSelected),
                        color: isSelected ? getMapLinkColor(this.linkData, sourceNode, targetNode, true) : (this.segmentColor || getMapLinkColor(this.linkData, sourceNode, targetNode, false)),
                        dashArray: this.segmentColor ? null : getMapLinkDashArray(this.linkData)
                    });
                });

                mapPolylines.push(polyline);
            });
        }

        // ==========================================
        // 修改后的边选择函数（支持再次点击取消选中，自动清除节点选择）
        // ==========================================

        function selectEdge(link, sourceId, targetId, clickLatLng) {
            // 再次点击已打开页签的同一条边 → 关闭该页签（开关），不影响其它已打开页签
            const existing = findEdgePopup(sourceId, targetId);
            if (existing) {
                closeEdgePopup(existing); // remove 回调会恢复边样式
                document.getElementById('detailPanel').classList.remove('show');
                return;
            }

            clearHighlight(); // 点击边时清除搜索高亮（保留其它已打开的 NE/边页签）

            // 设置新的边选择...
            selectedEdge = { source: sourceId, target: targetId, data: link };
            applySelectedEdgeStyle(link); // 高亮选中边、其余恢复常态
            showEdgeDetailPanel(link, sourceId, targetId, clickLatLng);
        }

        // 按当前选中边对所有连线重新着色（高亮选中边，其余恢复常态）
        function applySelectedEdgeStyle(link) {
            mapPolylines.forEach(function(polyline) {
                const sourceNode = currentNodes.find(function(n) { return n.id === polyline.sourceId; });
                const targetNode = currentNodes.find(function(n) { return n.id === polyline.targetId; });
                if (link && polyline.linkData === link) {
                    polyline.setStyle({
                        color: getMapLinkColor(polyline.linkData, sourceNode, targetNode, true),
                        weight: 4,
                        opacity: 1,
                        dashArray: getMapLinkDashArray(polyline.linkData)
                    });
                    polyline.bringToFront();
                } else {
                    polyline.setStyle({
                        color: polyline.segmentColor || getMapLinkColor(polyline.linkData, sourceNode, targetNode, false),
                        weight: polyline.segmentColor ? 3 : 2.5,
                        opacity: getMapLinkOpacity(polyline.linkData, false),
                        dashArray: polyline.segmentColor ? null : getMapLinkDashArray(polyline.linkData)
                    });
                }
            });
        }

        function getEdgePopupLatLng(sourceId, targetId, clickLatLng) {
            if (clickLatLng) return clickLatLng;
            const sourceMarker = mapMarkers[sourceId];
            const targetMarker = mapMarkers[targetId];
            if (sourceMarker && targetMarker) {
                const a = sourceMarker.getLatLng();
                const b = targetMarker.getLatLng();
                return L.latLng((a.lat + b.lat) / 2, (a.lng + b.lng) / 2);
            }
            return map ? map.getCenter() : L.latLng(0, 0);
        }

        function getEdgeTopologyArrow(link, topology) {
            const text = [
                topology,
                link && link.predicted_relation,
                link && link.relation,
                link && link.direction
            ].map(function(value) {
                return String(value || '').trim();
            }).filter(Boolean).join(' ').toLowerCase();

            const isBidirectional = /<\s*-\s*>|↔|↕|双向|bidirectional|both/.test(text);
            const hasLeft = /<\s*-|←|target[\s_-]*to[\s_-]*source|reverse/.test(text);
            const hasRight = /-\s*>|→|source[\s_-]*to[\s_-]*target|forward|downstream/.test(text);

            if (isBidirectional || (hasLeft && hasRight)) return '↕';
            if (hasLeft) return '↑';
            if (hasRight) return '↓';
            return '↓';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function buildDistanceEdges() {
            if (multiSelectedNodes.size < 2) {
                const btn = document.querySelector('.multi-select-actions button.primary');
                const originalText = btn.textContent;
                btn.textContent = '请至少选2个节点';
                btn.style.background = '#d29922';
                setTimeout(function() {
                    btn.textContent = originalText;
                    btn.style.background = '#cf222e';
                }, 2000);
                return;
            }

            const selectedNodesArray = Array.from(multiSelectedNodes);
            multiSelectLinks = [];

            for (let i = 0; i < selectedNodesArray.length; i++) {
                for (let j = i + 1; j < selectedNodesArray.length; j++) {
                    const node1 = allNodes.find(function(n) { return n.id === selectedNodesArray[i]; });
                    const node2 = allNodes.find(function(n) { return n.id === selectedNodesArray[j]; });

                    if (node1 && node2 && hasValidCoords(node1) && hasValidCoords(node2)) {
                        const distance = calculateDistance(
                            parseFloat(node1.latitude), parseFloat(node1.longitude),
                            parseFloat(node2.latitude), parseFloat(node2.longitude)
                        );

                        multiSelectLinks.push({
                            source: node1.id,
                            target: node2.id,
                            distance: distance,
                            isMultiSelect: true
                        });
                    }
                }
            }

            if (multiSelectLinks.length === 0) {
                const btn = document.querySelector('.multi-select-actions button.primary');
                const originalText = btn.textContent;
                btn.textContent = '节点缺少经纬度';
                btn.style.background = '#d29922';
                setTimeout(function() {
                    btn.textContent = originalText;
                    btn.style.background = '#cf222e';
                }, 2002);
                return;
            }

            // 修改：移除 renderMap()，改为仅增量渲染距离线
            // renderMap(); // ← 删除这行
            renderMapDistanceLines(); // ← 仅添加距离连线，不刷新整个地图
            updateDistanceStats();
            
            // 可选：轻微震动提示用户连线已建立（视觉反馈）
            if (map) {
                map.getContainer().style.transition = 'transform 0.1s';
                map.getContainer().style.transform = 'scale(1.002)';
                setTimeout(function() {
                    map.getContainer().style.transform = 'scale(1)';
                }, 100);
            }
        }

        function renderSingleGroup(data) {

            // 实时回写时以它为基底，仅替换 root_cause_annotations / note，保留其余字段不变。
            try { rcOriginalGroup = JSON.parse(JSON.stringify(data)); } catch (e) { rcOriginalGroup = null; }
            siteDragOffsets = {}; // 切换故障组时清除上一组的拖动偏移
            restoreRcFromLocalStore(graphData); // 从本地恢复已保存的根因标注/备注
            currentNote = graphData.note || '';
            originalGroupUuid = data.uuid || data.match_info?.uuid || '';

            if (graphData.ne_info) {
                loadOriginalFormat(graphData);
            } else if (graphData.nodes) {
                loadVizFormat(graphData);
            } else {
                throw new Error('未知数据格式');
            }

            enableNotePanel();
            loadNoteToPanel();
            renderRootCausePanel();

        }

        // 判断某故障组是否已标注根因（任一根因设备 或 任一根因告警）
        function isGroupLabeled(group) {
            const rc = group && group.root_cause_annotations;
            if (!rc || typeof rc !== 'object') return false;
            return Object.keys(rc).some(function(neId) {
                const entry = rc[neId];
                if (!entry) return false;
                if (entry.device === true) return true;
                if (entry.alarms && typeof entry.alarms === 'object') {
                    return Object.keys(entry.alarms).some(function(k) { return !!entry.alarms[k]; });
                }
                return false;
            });
        }

        // 跳转到相邻故障组（delta = -1 上一组，1 下一组）
        function goToAdjacentGroup(delta) {
            if (!groupNavList.length) return;
            const newIndex = groupNavIndex + delta;
            if (newIndex < 0 || newIndex >= groupNavList.length) return;
            commitCurrentGroup();
            loadGroupAtIndex(newIndex);
        }

        // 向后跳到下一个 已标注(labeled=true) / 未标注(labeled=false) 的故障组
        // 按标注状态向前/后跳转：labeled=true 已标注 / false 未标注；direction=1 下一组 / -1 上一组
        function goToByLabel(labeled, direction) {
            if (!groupNavList.length) return;
            let target = -1;
            for (let idx = groupNavIndex + direction; idx >= 0 && idx < groupNavList.length; idx += direction) {
                if (isGroupLabeled(groupNavList[idx]) === labeled) { target = idx; break; }
            }
            if (target === -1) {
                const dirText = direction > 0 ? '后面' : '前面';
                updateAutoSaveStatus(dirText + '没有' + (labeled ? '已标注' : '未标注') + '的故障组了');
                return;
            }
            commitCurrentGroup();
            loadGroupAtIndex(target);
        }

        // ==========================================
        // 结果自动保存：默认写入浏览器本地（localStorage），无需手动选择文件；
        // 需要落到磁盘文件时点“导出结果文件”一键下载 JSONL。
        // ==========================================
        const RC_LS_KEY = 'mw_rc_annotations';        // 旧版：单一大 blob（仅用于一次性迁移 + 兜底读取）
        const RC_LS_PREFIX = 'mw_rc_annotations:';    // 新版：每个故障组一个独立 key
        function rcEntryKey(uuid) { return RC_LS_PREFIX + uuid; }

        // QuotaExceededError 跨浏览器判定（Chrome/Firefox 名称与错误码不同）
        function isQuotaExceededError(e) {
            return !!e && (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED'
                || e.code === 22 || e.code === 1014);
        }

        // 一次性迁移：把旧的单一 blob 拆成按 uuid 的独立 key，避免每次保存重写整个大字符串。
        // 迁移后删除旧 blob；已存在独立 key 的不覆盖（独立 key 是更新的工作副本）。
        function migrateRcStoreIfNeeded() {
            let legacy;
            try { legacy = localStorage.getItem(RC_LS_KEY); } catch (e) { return; }
            if (!legacy) return;
            try {
                const store = JSON.parse(legacy) || {};
                Object.keys(store).forEach(function(uuid) {
                    if (localStorage.getItem(rcEntryKey(uuid)) === null) {
                        localStorage.setItem(rcEntryKey(uuid), JSON.stringify(store[uuid]));
                    }
                });
                localStorage.removeItem(RC_LS_KEY);
            } catch (e) { /* 迁移失败保留旧 blob，loadRcEntry 仍会兜底读取 */ }
        }

        function updateAutoSaveStatus(message, isError) {
            const el = document.getElementById('autoSaveStatus');
            if (!el) return;
            el.textContent = message || '';
            el.className = 'autosave-status' + (isError ? ' error' : ' saved');
        }

        // 读取单个故障组的标注（优先独立 key，迁移未执行/失败时兜底读旧 blob）
        function loadRcEntry(uuid) {
            if (!uuid) return null;
            try {
                const raw = localStorage.getItem(rcEntryKey(uuid));
                if (raw !== null) return JSON.parse(raw);
            } catch (e) { /* 落到兜底 */ }
            try {
                const legacy = JSON.parse(localStorage.getItem(RC_LS_KEY) || '{}') || {};
                return legacy[uuid] || null;
            } catch (e) { return null; }
        }

        function pushStatusToOverview() {
            try {
                const bridge = getFaultGroupBrowserBridge();
                if (bridge && typeof bridge.applyFaultGroupRootCause === 'function' && originalGroupUuid) {
                    bridge.applyFaultGroupRootCause(originalGroupUuid, graphData.root_cause_annotations || {}, graphData.note || '');
                }
            } catch (e) { /* 总览页不可用时忽略 */ }
        }

        function notifyActiveGroupToOverview() {
            try {
                const bridge = getFaultGroupBrowserBridge();
                if (bridge && typeof bridge.updateActiveLabelingGroup === 'function' && originalGroupUuid) {
                    bridge.updateActiveLabelingGroup(originalGroupUuid);
                }
            } catch (e) { /* 总览页不可用时忽略 */ }
        }

        // 把当前故障组的根因标注 + 备注自动写入 localStorage（每组一个独立 key）。
        // 只写当前组那一小份，保存成本与“历史已标注组数”无关。
        function autoSaveResults() {
            if (!graphData || !originalGroupUuid) return;
            // 把因标根因而并入的扩展设备一并存进本地，否则服务保存失败/刷新后只恢复“是根因”却没了设备本身
            const addedNeighbors = {};
            if (graphData.ne_info && typeof graphData.ne_info === 'object') {
                Object.keys(graphData.ne_info).forEach(function(id) {
                    if (graphData.ne_info[id] && graphData.ne_info[id].added_via_neighbor_expansion) {
                        addedNeighbors[id] = graphData.ne_info[id];
                    }
                });
            }
            const entry = {
                root_cause_annotations: graphData.root_cause_annotations || {},
                note: graphData.note || '',
                added_neighbors: addedNeighbors,
                updated_at: new Date().toISOString()
            };
            try {
                localStorage.setItem(rcEntryKey(originalGroupUuid), JSON.stringify(entry));
                updateAutoSaveStatus('✓ 已自动保存到本地 ' + new Date().toLocaleTimeString());
            } catch (e) {
                if (isQuotaExceededError(e)) {
                    const msg = '⚠ 本地存储已满，标注未能保存！请立即点击「导出结果文件」落盘，否则新标注会丢失。';
                    updateAutoSaveStatus(msg, true);
                    if (!autoSaveResults._quotaAlerted) {
                        autoSaveResults._quotaAlerted = true;   // 同一会话只弹一次，避免每次勾选都打断
                        try { alert(msg); } catch (_) { /* ignore */ }
                    }
                } else {
                    updateAutoSaveStatus('自动保存失败: ' + (e.message || e), true);
                }
            }
            scheduleServerWriteBack();   // 服务模式下额外实时回写到 data/ 对应文件
        }

        // 服务模式（http://localhost）实时回写：把当前组以「原始对象 + 最新标注/备注」写回其源文件。
        // 防抖 400ms，避免每次勾选都打一次请求；localStorage 仍是即时兜底。
        function scheduleServerWriteBack() {
            if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
            if (!rcSourceFiles[originalGroupUuid] || !rcOriginalGroup) return;
            if (_writeBackTimer) clearTimeout(_writeBackTimer);
            _writeBackTimer = setTimeout(doServerWriteBack, 400);
        }

        function buildServerWriteBackPayload() {
            const file = rcSourceFiles[originalGroupUuid];
            if (!file || !rcOriginalGroup) return null;
            const curNeInfo = (graphData && graphData.ne_info) || {};
            const origNeInfo = rcOriginalGroup.ne_info || {};
            // 当前仍并入的扩展设备
            const addedIds = Object.keys(curNeInfo).filter(function(id) {
                return curNeInfo[id] && curNeInfo[id].added_via_neighbor_expansion;
            });
            // 原文件里曾是扩展设备、但现已从 ne_info 删除的（用户取消/清空）→ 需要从 group_info 一并删除
            const removedIds = Object.keys(origNeInfo).filter(function(id) {
                return origNeInfo[id] && origNeInfo[id].added_via_neighbor_expansion && !curNeInfo[id];
            });
            // 在原始 group_info 副本上做加/删（保留隐藏 NE，不直接写 graphData 的显示版）
            let groupInfoOut = rcOriginalGroup.group_info;
            if ((addedIds.length || removedIds.length) && groupInfoOut && typeof groupInfoOut === 'object') {
                groupInfoOut = JSON.parse(JSON.stringify(groupInfoOut));
                const rem = new Set(removedIds);
                // 删除已取消的扩展设备、追加当前并入的扩展设备（单组：唯一组）
                Object.keys(groupInfoOut).forEach(function(gid) {
                    const gi = groupInfoOut[gid];
                    if (!gi) return;
                    if (!Array.isArray(gi.ne_list)) gi.ne_list = [];
                    if (!Array.isArray(gi.site_list)) gi.site_list = [];
                    if (removedIds.length) {
                        gi.ne_list = gi.ne_list.filter(function(id) { return !rem.has(id); });
                    }
                    addedIds.forEach(function(id) {
                        if (gi.ne_list.indexOf(id) === -1) gi.ne_list.push(id);
                    });
                    // site_list 增量调整：删除已取消设备且最终无设备使用的站点；追加并入设备的站点
                    removedIds.forEach(function(id) {
                        const site = origNeInfo[id] && origNeInfo[id].site_id;
                        if (!site) return;
                        const stillUsed = gi.ne_list.some(function(nid) {
                            const ni = curNeInfo[nid] || origNeInfo[nid];
                            return ni && ni.site_id === site;
                        });
                        if (!stillUsed) { const i = gi.site_list.indexOf(site); if (i !== -1) gi.site_list.splice(i, 1); }
                    });
                    addedIds.forEach(function(id) {
                        const site = curNeInfo[id] && curNeInfo[id].site_id;
                        if (site && gi.site_list.indexOf(site) === -1) gi.site_list.push(site);
                    });
                });
            }
            const out = Object.assign({}, rcOriginalGroup, {
                // 以当前 ne_info 为准，包含标根因时并入的邻居设备（带 added_via_neighbor_expansion 标记）
                ne_info: (graphData && graphData.ne_info) || rcOriginalGroup.ne_info,
                group_info: groupInfoOut,
                root_cause_annotations: (graphData && graphData.root_cause_annotations) || {},
                note: (graphData && graphData.note) || '',
                note_updated_at: (graphData && graphData.note_updated_at) || new Date().toISOString()
            });
            return { file, body: JSON.stringify(out) };
        }

        function doServerWriteBack() {
            _writeBackTimer = null;
            const payload = buildServerWriteBackPayload();
            if (!payload) return Promise.resolve();
            return fetch('/save?file=' + encodeURIComponent(payload.file), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload.body
            }).then(function(r) {
                if (r.ok) {
                    updateAutoSaveStatus('✓ 已实时回写 ' + payload.file + ' ' + new Date().toLocaleTimeString());
                } else {
                    updateAutoSaveStatus('实时回写失败 HTTP ' + r.status + '（已存本地缓存）', true);
                }
            }).catch(function(e) {
                updateAutoSaveStatus('实时回写失败：' + (e.message || e) + '（已存本地缓存）', true);
            });
        }

        function flushServerWriteBack(useBeacon) {
            if (_writeBackTimer) {
                clearTimeout(_writeBackTimer);
                _writeBackTimer = null;
            }
            const payload = buildServerWriteBackPayload();
            if (!payload) return Promise.resolve();
            const url = '/save?file=' + encodeURIComponent(payload.file);
            if (useBeacon && navigator.sendBeacon) {
                const ok = navigator.sendBeacon(url, new Blob([payload.body], { type: 'application/json' }));
                if (ok) return Promise.resolve();
            }
            try {
                return fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload.body,
                    keepalive: !!useBeacon
                }).catch(function(e) {
                    updateAutoSaveStatus('实时回写失败：' + (e.message || e) + '（已存本地缓存）', true);
                });
            } catch (e) {
                updateAutoSaveStatus('实时回写失败：' + (e.message || e) + '（已存本地缓存）', true);
                return Promise.resolve();
            }
        }

        // 加载某组时，从 localStorage 恢复其根因标注/备注（本地工作副本优先）
        function restoreRcFromLocalStore(group) {
            if (!group) return;
            const uuid = group.uuid || (group.match_info && group.match_info.uuid) || '';
            if (!uuid) return;
            const entry = loadRcEntry(uuid);
            if (!entry) return;
            if (entry.root_cause_annotations && typeof entry.root_cause_annotations === 'object') {
                group.root_cause_annotations = entry.root_cause_annotations;
            }
            if (entry.note !== undefined && entry.note !== null) {
                group.note = entry.note;
            }
            // 扩展设备：本地工作副本是权威源（与 root_cause_annotations 同样“本地优先”）。
            // entry.added_neighbors 存在（哪怕是 {}）时：先补回本地有的，再删掉“源文件里有、本地已没有”的（表达取消）。
            // 不存在该字段时（旧格式 / 清过缓存）不动源文件，避免误删已保存的扩展设备。
            if (entry.added_neighbors && typeof entry.added_neighbors === 'object') {
                if (!group.ne_info || typeof group.ne_info !== 'object') group.ne_info = {};
                const allGids = group.group_info ? Object.keys(group.group_info) : [];
                // 1) 补回扩展设备本体 + 加入故障组 ne_list/site_list（在 loadOriginalFormat 之前；单组即加入这一个组）
                Object.keys(entry.added_neighbors).forEach(function(neId) {
                    if (!group.ne_info[neId]) group.ne_info[neId] = entry.added_neighbors[neId];
                    const site = entry.added_neighbors[neId] && entry.added_neighbors[neId].site_id;
                    allGids.forEach(function(gid) {
                        const gi = group.group_info[gid];
                        if (!gi) return;
                        if (!Array.isArray(gi.ne_list)) gi.ne_list = [];
                        if (gi.ne_list.indexOf(neId) === -1) gi.ne_list.push(neId);
                        if (site) {
                            if (!Array.isArray(gi.site_list)) gi.site_list = [];
                            if (gi.site_list.indexOf(site) === -1) gi.site_list.push(site);
                        }
                    });
                });
                // 2) 删掉源文件里有、但本地工作副本里已没有的扩展设备（用户取消过），连 ne_list/site_list 一并清
                const localSet = new Set(Object.keys(entry.added_neighbors));
                Object.keys(group.ne_info).forEach(function(id) {
                    const ni = group.ne_info[id];
                    if (!ni || !ni.added_via_neighbor_expansion || localSet.has(id)) return;
                    const removedSite = ni.site_id;
                    delete group.ne_info[id];
                    Object.keys(group.ne_info).forEach(function(k) {
                        const lk = group.ne_info[k] && group.ne_info[k].link;
                        if (lk && lk[id]) delete lk[id];
                    });
                    Object.keys(group.group_info || {}).forEach(function(gid) {
                        const gi2 = group.group_info[gid];
                        if (!gi2) return;
                        if (Array.isArray(gi2.ne_list)) { const i = gi2.ne_list.indexOf(id); if (i !== -1) gi2.ne_list.splice(i, 1); }
                        if (removedSite && Array.isArray(gi2.site_list)) {
                            const stillUsed = (gi2.ne_list || []).some(function(nid) { return group.ne_info[nid] && group.ne_info[nid].site_id === removedSite; });
                            if (!stillUsed) { const si = gi2.site_list.indexOf(removedSite); if (si !== -1) gi2.site_list.splice(si, 1); }
                        }
                    });
                    if (group.root_cause_annotations) delete group.root_cause_annotations[id];
                });
            }
        }

        // 导出结果文件改到总览页进行（那里有全部故障组）

        // 关闭/刷新页面时保存当前组（localStorage 写入是同步的，可靠）
        window.addEventListener('beforeunload', function() {
            try {
                commitCurrentGroup(true);
            } catch (e) { /* ignore */ }
        });

        // 从会话/文件载荷中提取（可能的）故障组列表与当前组
        function normalizeFaultGroupRecord(record) {
            if (!record || typeof record !== 'object' || Array.isArray(record)) {
                return record;
            }
            if (record.ne_info || record.nodes) {
                return record;
            }
            if (record.group && typeof record.group === 'object' && !Array.isArray(record.group)) {
                return record.group;
            }
            return record;
        }

        function normalizeFaultGroupList(records) {
            return (records || []).map(normalizeFaultGroupRecord);
        }

        const FAULT_GROUP_WINDOW_PAYLOAD_PREFIX = 'FAULT_GROUP_WINDOW_PAYLOAD:';
        const LABELING_DETAIL_WINDOW_NAME = 'ne_labeling_detail';

        function extractGroupPayload(payload) {
            if (payload && typeof payload === 'object' && !Array.isArray(payload) && Array.isArray(payload.groups)) {
                const groups = normalizeFaultGroupList(payload.groups);
                let index = (typeof payload.index === 'number') ? payload.index : 0;
                if (index < 0 || index >= groups.length) index = 0;
                return { groups: groups, index: index, current: groups[index] };
            }
            if (Array.isArray(payload)) {
                const groups = normalizeFaultGroupList(payload);
                return { groups: groups, index: 0, current: groups[0] };
            }
            const current = (payload && typeof payload === 'object' && !Array.isArray(payload) && payload.group)
                ? payload.group : payload;
            return { groups: [], index: -1, current: normalizeFaultGroupRecord(current) };
        }

        function renderExtractedGroupPayload(payload, fileStatus, sourceLabel) {
            groupNavList = payload.groups;
            groupNavIndex = payload.index;
            renderSingleGroup(payload.current);
            if (fileStatus) {
                fileStatus.textContent = groupNavList.length > 1
                    ? ('已加载第 ' + (groupNavIndex + 1) + ' / ' + groupNavList.length + ' 组')
                    : (sourceLabel || '已加载单个故障组详情');
            }
            updateGroupNavUI();
        }

        function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataFile = urlParams.get('file');
            const sessionKey = urlParams.get('session_key');
            const windowPayload = urlParams.get('window_payload');
            const fileStatus = document.getElementById('fileStatus');

            if (windowPayload) {
                showLoading(true);
                try {
                    const rawName = window.name || '';
                    if (rawName.indexOf(FAULT_GROUP_WINDOW_PAYLOAD_PREFIX) !== 0) {
                        throw new Error('未找到窗口传递的故障组数据');
                    }
                    const encodedPayload = rawName.slice(FAULT_GROUP_WINDOW_PAYLOAD_PREFIX.length);
                    window.name = LABELING_DETAIL_WINDOW_NAME;
                    const parsedWin = JSON.parse(decodeURIComponent(encodedPayload));
                    rcSourceFiles = (parsedWin && parsedWin.sourceFiles) || {};
                    const payload = extractGroupPayload(parsedWin);
                    renderExtractedGroupPayload(payload, fileStatus, '已加载单个故障组详情');
                } catch (error) {
                    showError('加载故障组详情失败: ' + error.message);
                    showLoading(false);
                    disableNotePanel();
                }
                return;
            }

            if (sessionKey) {
                showLoading(true);
                try {
                    const rawData = localStorage.getItem(sessionKey);
                    if (!rawData) {
                        throw new Error('未找到对应的故障组数据');
                    }
                    const parsedSession = JSON.parse(rawData);
                    rcSourceFiles = (parsedSession && parsedSession.sourceFiles) || {};
                    const payload = extractGroupPayload(parsedSession);
                    renderExtractedGroupPayload(payload, fileStatus, '已加载单个故障组详情');

                    localStorage.removeItem(sessionKey);
                } catch (error) {
                    showError('加载故障组详情失败: ' + error.message);
                    showLoading(false);
                    disableNotePanel();
                }
                return;
            }

            if (dataFile) {
                showLoading(true);
                fetch(dataFile)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        const payload = extractGroupPayload(data);
                        renderExtractedGroupPayload(payload, fileStatus);
                    })
                    .catch(function(error) {
                        showError('加载数据失败: ' + error.message);
                        showLoading(false);
                        disableNotePanel();
                    });
            } else {
                fileStatus.textContent = '请选择 JSON 文件或拖拽文件到此处';
                showLoading(false);
                disableNotePanel();
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        function getVisualizationExcludedSiteIds(data) {
            const matchInfo = data.match_info || {};
            const mergedRules = matchInfo.merged_rules || (matchInfo.rule ? [matchInfo.rule] : []);
            if (mergedRules.indexOf('transmission_rule') === -1) {
                return new Set();
            }

            const roleMapping = matchInfo.role_mapping || {};
            const grandparentSites = new Set((roleMapping.grandparent_node || []).map(function(siteId) {
                return String(siteId);
            }));
            const sitesReferencedByOtherRoles = new Set();

            for (const roleName in roleMapping) {
                if (roleName === 'grandparent_node') continue;
                (roleMapping[roleName] || []).forEach(function(siteId) {
                    sitesReferencedByOtherRoles.add(String(siteId));
                });
            }

            return new Set(
                Array.from(grandparentSites).filter(function(siteId) {
                    return !sitesReferencedByOtherRoles.has(siteId);
                })
            );
        }

        function buildDisplayGroupInfo(groupInfo, hiddenNeIds, hiddenSiteIds) {
            const displayGroupInfo = {};

            for (const gid in (groupInfo || {})) {
                const groupEntry = groupInfo[gid] || {};
                displayGroupInfo[gid] = Object.assign({}, groupEntry, {
                    ne_list: (groupEntry.ne_list || []).filter(function(neId) {
                        return !hiddenNeIds.has(neId);
                    }),
                    site_list: (groupEntry.site_list || []).filter(function(siteId) {
                        return !hiddenSiteIds.has(String(siteId));
                    })
                });
            }

            return displayGroupInfo;
        }

        function firstNonEmptyValue() {
            for (let i = 0; i < arguments.length; i++) {
                const value = arguments[i];
                if (value !== undefined && value !== null && String(value).trim() !== '') {
                    return String(value).trim();
                }
            }
            return '';
        }

        function normalizeLinkDirectionValue(value) {
            if (value && typeof value === 'object' && !Array.isArray(value)) {
                return firstNonEmptyValue(value.topology, value.direction, value.relation, value.value);
            }
            return firstNonEmptyValue(value);
        }

        function normalizeTopologyLinkInfo(linkInfo) {
            const empty = {
                connection_type: '',
                topology: '',
                time_window: '',
                distance: 0,
                left_alarm: null,
                right_alarm: null,
                supplemental_fault_pattern_context: false
            };

            if (linkInfo === undefined || linkInfo === null || linkInfo === '') {
                return empty;
            }

            if (typeof linkInfo !== 'object' || Array.isArray(linkInfo)) {
                return Object.assign({}, empty, {
                    connection_type: Array.isArray(linkInfo) ? linkInfo.map(String).join('/') : String(linkInfo)
                });
            }

            const typeMap = (linkInfo.link_type && typeof linkInfo.link_type === 'object' && !Array.isArray(linkInfo.link_type))
                ? linkInfo.link_type
                : ((linkInfo.linkType && typeof linkInfo.linkType === 'object' && !Array.isArray(linkInfo.linkType)) ? linkInfo.linkType : null);
            const reservedKeys = new Set([
                'connection_type', 'connectionType', 'type', 'link_type', 'linkType', 'topology',
                'direction', 'relation', 'time_window', 'timeWindow', 'distance', 'left_alarm',
                'leftAlarm', 'right_alarm', 'rightAlarm', 'supplemental_fault_pattern_context'
            ]);
            const layerEntries = typeMap
                ? Object.entries(typeMap)
                : Object.entries(linkInfo).filter(function(entry) {
                    const value = entry[1];
                    return !reservedKeys.has(entry[0]) &&
                        value !== undefined &&
                        value !== null &&
                        (typeof value !== 'object' || Array.isArray(value) || normalizeLinkDirectionValue(value));
                });
            const layerNames = layerEntries.map(function(entry) { return String(entry[0]).trim(); }).filter(Boolean);
            const directionValues = Array.from(new Set(layerEntries.map(function(entry) {
                return normalizeLinkDirectionValue(entry[1]);
            }).filter(Boolean)));

            return Object.assign({}, empty, {
                connection_type: firstNonEmptyValue(
                    linkInfo.connection_type,
                    linkInfo.connectionType,
                    typeof linkInfo.link_type === 'string' ? linkInfo.link_type : '',
                    typeof linkInfo.linkType === 'string' ? linkInfo.linkType : '',
                    linkInfo.type,
                    layerNames.join('/')
                ),
                topology: firstNonEmptyValue(
                    linkInfo.topology,
                    linkInfo.direction,
                    linkInfo.relation,
                    directionValues.join(',')
                ),
                time_window: firstNonEmptyValue(linkInfo.time_window, linkInfo.timeWindow),
                distance: linkInfo.distance || 0,
                left_alarm: linkInfo.left_alarm || linkInfo.leftAlarm || null,
                right_alarm: linkInfo.right_alarm || linkInfo.rightAlarm || null,
                supplemental_fault_pattern_context: !!linkInfo.supplemental_fault_pattern_context
            });
        }

        function loadOriginalFormat(data) {
            graphData = data;
            updateRoleSiteSets(data);
            updateFaultPatternManagedSites(data);
            updateTopologyHighlightSites(data);
            allNodes = [];
            const hiddenSiteIds = getVisualizationExcludedSiteIds(data);
            const hiddenNeIds = new Set();
            const symptomAlarmIndex = buildNeAlarmIndexFromSymptoms(data);
            
            for (const neId in data.ne_info) {
                const neInfo = data.ne_info[neId];
                if (hiddenSiteIds.has(String(neInfo.site_id || ''))) {
                    hiddenNeIds.add(neId);
                    continue;
                }
                const nodeAlarms = getNeAlarmsFromInfo(neId, neInfo, symptomAlarmIndex);
                const alarmTypes = [];
                for (let i = 0; i < nodeAlarms.length; i++) {
                    const alarm = nodeAlarms[i];
                    if (alarm.alarm_type && alarmTypes.indexOf(alarm.alarm_type) === -1) {
                        alarmTypes.push(alarm.alarm_type);
                    }
                }

                allNodes.push({
                    id: neId,
                    group: neInfo.group || 0,
                    site_id: neInfo.site_id || '',
                    site_name: neInfo.site_name || '',
                    type: neInfo.type || '',
                    network_type: neInfo.network_type || '',
                    manufacturer: neInfo.manufacturer || '',
                    domain: neInfo.domain || '',
                    alarm_count: nodeAlarms.length,
                    alarm_types: alarmTypes,
                    name: neInfo.name || neId,
                    alarm: nodeAlarms,
                    supplemental_fault_pattern_context: !!neInfo.supplemental_fault_pattern_context,
                    latitude: neInfo.latitude !== undefined ? neInfo.latitude : (neInfo.lat !== undefined ? neInfo.lat : undefined),
                    longitude: neInfo.longitude !== undefined ? neInfo.longitude : (neInfo.lon !== undefined ? neInfo.lon : (neInfo.lng !== undefined ? neInfo.lng : undefined))
                });
            }

            allLinks = [];
            const linkSet = new Set();
            const edgeDetails = {};

            for (const neId in data.ne_info) {
                if (hiddenNeIds.has(neId)) continue;
                const neInfo = data.ne_info[neId];
                if (neInfo.link) {
                    if (typeof neInfo.link === 'object' && !Array.isArray(neInfo.link)) {
                        for (const target in neInfo.link) {
                            if (target === neId || hiddenNeIds.has(target)) continue;
                            const key = [neId, target].sort().join('|');
                            if (!linkSet.has(key)) {
                                linkSet.add(key);
                                const linkInfo = neInfo.link[target];
                                allLinks.push(Object.assign({
                                    source: neId,
                                    target: target
                                }, normalizeTopologyLinkInfo(linkInfo)));
                                edgeDetails[key] = linkInfo;
                            }
                        }
                    } else if (Array.isArray(neInfo.link)) {
                        for (let i = 0; i < neInfo.link.length; i++) {
                            const target = neInfo.link[i];
                            if (target === neId || hiddenNeIds.has(target)) continue;
                            const key = [neId, target].sort().join('|');
                            if (!linkSet.has(key)) {
                                linkSet.add(key);
                                allLinks.push({ source: neId, target: target });
                            }
                        }
                    }
                }
            }

            appendMissingTopologyLinks(data, allNodes, allLinks, linkSet);
            window.edgeDetails = edgeDetails;
            graphData.group_info = buildDisplayGroupInfo(data.group_info || {}, hiddenNeIds, hiddenSiteIds);

            document.getElementById('fileStatus').textContent = '已加载: ' + Object.keys(graphData.group_info).length + ' 个 Group, ' + allNodes.length + ' 个节点';

            renderAlarmMetaSummary();
            updateStats();
            if (graphData.group_info && Object.keys(graphData.group_info).length > 0) {
                showAllGroups();
            }
            showLoading(false);
        }

        function loadVizFormat(data) {
            graphData = data;
            updateRoleSiteSets(data);
            updateFaultPatternManagedSites(data);
            allNodes = (data.nodes || []).map(function(n) {
                const domain = n.domain || '';
                const style = getDomainStyle(domain);
                return Object.assign({}, n, { domainStyle: style });
            });
            allLinks = (data.links || []).map(function(link) { return Object.assign({}, link); });
            appendMissingTopologyLinks(data, allNodes, allLinks, new Set());
            if (data.edge_details) {
                window.edgeDetails = data.edge_details;
            }
            
            document.getElementById('fileStatus').textContent = '已加载: ' + Object.keys(graphData.group_info || {}).length + ' 个 Group, ' + allNodes.length + ' 个节点';
            
            renderAlarmMetaSummary();
            updateStats();
            if (graphData.group_info && Object.keys(graphData.group_info).length > 0) {
                showAllGroups();
            }
            showLoading(false);
        }

        function updateStats() {
            document.getElementById('totalNodes').textContent = allNodes.length;
            document.getElementById('totalEdges').textContent = allLinks.length;
        }

        function setBaseCurrentGraph(nodes, links) {
            baseCurrentNodes = (nodes || []).map(function(n) { return Object.assign({}, n); });
            baseCurrentLinks = (links || []).map(function(l) { return Object.assign({}, l); });
        }

        function restoreBaseCurrentGraph() {
            currentNodes = baseCurrentNodes.map(function(n) { return Object.assign({}, n); });
            currentLinks = baseCurrentLinks.map(function(l) { return Object.assign({}, l); });
            filteredLinks = currentLinks.slice();
            document.getElementById('currentNodes').textContent = currentNodes.length;
            renderAlarmGroupPartitionSummary();
        }

        function buildSiteGraphFromNeGraph() {
            if (!neGraphData || typeof neGraphData !== 'object') {
                return new Map();
            }
            const siteGraph = new Map();

            function ensureSite(siteId) {
                if (!siteId) return;
                if (!siteGraph.has(siteId)) {
                    siteGraph.set(siteId, new Set());
                }
            }

            Object.entries(neGraphData).forEach(function(entry) {
                const sourceId = entry[0];
                const neInfo = entry[1] || {};
                const sourceSite = neInfo && neInfo.site_id ? String(neInfo.site_id) : '';
                if (!sourceSite) return;
                ensureSite(sourceSite);
                const links = neInfo.link || {};
                Object.keys(links).forEach(function(targetId) {
                    const targetInfo = neGraphData[targetId] || {};
                    const targetSite = targetInfo && targetInfo.site_id ? String(targetInfo.site_id) : '';
                    if (!targetSite || targetSite === sourceSite) return;
                    ensureSite(targetSite);
                    siteGraph.get(sourceSite).add(targetSite);
                    siteGraph.get(targetSite).add(sourceSite);
                });
            });

            return siteGraph;
        }

        function getNthOrderNeighborSites(startSiteId, hopCount) {
            const normalizedStart = String(startSiteId || '').trim();
            if (!normalizedStart) return new Set();

            const siteGraph = buildSiteGraphFromNeGraph();
            if (siteGraph.size === 0) {
                return new Set([normalizedStart]);
            }
            const visited = new Set([normalizedStart]);
            const queue = [normalizedStart];
            const maxHop = Math.max(1, Number(hopCount || 1));
            let currentLevel = 0;

            while (queue.length > 0 && currentLevel < maxHop) {
                const levelSize = queue.length;
                for (let i = 0; i < levelSize; i++) {
                    const currentSite = queue.shift();
                    const neighbors = siteGraph.get(currentSite) || new Set();
                    neighbors.forEach(function(neighborSite) {
                        if (!visited.has(neighborSite)) {
                            visited.add(neighborSite);
                            queue.push(neighborSite);
                        }
                    });
                }
                currentLevel += 1;
            }

            return visited;
        }

        function resolveNodeInfoForNeighborExpansion(nodeId) {
            return currentNodes.find(function(n) { return n.id === nodeId; }) ||
                allNodes.find(function(n) { return n.id === nodeId; }) ||
                (neGraphData && neGraphData[nodeId] ? Object.assign({ id: nodeId }, neGraphData[nodeId]) : null);
        }

        function rebuildSiteNeighborExpansion(preserveViewport) {
            if (!siteNeighborModeEnabled) return false;
            // 若本页是由导出快照恢复的（带离线扩展数据），始终以快照为准做邻居增删，
            // 不依赖能否再次加载 ne_graph.json —— 经总览页用 blob URL 打开时，
            // 相对 fetch 在 http/file 环境下行为不同，曾导致“去掉邻居后加不回来”。
            const offline = window.__offlineNeighborExpansion;
            if (offline && offline.hasExpansion) {
                if (siteNeighborAnchorNodes.size === 0) {
                    restoreBaseCurrentGraph();
                } else if (offline.contributions && Object.keys(offline.contributions).length) {
                    // 按当前选中的锚点动态求并集：base ∪ 各选中锚点带来的扩展 NE
                    const activeIds = new Set(offline.baseNodeIds || []);
                    siteNeighborAnchorNodes.forEach(function(anchorId) {
                        activeIds.add(anchorId);
                        const contrib = offline.contributions[anchorId];
                        if (Array.isArray(contrib)) {
                            contrib.forEach(function(neId) { activeIds.add(neId); });
                        }
                    });
                    currentNodes = offline.expandedNodes
                        .filter(function(n) { return activeIds.has(n.id); })
                        .map(function(n) { return Object.assign({}, n); });
                    currentLinks = offline.expandedLinks.filter(function(l) {
                        const s = typeof l.source === 'object' ? l.source.id : l.source;
                        const t = typeof l.target === 'object' ? l.target.id : l.target;
                        return activeIds.has(s) && activeIds.has(t);
                    }).map(function(l) { return Object.assign({}, l); });
                    filteredLinks = currentLinks.slice();
                    document.getElementById('currentNodes').textContent = currentNodes.length;
                    renderAlarmGroupPartitionSummary();
                } else {
                    // 旧快照没有按锚点拆分的数据，退回整体恢复
                    currentNodes = offline.expandedNodes.map(function(n) { return Object.assign({}, n); });
                    currentLinks = offline.expandedLinks.map(function(l) { return Object.assign({}, l); });
                    filteredLinks = currentLinks.slice();
                    document.getElementById('currentNodes').textContent = currentNodes.length;
                    renderAlarmGroupPartitionSummary();
                }
                renderMap({ preserveViewport: preserveViewport !== false });
                return true;
            }
            if (!neGraphData || typeof neGraphData !== 'object') {
                showError('请先加载 ne_graph.json');
                return false;
            }
            if (siteNeighborAnchorNodes.size === 0) {
                restoreBaseCurrentGraph();
                renderMap({ preserveViewport: preserveViewport !== false });
                return true;
            }

            const expandedSites = new Set();
            siteNeighborAnchorNodes.forEach(function(nodeId) {
                const anchorNode = resolveNodeInfoForNeighborExpansion(nodeId);
                const anchorSiteId = anchorNode && anchorNode.site_id ? String(anchorNode.site_id) : '';
                if (!anchorSiteId) return;
                getNthOrderNeighborSites(anchorSiteId, siteNeighborHopCount).forEach(function(siteId) {
                    expandedSites.add(siteId);
                });
            });
            if (expandedSites.size === 0) return false;

            const baseNodeMap = new Map();
            baseCurrentNodes.forEach(function(node) {
                baseNodeMap.set(node.id, node);
            });
            const baseNodeIdSet = new Set(baseCurrentNodes.map(function(node) { return node.id; }));

            const expandedNodeIds = [];
            Object.entries(neGraphData).forEach(function(entry) {
                const neId = entry[0];
                const neInfo = entry[1] || {};
                const siteId = neInfo && neInfo.site_id ? String(neInfo.site_id) : '';
                if (siteId && expandedSites.has(siteId)) {
                    expandedNodeIds.push(neId);
                }
            });

            const mergedNodeIdSet = new Set(baseNodeIdSet);
            expandedNodeIds.forEach(function(neId) {
                mergedNodeIdSet.add(neId);
            });

            currentNodes = Array.from(mergedNodeIdSet).map(function(neId) {
                if (baseNodeMap.has(neId)) {
                    return Object.assign({}, baseNodeMap.get(neId), {
                        isNeighborExpanded: !baseNodeIdSet.has(neId)
                    });
                }
                const neInfo = neGraphData[neId] || {};
                const domain = neInfo.domain || '';
                return {
                    id: neId,
                    group: neInfo.group || 0,
                    site_id: neInfo.site_id || '',
                    site_name: neInfo.site_name || '',
                    type: neInfo.type || '',
                    network_type: neInfo.network_type || '',
                    manufacturer: neInfo.manufacturer || '',
                    domain: domain,
                    alarm_count: 0,
                    alarm_types: [],
                    name: neInfo.name || neId,
                    alarm: [],
                    latitude: neInfo.latitude !== undefined ? neInfo.latitude : (neInfo.lat !== undefined ? neInfo.lat : undefined),
                    longitude: neInfo.longitude !== undefined ? neInfo.longitude : (neInfo.lon !== undefined ? neInfo.lon : (neInfo.lng !== undefined ? neInfo.lng : undefined)),
                    isHighlight: false,
                    isNeighborExpanded: true,
                    domainStyle: getDomainStyle(domain)
                };
            });

            const mergedNodeIdArray = Array.from(mergedNodeIdSet);
            const mergedNodeIdLookup = new Set(mergedNodeIdArray);
            const expandedNodeIdSet = new Set(expandedNodeIds.filter(function(neId) {
                return !baseNodeIdSet.has(neId);
            }));
            const linkSet = new Set();
            const baseLinkKeySet = new Set();
            baseCurrentLinks.forEach(function(link) {
                const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;
                baseLinkKeySet.add([sourceId, targetId].sort().join('|'));
            });

            const mergedLinks = baseCurrentLinks.map(function(link) {
                return Object.assign({}, link, { isNeighborExpanded: false });
            });

            mergedNodeIdArray.forEach(function(sourceId) {
                const sourceInfo = neGraphData[sourceId] || {};
                const links = sourceInfo.link || {};
                Object.entries(links).forEach(function(entry) {
                    const targetId = entry[0];
                    const linkInfo = entry[1] || {};
                    if (!mergedNodeIdLookup.has(targetId) || targetId === sourceId) return;
                    const key = [sourceId, targetId].sort().join('|');
                    if (linkSet.has(key) || baseLinkKeySet.has(key)) return;
                    linkSet.add(key);
                    mergedLinks.push(Object.assign({
                        source: sourceId,
                        target: targetId,
                        isNeighborExpanded: true
                    }, normalizeTopologyLinkInfo(linkInfo)));
                });
            });

            currentLinks = mergedLinks;
            filteredLinks = currentLinks.slice();
            document.getElementById('currentNodes').textContent = currentNodes.length;
            renderAlarmGroupPartitionSummary();
            return true;
        }

        function toggleSiteNeighborAnchor(nodeId) {
            if (!siteNeighborModeEnabled) return false;
            if (siteNeighborAnchorNodes.has(nodeId)) {
                siteNeighborAnchorNodes.delete(nodeId);
            } else {
                siteNeighborAnchorNodes.add(nodeId);
            }
            selectedNode = siteNeighborAnchorNodes.size ? Array.from(siteNeighborAnchorNodes)[siteNeighborAnchorNodes.size - 1] : null;
            const rebuilt = rebuildSiteNeighborExpansion(true);
            if (rebuilt && siteNeighborAnchorNodes.size > 0) {
                renderMap({ preserveViewport: true });
            }
            updateSiteNeighborSelectionUI();
            updateMapModeIndicator();
            renderNodeList(selectedNode || undefined);
            return rebuilt;
        }

        function expandSiteNeighborsForNode(nodeId) {
            if (!siteNeighborModeEnabled) return false;
            return toggleSiteNeighborAnchor(nodeId);
        }

        // 显示单个节点（当 NE 不属于任何 Group 时）
        function showNodes(nodeIds) {
            showLoading(true);
            currentNodes = allNodes.filter(function(n) { return nodeIds.indexOf(n.id) !== -1; })
                .map(function(n) {
                    const domain = n.domain || '';
                    return Object.assign({}, n, { 
                        isHighlight: true,
                        domainStyle: getDomainStyle(domain)
                    }); 
                });

            const nodeSet = new Set(nodeIds);
            const allGroupLinks = allLinks.filter(function(l) {
                const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
                const targetId = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeSet.has(sourceId) && nodeSet.has(targetId);
            }).map(function(l) { return Object.assign({}, l); });

            currentLinks = allGroupLinks;
            filteredLinks = allGroupLinks.slice();
            setBaseCurrentGraph(currentNodes, currentLinks);
            document.getElementById('currentNodes').textContent = currentNodes.length;
            renderAlarmGroupPartitionSummary();

            renderMap();
            renderNodeList(nodeIds[0]);
            showDetailPanel(nodeIds[0]);
            showLoading(false);
        }

        // 节点列表（支持高亮显示）
        function renderNodeList(highlightId) {
            const container = document.getElementById('nodeListContent');
            if (!container) return;
            if (currentNodes.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8c959f; padding: 20px;">暂无节点，请添加 Group</div>';
                return;
            }
            
            container.innerHTML = currentNodes.map(function(n) {
                const style = n.domainStyle || DOMAIN_STYLE['DEFAULT'];
                const isHighlighted = highlightedNodes.has(n.id);
                const hasAlarmClass = getNodeAlarmRoleClass(n);
                const isSelected = (n.id === highlightId) || (siteNeighborModeEnabled && siteNeighborAnchorNodes.has(n.id));
                const isFaultPatternSite = isFaultPatternManagedSite(n.site_id);
                const isSupplementalContext = !!n.supplemental_fault_pattern_context;
                const siteIdHtml = isFaultPatternSite
                    ? '<span class="fault-pattern-site-id">' + escapeHtml(n.site_id || '-') + '</span>'
                    : escapeHtml(n.site_id || '-');
                const alarmGroupIds = getNodeAlarmGroupIds(n);
                const alarmGroupBadges = alarmGroupIds.length
                    ? '<div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">' +
                        alarmGroupIds.slice(0, 4).map(function(groupId) {
                            return '<span style="display:inline-flex; align-items:center; gap:4px; padding:1px 6px; border-radius:999px; background:#ffffff; border:1px solid #d0d7de; color:#24292f; font-size:10px; font-weight:700;">' +
                                renderAlarmGroupMarker(groupId, { size: 16 }) + '<span>' + escapeHtml(groupId) + '</span>' +
                            '</span>';
                        }).join('') +
                        (alarmGroupIds.length > 4 ? '<span style="font-size:10px; color:#57606a;">+' + (alarmGroupIds.length - 4) + '</span>' : '') +
                    '</div>'
                    : '';
                return '<div class="node-item ' + (isSelected ? 'selected' : '') + ' ' + (multiSelectedNodes.has(n.id) ? 'multi-selected' : '') + ' ' + (isHighlighted ? 'highlighted' : '') + ' ' + hasAlarmClass + ' ' + (n.isNeighborExpanded ? 'neighbor-expanded' : '') + ' ' + (isFaultPatternSite ? 'fault-pattern-site' : '') + ' ' + (isSupplementalContext ? 'supplemental-context' : '') + '" onclick="handleNodeListClick(\'' + n.id + '\')">' +
                    '<div class="domain-icon" style="color: ' + style.color + ';">' + style.symbol + '</div>' +
                    '<div class="node-info">' +
                        '<div class="ne-id">' + escapeHtml(getRawNodeId(n)) + '</div>' +
                        '<div class="site-name">' + siteIdHtml + ' | ' + escapeHtml(style.label) + (isSupplementalContext ? ' | 补全上下文' : '') + (siteNeighborModeEnabled && siteNeighborAnchorNodes.has(n.id) ? ' | 锚点' : '') + (n.isNeighborExpanded ? ' | 邻居扩展' : '') + '</div>' +
                        (n.alarm_count > 0 ? '<div class="alarm-badge ' + (n.alarm_count > 3 ? 'high' : n.alarm_count > 0 ? 'medium' : 'low') + '">' + n.alarm_count + ' 个告警</div>' : '') +
                        alarmGroupBadges +
                    '</div>' +
                    '</div>';
            }).join('');
            
            // 如果有高亮节点，滚动到第一个高亮节点
            if (highlightedNodes.size > 0) {
                const firstHighlighted = container.querySelector('.node-item.highlighted');
                if (firstHighlighted) {
                    firstHighlighted.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function handleNodeListClick(nodeId) {
            if (multiSelectMode) {
                toggleNodeSelection(nodeId);
            } else {
                closeAlarmPopup();
                // 使用无感刷新方式，支持再次点击取消选中
                selectNodeWithoutMapRefresh(nodeId);
                // 如果选中了节点（不是取消），则显示告警
                if (selectedNode === nodeId) {
                    showNodeAlarms(nodeId);
                }
            }
        }

        // 传统选择节点（保留用于兼容）
        function selectNode(nodeId) {
            // 如果点击的是当前已选中的节点，则取消选中
            if (selectedNode === nodeId) {
                clearNodeSelection();
                renderMap(); // 完全刷新以清除所有高亮
                return;
            }
            
            // 先清除之前选中的边
            clearEdgeSelection();
            
            selectedNode = nodeId;
            renderMap(); // 完全刷新
            renderNodeList(nodeId);
            showDetailPanel(nodeId);
        }

        function zoomIn() {
