<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故障组总览</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .hero {
            background: linear-gradient(135deg, #ffffff 0%, #eef6ff 100%);
            border: 1px solid #dbe4f0;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }
        .sub {
            color: #5b6472;
            margin-bottom: 18px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            background: #0969da;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover { background: #0858b8; }
        .hint {
            color: #667085;
            font-size: 13px;
        }
        .status {
            margin-top: 14px;
            color: #475467;
            font-size: 14px;
        }
        .filter-summary {
            margin-top: 8px;
            color: #667085;
            font-size: 13px;
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .filter-chip {
            border: 1px solid #d0d5dd;
            background: #fff;
            color: #344054;
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .filter-chip.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
        }
        .site-filter-input {
            min-width: 260px;
            padding: 10px 14px;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            background: #fff;
            color: #1f2937;
            font-size: 14px;
        }
        .site-filter-input:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
        }
        .site-filter-label {
            color: #475467;
            font-size: 13px;
            font-weight: 600;
        }
        .duration-filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .duration-filter-input {
            width: 84px;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            background: #fff;
            color: #1f2937;
            font-size: 14px;
        }
        .duration-filter-input:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
        }
        .duration-filter-text {
            color: #475467;
            font-size: 13px;
            font-weight: 600;
        }
        .list {
            margin-top: 22px;
            display: grid;
            gap: 14px;
        }
        .card {
            background: #fff;
            border: 1px solid #e4e7ec;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.04);
        }
        .card-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .title {
            font-size: 18px;
            font-weight: 700;
            word-break: break-word;
        }
        .time {
            color: #475467;
            font-size: 13px;
            margin-top: 6px;
        }
        .open-btn {
            flex-shrink: 0;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            background: #111827;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .open-btn:hover { background: #0b1220; }
        .meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 10px 18px;
        }
        .meta-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px 12px;
            min-height: 64px;
        }
        .meta-label {
            font-size: 12px;
            color: #667085;
            margin-bottom: 6px;
        }
        .meta-value {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .inline-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .inline-link {
            border: none;
            background: rgba(9, 105, 218, 0.08);
            color: #0969da;
            border-radius: 999px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .inline-link:hover {
            background: rgba(9, 105, 218, 0.16);
        }
        .empty {
            margin-top: 24px;
            text-align: center;
            padding: 40px 24px;
            color: #667085;
            background: #fff;
            border: 1px dashed #d0d5dd;
            border-radius: 18px;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>故障组总览</h1>
            <div class="sub">加载 `jsonl` 文件后，页面会展示所有故障组摘要；点击任意故障组可打开单组传播图详情。</div>
            <div class="toolbar">
                <input id="fileInput" type="file" accept=".jsonl,.txt,.json">
                <button class="btn" onclick="document.getElementById('fileInput').click()">选择 JSONL 文件</button>
                <div class="hint">每行一个故障组对象</div>
            </div>
            <div class="filters" id="filters">
                <button class="filter-chip active" data-filter="all">全部</button>
                <button class="filter-chip" data-filter="with-related">有关联故障组</button>
                <button class="filter-chip" data-filter="without-related">无关联故障组</button>
                <button class="filter-chip" data-filter="ultimate">终极故障组</button>
                <button class="filter-chip" data-filter="multi-site">站点数大于 1</button>
                <button class="filter-chip" data-filter="rule:transmission_rule">规则: transmission_rule</button>
                <button class="filter-chip" data-filter="rule:power_rule">规则: power_rule</button>
            </div>
            <div class="filter-row">
                <span class="site-filter-label">站点过滤</span>
                <input id="siteFilterInput" class="site-filter-input" type="text" placeholder="输入站点ID，支持包含匹配">
            </div>
            <div class="filter-row">
                <span class="site-filter-label">时间范围大于</span>
                <div class="duration-filter-group">
                    <input id="durationHoursInput" class="duration-filter-input" type="number" min="0" step="1" placeholder="时">
                    <span class="duration-filter-text">时</span>
                    <input id="durationMinutesInput" class="duration-filter-input" type="number" min="0" step="1" placeholder="分">
                    <span class="duration-filter-text">分</span>
                    <input id="durationSecondsInput" class="duration-filter-input" type="number" min="0" step="1" placeholder="秒">
                    <span class="duration-filter-text">秒</span>
                </div>
            </div>
            <div class="status" id="status">尚未加载文件</div>
            <div class="filter-summary" id="filterSummary">过滤后 0 条</div>
        </div>

        <div class="list" id="groupList"></div>
        <div class="empty" id="emptyState">请选择一个 `jsonl` 文件</div>
    </div>

    <script>
        let faultGroups = [];
        let activeFilters = new Set(['all']);
        let siteFilterQuery = '';
        let durationFilterSeconds = 0;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getGroupTimeRange(group) {
            const symptoms = group.symptoms || [];
            const timestamps = symptoms
                .map(symptom => symptom && symptom.ts)
                .filter(ts => ts !== null && ts !== undefined)
                .sort((a, b) => a - b);

            if (timestamps.length === 0) {
                return group.group_anchor_time || group.match_info?.group_anchor_time || '-';
            }

            const formatTs = (ts) => {
                const date = new Date(ts * 1000);
                const pad = (value) => String(value).padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            };

            return `${formatTs(timestamps[0])} ~ ${formatTs(timestamps[timestamps.length - 1])}`;
        }

        function getGroupDurationSeconds(group) {
            const symptoms = group.symptoms || [];
            const timestamps = symptoms
                .map(symptom => symptom && symptom.ts)
                .filter(ts => ts !== null && ts !== undefined)
                .sort((a, b) => a - b);

            if (timestamps.length < 2) {
                return 0;
            }
            return timestamps[timestamps.length - 1] - timestamps[0];
        }

        function getGroupRuleText(group) {
            const mergedRules = group.merged_rules || group.match_info?.merged_rules || [];
            if (mergedRules.length > 0) {
                return mergedRules.join(' + ');
            }
            return group.rule || group.match_info?.rule || '-';
        }

        function getRelatedGroupText(group) {
            const related = group.related_group_uuids || group.match_info?.related_group_uuids || [];
            return related.length > 0 ? related.join(', ') : '无';
        }

        function getRelatedGroups(group) {
            return group.related_group_uuids || group.match_info?.related_group_uuids || [];
        }

        function getGroupUuid(group) {
            return group.uuid || group.match_info?.uuid || '';
        }

        function getReferencedGroupUuidSet(groups) {
            const referenced = new Set();
            groups.forEach(group => {
                getRelatedGroups(group).forEach(uuid => {
                    if (uuid) {
                        referenced.add(String(uuid));
                    }
                });
            });
            return referenced;
        }

        function getSiteCount(group) {
            const groupInfo = group.group_info || {};
            const firstGroup = Object.values(groupInfo)[0] || {};
            return (firstGroup.site_list || []).length;
        }

        function getNodeCount(group) {
            const groupInfo = group.group_info || {};
            const firstGroup = Object.values(groupInfo)[0] || {};
            return (firstGroup.ne_list || []).length;
        }

        function getSymptomCount(group) {
            return (group.symptoms || []).length;
        }

        function openGroupDetail(index) {
            const group = faultGroups[index];
            const sessionKey = `fault-group-${Date.now()}-${index}`;
            localStorage.setItem(sessionKey, JSON.stringify(group));
            window.open(`fault_group_detail.html?session_key=${encodeURIComponent(sessionKey)}`, '_blank');
        }

        function openGroupDetailByUuid(uuid) {
            const index = faultGroups.findIndex(group => (group.uuid || group.match_info?.uuid) === uuid);
            if (index >= 0) {
                openGroupDetail(index);
            }
        }

        function matchesRuleFilter(group, ruleName) {
            const mergedRules = group.merged_rules || group.match_info?.merged_rules || [];
            return mergedRules.includes(ruleName) || group.rule === ruleName || group.match_info?.rule === ruleName;
        }

        function filterGroups(groups) {
            const referencedGroupUuids = getReferencedGroupUuidSet(groups);
            return groups.filter(group => {
                if (!activeFilters.has('all') && activeFilters.size > 0) {
                    for (const filter of activeFilters) {
                        if (filter === 'with-related' && getRelatedGroups(group).length === 0) {
                            return false;
                        }
                        if (filter === 'without-related' && getRelatedGroups(group).length > 0) {
                            return false;
                        }
                        if (filter === 'ultimate') {
                            const uuid = getGroupUuid(group);
                            if (!uuid || referencedGroupUuids.has(String(uuid))) {
                                return false;
                            }
                        }
                        if (filter === 'multi-site' && getSiteCount(group) <= 1) {
                            return false;
                        }
                        if (filter.startsWith('rule:') && !matchesRuleFilter(group, filter.slice(5))) {
                            return false;
                        }
                    }
                }

                if (siteFilterQuery) {
                    const groupInfo = group.group_info || {};
                    const firstGroup = Object.values(groupInfo)[0] || {};
                    const siteList = firstGroup.site_list || [];
                    const query = siteFilterQuery.toLowerCase();
                    if (!siteList.some(site => String(site).toLowerCase().includes(query))) {
                        return false;
                    }
                }

                if (durationFilterSeconds > 0 && getGroupDurationSeconds(group) <= durationFilterSeconds) {
                    return false;
                }
                return true;
            });
        }

        function renderRelatedGroupLinks(group) {
            const relatedGroups = getRelatedGroups(group);
            if (relatedGroups.length === 0) {
                return '无';
            }
            return `<div class="inline-links">${
                relatedGroups.map(uuid => `<button class="inline-link" onclick='openGroupDetailByUuid(${JSON.stringify(uuid)})'>${escapeHtml(uuid)}</button>`).join('')
            }</div>`;
        }

        function renderGroups() {
            const list = document.getElementById('groupList');
            const emptyState = document.getElementById('emptyState');
            const filterSummary = document.getElementById('filterSummary');
            const visibleGroups = filterGroups(faultGroups);

            filterSummary.textContent = `过滤后 ${visibleGroups.length} 条`;

            if (visibleGroups.length === 0) {
                list.innerHTML = '';
                emptyState.textContent = faultGroups.length === 0 ? '请选择一个 `jsonl` 文件' : '当前筛选条件下没有故障组';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            list.innerHTML = visibleGroups.map((group) => {
                const index = faultGroups.indexOf(group);
                return `
                <div class="card">
                    <div class="card-head">
                        <div>
                            <div class="title">${escapeHtml(group.uuid || group.match_info?.uuid || `故障组 ${index + 1}`)}</div>
                            <div class="time">故障组时间范围：${escapeHtml(getGroupTimeRange(group))}</div>
                        </div>
                        <button class="open-btn" onclick="openGroupDetail(${index})">查看详情</button>
                    </div>
                    <div class="meta">
                        <div class="meta-item">
                            <div class="meta-label">关联规则</div>
                            <div class="meta-value">${escapeHtml(getGroupRuleText(group))}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">关联故障组</div>
                            <div class="meta-value">${renderRelatedGroupLinks(group)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">站点数 / 设备数 / 告警数</div>
                            <div class="meta-value">${getSiteCount(group)} / ${getNodeCount(group)} / ${getSymptomCount(group)}</div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        function parseJsonl(text) {
            return text
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .map((line, index) => {
                    try {
                        return JSON.parse(line);
                    } catch (error) {
                        throw new Error(`第 ${index + 1} 行解析失败: ${error.message}`);
                    }
                });
        }

        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    faultGroups = parseJsonl(e.target.result);
                    document.getElementById('status').textContent = `已加载 ${faultGroups.length} 个故障组`;
                    renderGroups();
                } catch (error) {
                    faultGroups = [];
                    document.getElementById('status').textContent = error.message;
                    renderGroups();
                }
            };
            reader.readAsText(file, 'utf-8');
        });

        document.getElementById('filters').addEventListener('click', function(event) {
            const btn = event.target.closest('.filter-chip');
            if (!btn) return;

            const filter = btn.dataset.filter || 'all';
            if (filter === 'all') {
                activeFilters = new Set(['all']);
            } else {
                activeFilters.delete('all');
                if (activeFilters.has(filter)) {
                    activeFilters.delete(filter);
                } else {
                    activeFilters.add(filter);
                }
                if (activeFilters.size === 0) {
                    activeFilters.add('all');
                }
            }

            document.querySelectorAll('.filter-chip').forEach(chip => {
                const chipFilter = chip.dataset.filter || 'all';
                chip.classList.toggle('active', activeFilters.has(chipFilter));
            });
            renderGroups();
        });

        document.getElementById('siteFilterInput').addEventListener('input', function(event) {
            siteFilterQuery = event.target.value.trim();
            renderGroups();
        });

        function updateDurationFilter() {
            const hours = parseInt(document.getElementById('durationHoursInput').value || '0', 10) || 0;
            const minutes = parseInt(document.getElementById('durationMinutesInput').value || '0', 10) || 0;
            const seconds = parseInt(document.getElementById('durationSecondsInput').value || '0', 10) || 0;
            durationFilterSeconds = hours * 3600 + minutes * 60 + seconds;
            renderGroups();
        }

        document.getElementById('durationHoursInput').addEventListener('input', updateDurationFilter);
        document.getElementById('durationMinutesInput').addEventListener('input', updateDurationFilter);
        document.getElementById('durationSecondsInput').addEventListener('input', updateDurationFilter);
    </script>
</body>
</html>
